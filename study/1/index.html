 property qualifications were given the right to vote.\",\"zh\":\"在1918年，超過30歲並符合特定財產資格的女性獲得了投票權。\"}},{\"id\":\"point-24\",\"questionId\":\"1-24\",\"text\":{\"en\":\"Graham Greene wrote 'The Heart of the Matter', 'The Honorary Consul', and 'Brighton Rock'. 'Moby-Dick' was written by the American novelist Herman Melville.\",\"zh\":\"葛拉漢·葛林創作了《本質安全》（The Heart of the Matter）、《名譽領事》（The Honorary Consul）和《布萊頓硬糖》（Brighton Rock）。《白鯨記》（Moby-Dick）是由美國小說家赫爾曼·梅爾維爾創作的。\"}},{\"id\":\"point-48\",\"questionId\":\"2-24\",\"text\":{\"en\":\"Responsibilities of UK citizens include respecting and obeying the law, and looking after the local area and environment.\",\"zh\":\"英國公民的責任包括尊重並遵守法律，以及愛護當地區域和環境。\"}},{\"id\":\"point-51\",\"questionId\":\"3-3\",\"text\":{\"en\":\"Women were given the right to vote at the same age as men (21) in 1928.\",\"zh\":\"1928年。女性在1928年獲得了與男性一樣（21歲）的投票權。\"}},{\"id\":\"point-69\",\"questionId\":\"3-21\",\"text\":{\"en\":\"The National Citizen Service (NCS) provides personal and social development programs for young people, not military training.\",\"zh\":\"國家公民服務（NCS）為年輕人提供個人和社交能力發展項目，而不是軍事訓練。\"}},{\"id\":\"point-70\",\"questionId\":\"3-22\",\"text\":{\"en\":\"Emmeline Pankhurst was a leader of the British suffragette movement, fighting for women's right to vote.\",\"zh\":\"艾米琳·潘克斯特（Emmeline Pankhurst）是英國女性參政運動的領袖，致力於爭取女性的投票權。\"}},{\"id\":\"point-72\",\"questionId\":\"3-24\",\"text\":{\"en\":\"Looking after yourself and your family, and respecting the rights of others are two fundamental responsibilities of British citizens.\",\"zh\":\"照顧自己和家人，以及尊重他人的權利，是英國公民的兩項基本責任。\"}},{\"id\":\"point-87\",\"questionId\":\"4-15\",\"text\":{\"en\":\"MEPs stands for Members of the European Parliament, who are elected to represent the citizens of European Union member states.\",\"zh\":\"MEPs 代表歐洲議會議員（Members of the European Parliament），他們經選舉產生，代表歐洲聯盟成員國的公民。\"}},{\"id\":\"point-88\",\"questionId\":\"4-16\",\"text\":{\"en\":\"The fundamental principles of British life include democracy, the rule of law, individual liberty, and tolerance of those with different faiths and beliefs.\",\"zh\":\"英國生活的基本原則包括民主、法治、個人自由以及對不同宗教和信仰的寬容。\"}},{\"id\":\"point-107\",\"questionId\":\"5-11\",\"text\":{\"en\":\"UK principles require residents and citizens to respect the rights of others (including their opinions) and to look after themselves and their families.\",\"zh\":\"英國的原則要求居民和公民尊重他人的權利 (包括他們的意見)，並照顧好自己和家人。\"}},{\"id\":\"point-112\",\"questionId\":\"5-16\",\"text\":{\"en\":\"This entry is a fragment of the statement: 'The Divine Right of Kings was the view held by many English monarchs that they were directly appointed by God to rule.'\",\"zh\":\"此條目是以下陳述的片段：「君權神授是許多英國君主所持的觀點，即他們是由上帝直接任命來統治的。」\"}},{\"id\":\"point-137\",\"questionId\":\"6-17\",\"text\":{\"en\":\"When you become a permanent resident of the UK, you agree to respect and accept its values, principles, and traditions.\",\"zh\":\"當您成為英國永久居民時，您同意尊重並接受其價值觀、原則和傳統。\"}},{\"id\":\"point-149\",\"questionId\":\"7-5\",\"text\":{\"en\":\"The fundamental principles of British life include democracy, the rule of law, individual liberty, and mutual respect and tolerance of those with different faiths and beliefs.\",\"zh\":\"英國生活的根本原則包括民主、法治、個人自由，以及對不同信仰和信念者的相互尊重與寬容。\"}},{\"id\":\"point-173\",\"questionId\":\"8-5\",\"text\":{\"en\":\"The Enlightenment was an intellectual and philosophical movement in the 18th century that championed reason, science, and individual rights.\",\"zh\":\"啟蒙運動（The Enlightenment）是 18 世紀的一場智力和哲學運動，倡導理性、科學和個人權利。\"}},{\"id\":\"point-174\",\"questionId\":\"8-6\",\"text\":{\"en\":\"To apply for citizenship or permanent residence, you need to speak and read English (or Welsh or Scottish Gaelic) and pass the Life in the UK test.\",\"zh\":\"要申請公民身份或永久居留權，您需要會說和閱讀英語（或威爾斯語、蘇格蘭蓋爾語），並通過「英國生活」考試。\"}},{\"id\":\"point-182\",\"questionId\":\"8-14\",\"text\":{\"en\":\"In a Crown Court, a jury of 12 randomly chosen citizens decides the verdict of 'guilty' or 'not guilty'. The judge presiding over the court decides the sentence if the defendant is found guilty.\",\"zh\":\"在刑事法庭（Crown Court）中，由12名隨機選出的公民組成的陪審團來決定「有罪」或「無罪」的裁決。如果被告被判有罪，則由主持法庭的法官決定判決刑罰。\"}},{\"id\":\"point-213\",\"questionId\":\"9-21\",\"text\":{\"en\":\"Fundamental freedoms in the UK include the freedom of speech and the right to participate in free and fair elections.\",\"zh\":\"英國的基本自由包括言論自由以及參與自由和公正選舉的權利。\"}},{\"id\":\"point-216\",\"questionId\":\"9-24\",\"text\":{\"en\":\"Emmeline Pankhurst was the primary leader of the suffragette movement, which campaigned for women's right to vote.\",\"zh\":\"埃米琳·潘克斯特。她是婦女參政運動的主要領導人。\"}},{\"id\":\"point-233\",\"questionId\":\"10-17\",\"text\":{\"en\":\"The National Citizen Service (NCS) is an optional programme for 16 and 17-year-olds; it is not compulsory.\",\"zh\":\"國家公民服務計畫是自願參加的，並非強制。\"}},{\"id\":\"point-268\",\"questionId\":\"12-4\",\"text\":{\"en\":\"This statement is false. The Bill of Rights of 1689 limited the monarch's power and confirmed the rights of Parliament, but did not grant universal suffrage.\",\"zh\":\"此陳述是錯誤的。1689年的《權利法案》限制了君主的權力並確認了議會的權利，但並未授予普選權。\"}},{\"id\":\"point-293\",\"questionId\":\"13-5\",\"text\":{\"en\":\"German-born composer George Frideric Handel became a British citizen and wrote 'Music for the Royal Fireworks' and 'Water Music' for the royal family.\",\"zh\":\"出生於德國的作曲家喬治·弗里德里希·韓德爾成為英國公民，並為王室創作了《皇家煙火音樂》和《水上音樂》。\"}},{\"id\":\"point-336\",\"questionId\":\"14-24\",\"text\":{\"en\":\"In 1928, the voting age for women was lowered to 21, giving them the same voting rights as men.\",\"zh\":\"1928年，女性的投票年齡降至21歲，使她們獲得了與男性相同的投票權。\"}},{\"id\":\"point-384\",\"questionId\":\"16-24\",\"text\":{\"en\":\"In May 2010, the Conservatives and Liberal Democrats formed a coalition government after no single party won an outright majority.\",\"zh\":\"2010年5月，在沒有單一政黨獲得絕對多數席位後，保守黨 and 自由民主黨組成了聯合政府。\"}},{\"id\":\"point-393\",\"questionId\":\"17-9\",\"text\":{\"en\":\"The Habeas Corpus Act of 1679 introduced the right of a prisoner to a court hearing to determine the legality of their detention.\",\"zh\":\"1679 年的《人身保護法》（Habeas Corpus Act）規定了囚犯有權獲得法庭聆訊，以決定其拘留是否合法。\"}},{\"id\":\"point-396\",\"questionId\":\"17-12\",\"text\":{\"en\":\"Charles I believed in the Divine Right of Kings, which led him to try to rule without Parliament for 11 years (known as the Personal Rule).\",\"zh\":\"查理一世相信君權神授，這使得他試圖在沒有國會的情況下進行統治長達 11 年 (被稱為個人統治時期)。\"}},{\"id\":\"point-406\",\"questionId\":\"17-22\",\"text\":{\"en\":\"The Bill of Rights of 1689 established the sovereignty of Parliament and limited the powers of the monarch.\",\"zh\":\"1689年的《權利法案》確立了議會的主權，並限制了君主的權力。\"}},{\"id\":\"point-428\",\"questionId\":\"18-20\",\"text\":{\"en\":\"Emmeline Pankhurst was a famous British political activist who led the suffragette movement to help women win the right to vote.\",\"zh\":\"艾米琳·潘克斯特（Emmeline Pankhurst）是著名的英國政治活動家，她領導了女性參政運動以幫助女性獲得投票權。\"}}]}}]\n"])</script><script>self.__next_f.push([1,"d:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"13:I[27201,[\"/LifeInUK/_next/static/chunks/0ce4138y2rd_b.js\",\"/LifeInUK/_next/static/chunks/14mrh2-p_w84d.js\"],\"IconMark\"]\na:null\n"])</script><script>self.__next_f.push([1,"f:[[\"$\",\"title\",\"0\",{\"children\":\"Life in the UK Mock Test\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Bilingual Life in the UK Mock Test App\"}],[\"$\",\"link\",\"2\",{\"rel\":\"manifest\",\"href\":\"/LifeInUK/manifest.webmanifest\",\"crossOrigin\":\"$undefined\"}],[\"$\",\"meta\",\"3\",{\"name\":\"mobile-web-app-capable\",\"content\":\"yes\"}],[\"$\",\"meta\",\"4\",{\"name\":\"apple-mobile-web-app-title\",\"content\":\"LifeInUK\"}],[\"$\",\"meta\",\"5\",{\"name\":\"apple-mobile-web-app-status-bar-style\",\"content\":\"default\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:title\",\"content\":\"Life in the UK Mock Test\"}],[\"$\",\"meta\",\"7\",{\"p
