18.\",\"zh\":\"英國大選的法定投票年齡為 18 歲。\"}},{\"id\":\"point-34\",\"questionId\":\"2-10\",\"text\":{\"en\":\"Wastwater, a lake in the Lake District National Park, was voted Britain's favourite view in a television poll in 2007.\",\"zh\":\"位於湖區國家公園的瓦斯特湖（Wastwater）在2007年的一項電視民調中被選為英國人最喜愛的景觀。\"}},{\"id\":\"point-35\",\"questionId\":\"2-11\",\"text\":{\"en\":\"Towns, cities, and rural areas in the UK are governed by democratically elected local councils, not by government-appointed officials.\",\"zh\":\"英國的城鎮、城市和農村地區是由民主選舉產生的民選地方議會治理，而非由政府任命的官員管理。\"}},{\"id\":\"point-45\",\"questionId\":\"2-21\",\"text\":{\"en\":\"The Chancellor of the Exchequer is the government's chief finance minister, responsible for the economy and setting the budget.\",\"zh\":\"財政大臣（Chancellor of the Exchequer）是政府的首席財政部長，負責經濟和制定預算。\"}},{\"id\":\"point-47\",\"questionId\":\"2-23\",\"text\":{\"en\":\"Complaints against the police can be made by writing to the Chief Constable of the police force, or through the Independent Office for Police Conduct.\",\"zh\":\"對警察的投訴可以通過寫信給該警隊的警務處長（Chief Constable），或通過警察行為獨立辦公室進行。\"}},{\"id\":\"point-50\",\"questionId\":\"3-2\",\"text\":{\"en\":\"Being drunk and disorderly in public is a criminal offence. The police can issue a fine or arrest you.\",\"zh\":\"在公共場合醉酒並擾亂秩序是刑事犯罪。警方可以處以罰款或予以逮捕。\"}},{\"id\":\"point-53\",\"questionId\":\"3-5\",\"text\":{\"en\":\"In a Crown Court, the jury decides whether the defendant is guilty or not, and the judge decides on the penalty.\",\"zh\":\"在皇家刑事法院，陪審團決定被告是否有罪，而法官決定刑罰。\"}},{\"id\":\"point-54\",\"questionId\":\"3-6\",\"text\":{\"en\":\"10 Downing Street in London is the official residence and office of the British Prime Minister.\",\"zh\":\"位於倫敦的唐寧街 10 號 （10 Downing Street） 是英國首相的官方官邸和辦公室。\"}},{\"id\":\"point-55\",\"questionId\":\"3-7\",\"text\":{\"en\":\"The Bill of Rights 1689 established parliamentary sovereignty and limited the power of the monarch, but did not grant women the right to vote. Women achieved equal voting rights in 1928.\",\"zh\":\"1689年的《權利法案》確立了議會主權並限制了君主的權力，但並未賦予女性投票權。女性在1928年才獲得平等的投票權。\"}},{\"id\":\"point-59\",\"questionId\":\"3-11\",\"text\":{\"en\":\"Polling stations (or polling places in Scotland) are where citizens go to cast their votes in elections and referendums.\",\"zh\":\"投票站（在蘇格蘭稱為 polling places）是公民在選舉和公投中投票的地方。\"}},{\"id\":\"point-75\",\"questionId\":\"4-3\",\"text\":{\"en\":\"General Elections must be held at least once every five years under British law.\",\"zh\":\"根據英國法律，大選必須至少每五年舉行一次。\"}},{\"id\":\"point-98\",\"questionId\":\"5-2\",\"text\":{\"en\":\"The monarch appoints life peers on the advice of the Prime Minister.\",\"zh\":\"君主在首相的建議下任命終身貴族。\"}},{\"id\":\"point-100\",\"questionId\":\"5-4\",\"text\":{\"en\":\"The Welsh Parliament (formerly known as the Welsh Assembly) has 60 members.\",\"zh\":\"威爾斯議會（前身為威爾斯議會大會）有 60 名成員。\"}},{\"id\":\"point-113\",\"questionId\":\"5-17\",\"text\":{\"en\":\"The UK is a parliamentary democracy.\",\"zh\":\"英國是一個議會民主制國家。\"}},{\"id\":\"point-134\",\"questionId\":\"6-14\",\"text\":{\"en\":\"If an MP dies or resigns, a by-election is held in their constituency to elect a new representative.\",\"zh\":\"如果國會議員去世或辭職，其選區將舉行補選以選出新的代表。\"}},{\"id\":\"point-135\",\"questionId\":\"6-15\",\"text\":{\"en\":\"Winston Churchill, the Prime Minister during WWII, was voted the greatest Briton of all time in a 2002 poll.\",\"zh\":\"溫斯頓·邱吉爾。他在二戰期間擔任首相，並於2002年獲選為最偉大的英國人。\"}},{\"id\":\"point-136\",\"questionId\":\"6-16\",\"text\":{\"en\":\"The Home Secretary is a senior government minister responsible for internal affairs, including policing, national security, and crime policy.\",\"zh\":\"內政大臣是負責內政的內閣高級大臣，其職責包括警政、國家安全和治安犯罪政策。\"}},{\"id\":\"point-139\",\"questionId\":\"6-19\",\"text\":{\"en\":\"Prime Minister's Questions (PMQs) is held once every week for 30 minutes on Wednesdays while Parliament is in session.\",\"zh\":\"首相問答時間（PMQs）在國會會期內，每週三舉行一次，為時30分鐘。\"}},{\"id\":\"point-148\",\"questionId\":\"7-4\",\"text\":{\"en\":\"Civil servants are chosen on merit and are politically neutral; they are not appointed by the political government.\",\"zh\":\"公務員是根據擇優錄取的原則選拔的，保持政治中立，並非由政黨政府任命。\"}},{\"id\":\"point-153\",\"questionId\":\"7-9\",\"text\":{\"en\":\"Defence and Immigration are reserved matters, meaning they are controlled by the UK government in Westminster, not the devolved administrations.\",\"zh\":\"國防和移民是保留事項，這意味著它們由西敏寺的英國中央政府控制，而不是由下放政府控制。\"}},{\"id\":\"point-157\",\"questionId\":\"7-13\",\"text\":{\"en\":\"The UK Parliament is made up of two houses: the House of Commons and the House of Lords.\",\"zh\":\"英國國會由上議院和下議院這兩個議院所構成。\"}},{\"id\":\"point-163\",\"questionId\":\"7-19\",\"text\":{\"en\":\"The North American colonies declared independence because of the lack of representation despite being taxed.\",\"zh\":\"北美的英國殖民地因為不滿「無代表卻要納稅」而宣布獨立。\"}},{\"id\":\"point-177\",\"questionId\":\"8-9\",\"text\":{\"en\":\"Big Ben is the nickname for the Great Bell of the clock tower at the Houses of Parliament (Palace of Westminster) in London.\",\"zh\":\"大笨鐘是位於倫敦國會大廈（威斯敏斯特宮）鐘樓大銅鐘的綽號。\"}},{\"id\":\"point-185\",\"questionId\":\"8-17\",\"text\":{\"en\":\"The Lord of the Rings, written by J.R.R. Tolkien, was voted the nation's best-loved novel in the BBC's Big Read poll in 2003.\",\"zh\":\"由 J. R. R. 托爾金 （J.R.R. Tolkien） 撰寫的《魔戒》 （The Lord of the Rings） 在 2003 年英國廣播公司 （BBC） 舉辦的「大閱讀」 （Big Read） 民意調查中被評選為該國最受喜愛的小說。\"}},{\"id\":\"point-188\",\"questionId\":\"8-20\",\"text\":{\"en\":\"The Home Secretary is a senior Cabinet minister responsible for internal affairs, including policing, national security, and immigration.\",\"zh\":\"內政大臣是高級閣員，負責國內事務，包括警政、國家安全和移民事務。\"}},{\"id\":\"point-208\",\"questionId\":\"9-16\",\"text\":{\"en\":\"Youth Court cases are normally heard by up to 3 specially trained magistrates or a District Judge.\",\"zh\":\"青年法院的案件通常由最多3名受過專門訓練的治安推事或1名地方法官審理。\"}},{\"id\":\"point-222\",\"questionId\":\"10-6\",\"text\":{\"en\":\"You should contact your local police force if you suspect someone is trying to involve you in extremist or terrorist activities.\",\"zh\":\"如果你懷疑有人試圖拉攏你參與極端或恐怖活動，應立即聯絡當地警方。\"}},{\"id\":\"point-224\",\"questionId\":\"10-8\",\"text\":{\"en\":\"Forced marriage is illegal in the UK, and court orders can be obtained to protect a person from it.\",\"zh\":\"強迫婚姻在英國是違法的，可以申請法院命令來保護免受強迫婚姻。\"}},{\"id\":\"point-226\",\"questionId\":\"10-10\",\"text\":{\"en\":\"Members of Parliament (MPs) represent all the people in their local area (constituency), regardless of whether they voted for them or not.\",\"zh\":\"國會議員（MPs）代表其所在選區（constituency）的所有人，無論這些人是否投票給他們。\"}},{\"id\":\"point-227\",\"questionId\":\"10-11\",\"text\":{\"en\":\"The American colonies demanded independence largely because the British government sought to impose taxes on them without allowing them representation in Parliament.\",\"zh\":\"由於英國政府在沒有給予他們議會代表權的情況下對其徵稅，引發了美國獨立戰爭。\"}},{\"id\":\"point-234\",\"questionId\":\"10-18\",\"text\":{\"en\":\"The UK joined the European Economic Community (EEC), which later became the European Union (EU), in 1973.\",\"zh\":\"英國於 1973 年加入歐洲經濟共同體（EEC，後來的歐盟 EU）。\"}},{\"id\":\"point-247\",\"questionId\":\"11-7\",\"text\":{\"en\":\"Prime Minister's Questions (PMQs) is a weekly event in the House of Commons where the Prime Minister answers questions from MPs.\",\"zh\":\"首相答問環節 （Prime Minister's Questions） 是下議院每週進行一次的活動，由首相回答國會議員的提問。\"}},{\"id\":\"point-256\",\"questionId\":\"11-16\",\"text\":{\"en\":\"Local authorities (councils) in the UK receive funding from central government grants, business rates, and local council tax paid by residents.\",\"zh\":\"英國的地方當局（議會）的資金來源包括中央政府撥款、商業稅以及居民繳納的地方市政稅（council tax）。\"}},{\"id\":\"point-262\",\"questionId\":\"11-22\",\"text\":{\"en\":\"Civil law deals with disputes between individuals or groups, such as discrimination in the workplace, debt, and housing disputes. The others are criminal offences.\",\"zh\":\"民事法 （Civil law） 處理個人或團體之間的糾紛，例如職場歧視、債務和住房糾紛。其他選項則屬於刑事犯罪。\"}},{\"id\":\"point-264\",\"questionId\":\"11-24\",\"text\":{\"en\":\"On 5th November, Bonfire Night (or Guy Fawkes Night) commemorates the failure of the Gunpowder Plot in 1605, a conspiracy to blow up the Houses of Parliament.\",\"zh\":\"11月5日的營火之夜（或稱蓋伊·福克斯之夜）是紀念1605年「火藥陰謀」的失敗，該陰謀企圖炸毀國會大廈。\"}},{\"id\":\"point-274\",\"questionId\":\"12-10\",\"text\":{\"en\":\"Citizens of other EU states cannot vote in General Elections in the UK, unless they are citizens of Commonwealth countries or Ireland.\",\"zh\":\"其他歐盟成員國的公民不能在英國大選中投票，除非他們是英聯邦國家或愛爾蘭的公民。\"}},{\"id\":\"point-284\",\"questionId\":\"12-20\",\"text\":{\"en\":\"The UK is a parliamentary democracy, with Parliament as the supreme legislative authority.\",\"zh\":\"英國是議會民主制國家，議會是最高立法機關。\"}},{\"id\":\"point-289\",\"questionId\":\"13-1\",\"text\":{\"en\":\"Certain matters such as immigration, defence, and foreign policy are reserved powers controlled by the UK Parliament, not devolved assemblies.\",\"zh\":\"移民、國防和外交政策等某些事務屬於保留權力，由英國國會控制，而不屬於地方分權議會的權責範圍。\"}},{\"id\":\"point-299\",\"questionId\":\"13-11\",\"text\":{\"en\":\"Margaret Thatcher became the UK's first female Prime Minister in 1979 and served until 1990.\",\"zh\":\"瑪格麗特·柴契爾（Margaret Thatcher）於1979年成為英國首位女首相，並任職至1990年。\"}},{\"id\":\"point-308\",\"questionId\":\"13-20\",\"text\":{\"en\":\"Official reports of proceedings in Parliament are called Hansard.\",\"zh\":\"國會程序的官方報告稱為議事錄（Hansard）。\"}},{\"id\":\"point-312\",\"questionId\":\"13-24\",\"text\":{\"en\":\"By law, dogs in public places must wear a collar showing the name and address of the owner.\",\"zh\":\"法律規定，在公共場所的狗必須佩戴項圈，上面標明主人的姓名和地址。\"}},{\"id\":\"point-317\",\"questionId\":\"14-5\",\"text\":{\"en\":\"In Scotland, minor criminal cases are heard in the Justice of the Peace Court, while more serious ones go to the Sheriff Court or High Court.\",\"zh\":\"在蘇格蘭，輕微刑事案件由太平紳士法庭審理，而較嚴重的案件則由郡長法庭或高等法院審理。\"}},{\"id\":\"point-319\",\"questionId\":\"14-7\",\"text\":{\"en\":\"The judiciary is responsible for interpreting the law and ensuring fair trials. Lawmaking is done by Parliament, and arrests are made by the police.\",\"zh\":\"司法機構負責解釋法律並確保審判公正。法律由議會制定，逮捕人則由警察執行。\"}},{\"id\":\"point-321\",\"questionId\":\"14-9\",\"text\":{\"en\":\"The small claims procedure is an informal, low-cost way to resolve minor legal disputes without needing a lawyer.\",\"zh\":\"小額索賠程序是一種非正式、低成本的方式，無需律師即可解決輕微的法律糾紛。\"}},{\"id\":\"point-332\",\"questionId\":\"14-20\",\"text\":{\"en\":\"Discrimination in the workplace is a matter of civil law, which deals with disputes between individuals or groups, rather than criminal law.\",\"zh\":\"職場歧視屬於民事法律範疇，民事法律處理個人或團體之間的糾紛，而非刑事法律。\"}},{\"id\":\"point-339\",\"questionId\":\"15-3\",\"text\":{\"en\":\"Elections to the European Parliament were held every five years (until the UK left the European Union).\",\"zh\":\"歐洲議會選舉每 5 年舉行一次 (直至英國脫離歐盟)。\"}},{\"id\":\"point-340\",\"questionId\":\"15-4\",\"text\":{\"en\":\"Sir Isaac Newton was a famous English physicist and mathematician who discovered the laws of gravity and motion.\",\"zh\":\"艾薩克·牛頓爵士（Sir Isaac Newton）是著名的英國物理學家和數學家，他發現了重力和運動定律。\"}},{\"id\":\"point-370\",\"questionId\":\"16-10\",\"text\":{\"en\":\"The UK has had a fully democratic voting system since 1928, when the Equal Franchise Act gave women the vote on the same terms as men (at age 21).\",\"zh\":\"英國自1928年起實行完全民主的投票制度，當時的《平等特許權法》賦予女性與男性相同的投票權（21歲）。\"}},{\"id\":\"point-375\",\"questionId\":\"16-15\",\"text\":{\"en\":\"A poll card is sent to registered voters before an election. It includes details such as your voter number, the election date, and the address of your polling station.\",\"zh\":\"投票卡在選舉前寄給已登記的選民。它包含您的選民編號、選舉日期以及您的投票站地址等詳細資訊。\"}},{\"id\":\"point-380\",\"questionId\":\"16-20\",\"text\":{\"en\":\"Clement Attlee was elected as British Prime Minister in 1945.\",\"zh\":\"克萊曼·艾德禮（Clement Attlee）在1945年當選為英國首相。\"}},{\"id\":\"point-395\",\"questionId\":\"17-11\",\"text\":{\"en\":\"To drive a car or ride a motorcycle legally in the UK, you must have a valid driving licence.\",\"zh\":\"在英國合法駕駛汽車或騎摩托車，您必須擁有有效的駕駛執照。\"}},{\"id\":\"point-399\",\"questionId\":\"17-15\",\"text\":{\"en\":\"The UK is a constitutional monarchy. The monarch is the head of state, but the power to make and pass laws resides with Parliament.\",\"zh\":\"英國是君主立憲制國家。君主是國家元首，但制定和通過法律的權力歸於議會。\"}},{\"id\":\"point-400\",\"questionId\":\"17-16\",\"text\":{\"en\":\"General elections in the UK are typically held at least every 5 years.\",\"zh\":\"每5年。英國大選通常最多每5年舉行一次。\"}},{\"id\":\"point-401\",\"questionId\":\"17-17\",\"text\":{\"en\":\"By law, all dogs in public places must wear a collar with the owner's name and address on it.\",\"zh\":\"根據法律規定，在公共場所所有的狗都必須佩戴寫有主人姓名和地址的項圈。\"}},{\"id\":\"point-402\",\"questionId\":\"17-18\",\"text\":{\"en\":\"Complaints against the police can be made directly at a police station or by writing to the Chief Constable of the force involved.\",\"zh\":\"對警察的投訴可以直接前往警署提出，或者寫信給相關警隊的警務處長（Chief Constable）。\"}},{\"id\":\"point-409\",\"questionId\":\"18-1\",\"text\":{\"en\":\"Sir Robert Walpole is widely acknowledged as the first Prime Minister of Great Britain, serving from 1721 to 1742.\",\"zh\":\"羅伯特·華波爵士被廣泛公認為大不列顛的第一任首相，於 1721 年至 1742 年在任。\"}},{\"id\":\"point-413\",\"questionId\":\"18-5\",\"text\":{\"en\":\"The shared goals of the Commonwealth include democracy, development, and peace.\",\"zh\":\"英聯邦的共同目標包括促進民主、發展與和平。\"}},{\"id\":\"point-418\",\"questionId\":\"18-10\",\"text\":{\"en\":\"The Equal Franchise Act of 1928 gave women the vote at the age of 21, the same age as men.\",\"zh\":\"1928年的《平等選舉權法》賦予女性在21歲投票的權利，與男性相同。\"}},{\"id\":\"point-425\",\"questionId\":\"18-17\",\"text\":{\"en\":\"Civil servants are appointed on merit based on fair and open competition, and they must remain politically neutral to serve the government of the day.\",\"zh\":\"公務員是基於公平和公開的競爭並憑藉才能受委任的，他們必須保持政治中立，以服務當屆政府。\"}}]}}]\n"])</script><script>self.__next_f.push([1,"d:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><s
