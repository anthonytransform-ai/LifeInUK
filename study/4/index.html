alse]],\"m\":\"$undefined\",\"G\":[\"$10\",[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/LifeInUK/_next/static/chunks/210f98n0pnnhe.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}]]],\"S\":true,\"h\":null,\"s\":\"$undefined\",\"l\":\"$undefined\",\"p\":\"$undefined\",\"d\":\"$undefined\",\"b\":\"a-7wj8kroPmB3C77QEbS_\"}\n"])</script><script>self.__next_f.push([1,"11:[]\nb:\"$W11\"\n"])</script><script>self.__next_f.push([1,"12:I[63762,[\"/LifeInUK/_next/static/chunks/2t8yyem4st7i0.js\",\"/LifeInUK/_next/static/chunks/14mrh2-p_w84d.js\",\"/LifeInUK/_next/static/chunks/2_9z3gopnxx3m.js\",\"/LifeInUK/_next/static/chunks/3v8z5kmn-gfn4.js\"],\"default\"]\n"])</script><script>self.__next_f.push([1,"7:[\"$\",\"$L12\",null,{\"chapterId\":\"4\",\"chapter\":{\"chapterId\":4,\"title\":{\"en\":\"A modern, thriving society\",\"zh\":\"現代繁榮的社會\"},\"points\":[{\"id\":\"point-18\",\"questionId\":\"1-18\",\"text\":{\"en\":\"The Proms is an eight-week summer season of daily orchestral classical music concerts held predominantly in the Royal Albert Hall.\",\"zh\":\"逍遙音樂會（The Proms）是為期八週的夏季古典音樂節，每日都有管弦樂古典音樂會，主要在皇家阿爾伯特音樂廳（Royal Albert Hall）舉行。\"}},{\"id\":\"point-37\",\"questionId\":\"2-13\",\"text\":{\"en\":\"The BBC is a public service broadcaster that is independent of government control and operates under a Royal Charter.\",\"zh\":\"英國廣播公司（BBC）是公共服務廣播機構，獨立於政府控制，並根據皇家特許狀（Royal Charter）運作。\"}},{\"id\":\"point-49\",\"questionId\":\"3-1\",\"text\":{\"en\":\"A Yorkshire pudding is made of flour, eggs, and milk baked in the oven to puff up, traditionally eaten with roast meat.\",\"zh\":\"約克郡布丁是用麵粉、雞蛋和牛奶調成的麵糊在烤箱中烘烤膨脹而成，傳統上與烤肉搭配食用。\"}},{\"id\":\"point-68\",\"questionId\":\"3-20\",\"text\":{\"en\":\"Sherlock Holmes was created by Sir Arthur Conan Doyle (1859–1930), a Scottish writer and physician.\",\"zh\":\"福爾摩斯是由蘇格蘭作家兼醫生亞瑟·柯南·道爾爵士（1859–1930年）所創造的虛構偵探。\"}},{\"id\":\"point-102\",\"questionId\":\"5-6\",\"text\":{\"en\":\"The 1960s was a decade of significant social change, liberalisation of laws, and the rise of British pop music, including The Beatles.\",\"zh\":\"1960年代是社會發生重大變革、法律變得更加自由以及英國流行音樂（包括披頭四樂團）崛起的十年。\"}},{\"id\":\"point-111\",\"questionId\":\"5-15\",\"text\":{\"en\":\"Friends of the Earth is an international environmental charity.\",\"zh\":\"「地球之友」 （Friends of the Earth） 是一個國際性的環保慈善機構。\"}},{\"id\":\"point-119\",\"questionId\":\"5-23\",\"text\":{\"en\":\"Friends of the Earth is an international environmental charity dedicated to protecting the natural world.\",\"zh\":\"「地球之友」（Friends of the Earth）是一個致力於保護自然世界的國際環保慈善機構。\"}},{\"id\":\"point-125\",\"questionId\":\"6-5\",\"text\":{\"en\":\"Diwali (the Festival of Lights) is an important festival celebrated by Hindus, Sikhs, and Jains.\",\"zh\":\"排燈節（光明節）是印度教徒、錫克教徒和耆那教徒慶祝的重要節日。\"}},{\"id\":\"point-126\",\"questionId\":\"6-6\",\"text\":{\"en\":\"The Beatles and The Rolling Stones were famous British pop music groups during the 1960s.\",\"zh\":\"披頭四樂團和滾石樂團是1960年代著名的英國流行音樂團體。\"}},{\"id\":\"point-131\",\"questionId\":\"6-11\",\"text\":{\"en\":\"Hogmanay is the Scottish word for New Year's Eve, widely celebrated with traditions and parties across Scotland.\",\"zh\":\"霍格曼內 (Hogmanay) 是蘇格蘭語中對除夕（跨年夜）的稱呼，在蘇格蘭各地都有廣泛的慶祝傳統和派對。\"}},{\"id\":\"point-147\",\"questionId\":\"7-3\",\"text\":{\"en\":\"Charlie Chaplin became a global icon of silent cinema through his famous character 'The Tramp'.\",\"zh\":\"查理·卓別林憑藉其著名的「流浪漢」 (The Tramp) 角色成為全球默片時代的標誌性人物。\"}},{\"id\":\"point-158\",\"questionId\":\"7-14\",\"text\":{\"en\":\"John Petts was a Welsh artist known for his exceptional work in engraving and designing stained glass.\",\"zh\":\"約翰·佩茨（John Petts）是威爾斯藝術家，以其在雕刻和彩色玻璃設計方面的傑出作品而聞名。\"}},{\"id\":\"point-169\",\"questionId\":\"8-1\",\"text\":{\"en\":\"Traditional heavy industries, such as shipbuilding, were badly affected during the Great Depression of the 1930s.\",\"zh\":\"傳統的重工業（如造船業）在大蕭條期間遭受了重創。\"}},{\"id\":\"point-190\",\"questionId\":\"8-22\",\"text\":{\"en\":\"Canals were built to link the factories to towns and cities and to the ports for transportation of goods.\",\"zh\":\"建造運河是為了將工廠與城鎮和港口連接起來，以利貨物運輸。\"}},{\"id\":\"point-215\",\"questionId\":\"9-23\",\"text\":{\"en\":\"The lines \\\"God save our gracious Queen!\\\" and \\\"Send her victorious\\\" are key parts of the traditional UK National Anthem.\",\"zh\":\"「上帝保佑我們慈祥的女王！」和「願她勝利」是英國傳統國歌的主要歌詞。\"}},{\"id\":\"point-220\",\"questionId\":\"10-4\",\"text\":{\"en\":\"Diwali is a Hindu and Sikh festival widely known as the 'Festival of Lights'.\",\"zh\":\"排燈節（Diwali）是印度教和錫克教的節日，廣為人知的別名為「光明節」（Festival of Lights）。\"}},{\"id\":\"point-237\",\"questionId\":\"10-21\",\"text\":{\"en\":\"The National Anthem can be played on many public and official occasions, such as sports events, and does not require the presence of the Monarch.\",\"zh\":\"國歌可以在許多公共和官方場合演奏（例如體育賽事），並不需要君主在場。\"}},{\"id\":\"point-244\",\"questionId\":\"11-4\",\"text\":{\"en\":\"Henry VIII's first wife was Catherine of Aragon, a Spanish princess who had previously been married to Henry's elder brother, Arthur.\",\"zh\":\"亨利八世的第一任妻子是阿拉貢的凱瑟琳，她是一位西班牙公主，此前曾嫁給亨利八世的哥哥亞瑟。\"}},{\"id\":\"point-245\",\"questionId\":\"11-5\",\"text\":{\"en\":\"Canvassing involves volunteers or party members visiting households to persuade people to vote for their political party.\",\"zh\":\"「拉票」 （Canvassing） 是指志工或政黨成員拜訪住戶，以說服人們投票給其政黨。\"}},{\"id\":\"point-248\",\"questionId\":\"11-8\",\"text\":{\"en\":\"Margaret Thatcher, the leader of the Conservative Party, became the UK's first female Prime Minister in 1979.\",\"zh\":\"保守黨黨魁瑪格麗特·柴契爾（Margaret Thatcher）於 1979 年成為英國第一位女性首相。\"}},{\"id\":\"point-272\",\"questionId\":\"12-8\",\"text\":{\"en\":\"Wallace and Gromit is a well-known animated film series created by Nick Park.\",\"zh\":\"《酷狗寶貝》是一部由尼克·帕克創作的知名停格動畫電影。\"}},{\"id\":\"point-307\",\"questionId\":\"13-19\",\"text\":{\"en\":\"The Tate Britain and Tate Modern art galleries are located in London. There are also Tate galleries in Liverpool and St Ives.\",\"zh\":\"泰特不列顛館（Tate Britain）和泰特現代藝術館（Tate Modern）均位於倫敦。在利物浦和聖艾夫斯也有泰特美術館。\"}},{\"id\":\"point-310\",\"questionId\":\"13-22\",\"text\":{\"en\":\"The 1960s was a period of significant social change and is famous for the growth of British fashion and pop music, including bands like The Beatles and The Rolling Stones.\",\"zh\":\"1960 年代是一個發生重大社會變革的時期，以英國時尚和流行音樂（包括披頭四樂團和滾石樂團等樂隊）的蓬勃發展而聞名。\"}},{\"id\":\"point-314\",\"questionId\":\"14-2\",\"text\":{\"en\":\"This statement is false. The National Anthem is played on many public and official occasions, such as sports events, and does not require the presence of the Monarch.\",\"zh\":\"此陳述是錯誤的。國歌會在許多公眾和官方場合演奏（例如體育賽事），並不需要君主在場。\"}},{\"id\":\"point-324\",\"questionId\":\"14-12\",\"text\":{\"en\":\"Haggis is a traditional Scottish dish made from sheep's offal, oatmeal, suet, onion, and spices.\",\"zh\":\"哈吉斯是蘇格蘭的傳統菜餚，由羊內臟、燕麥片、板油、洋蔥和香料製成。\"}},{\"id\":\"point-328\",\"questionId\":\"14-16\",\"text\":{\"en\":\"The Great Fire of London in 1666 destroyed large parts of the city during the reign of Charles II.\",\"zh\":\"發生火災。1666年的倫敦大火在查理二世統治期間摧毀了倫敦的大部分地區。\"}},{\"id\":\"point-356\",\"questionId\":\"15-20\",\"text\":{\"en\":\"Unlike newspapers, British radio and television broadcasters are legally required to provide balanced and impartial coverage of political parties.\",\"zh\":\"與報紙不同，英國法律規定廣播和電視媒體對政黨的報導必須保持平衡與公正，並向相互競爭的觀點提供平等的發言時間。\"}},{\"id\":\"point-361\",\"questionId\":\"16-1\",\"text\":{\"en\":\"Vindolanda and Housesteads are two forts that were part of Hadrian's Wall.\",\"zh\":\"文多蘭達（Vindolanda）和豪斯泰德（Housesteads）是哈德良長城上的兩座堡壘。\"}},{\"id\":\"point-363\",\"questionId\":\"16-3\",\"text\":{\"en\":\"Sir Arthur Conan Doyle was a Scottish writer who created the famous fictional detective Sherlock Holmes.\",\"zh\":\"亞瑟·柯南·道爾爵士。他是蘇格蘭作家，創造了著名的虛構偵探福爾摩斯。\"}},{\"id\":\"point-364\",\"questionId\":\"16-4\",\"text\":{\"en\":\"Andrew Lloyd Webber is a highly successful British composer who wrote famous musicals like Cats, Evita, and The Phantom of the Opera.\",\"zh\":\"安德魯·洛伊·韋伯（Andrew Lloyd Webber）是位非常成功的英國作曲家，曾創作了《貓》、《艾薇塔》和《歌劇魅影》等著名音樂劇。\"}},{\"id\":\"point-367\",\"questionId\":\"16-7\",\"text\":{\"en\":\"Diwali is the Festival of Lights, celebrated by both Hindus and Sikhs.\",\"zh\":\"排燈節是印度教徒和錫克教徒共同慶祝的光明節。\"}},{\"id\":\"point-369\",\"questionId\":\"16-9\",\"text\":{\"en\":\"By law, television and radio coverage must be balanced and impartial, unlike newspapers which can support specific parties.\",\"zh\":\"法律規定，電視和廣播的報導必須保持平衡與公正，這與可以支持特定政黨的報紙不同。\"}},{\"id\":\"point-371\",\"questionId\":\"16-11\",\"text\":{\"en\":\"Auld Lang Syne is a traditional song frequently sung at New Year.\",\"zh\":\"《友誼萬歲》（Auld Lang Syne）是新年時常唱的歌曲。\"}},{\"id\":\"point-373\",\"questionId\":\"16-13\",\"text\":{\"en\":\"To apply for a National Insurance number, you must contact the Department for Work and Pensions (DWP) or apply online through the official government portal.\",\"zh\":\"要申請國民保險號碼，您必須聯繫就業及退休保障部（DWP）或透過官方政府網站進行線上申請。\"}},{\"id\":\"point-391\",\"questionId\":\"17-7\",\"text\":{\"en\":\"The Edinburgh Festival Fringe (often referred to as 'the Fringe') is the world's largest arts festival, taking place in Edinburgh every August.\",\"zh\":\"愛丁堡邊緣藝術節（Edinburgh Festival Fringe，通常簡稱為「the Fringe」）是全球最大的藝術節，於每年 8 月在愛丁堡舉行。\"}},{\"id\":\"point-404\",\"questionId\":\"17-20\",\"text\":{\"en\":\"Having a barbeque is not a traditional Christmas custom in the UK, as Christmas is in the winter when the weather is cold.\",\"zh\":\"在英國，吃燒烤並非傳統的聖誕習俗，因為聖誕節是在寒冷的冬季。\"}},{\"id\":\"point-414\",\"questionId\":\"18-6\",\"text\":{\"en\":\"A Welsh cake is a traditional sweet snack made from flour, dried fruits, and spices, baked on a griddle, and can be served hot or cold.\",\"zh\":\"威爾斯蛋糕（Welsh cake）是一種傳統的甜味點心，由麵粉、乾果和香料製成，在烤盤上烤製，可熱食或冷食。\"}},{\"id\":\"point-416\",\"questionId\":\"18-8\",\"text\":{\"en\":\"The Harry Potter film franchise is one of the most successful film franchises of all time and was produced in the UK.\",\"zh\":\"《哈利波特》系列是在英國製作的史上最成功及票房最高的電影系列之一。\"}}]}}]\n"])</script><script>self.__next_f.push([1,"d:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"13:I[27201,[\"/LifeInUK/_next/static/chunks/2t8yyem4st7i0.js\",\"/LifeInUK/_next/static/chunks/14mrh2-p_w84d.js\"],\"IconMark\"]\na:null\n"])</script><script>self.__next_f.push([1,"f:[[\"$\",\"title\",\"0\",{\"children\":\"Life in the UK Mock Test\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Bilingual Life in the UK Mock Test App\"}],[\"$\",\"link\",\"2\",{\"rel\":\"manifest\",\"href\":\"/LifeInUK/manifest.webmanifest\",\"crossOrigin\":\"$undefined\"}],[\"$\",\"meta\",\"3\",{\"name\":\"mobile-web-app-capable\",\"content\":\"yes\"}],[\"$\",\"meta\",\"4\",{\"name\":\"apple-mobile-web-app-title\",\"content\":\"LifeInUK\"}],[\"$\",\"meta\",\"5\",{\"name\":\"apple-mobile-web-app-status-bar-style\",\"content\":\"default\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:title\",\"content\":\"Life in the UK Mock Test\"}],[\"$\",\"meta\",\"7\",{\"property\":\"og:description\",\"content\":\"Bilingual Life in the UK Mock Test App\"}],[\"$\",\"meta\",\"8\",{\"property\":\"og:image\",\"content\":\"https://anthonytransform-ai.github.io/LifeInUK/LifeInUK/study/opengraph-image.jpg?opengraph-image.0vkqj1sd-lqs7.jpg\"}],[\"$\",\"meta\",\"9\",{\"property\":\"og:image:type\",\"content\":\"image/jpeg\"}],[\"$\",\"meta\",\"10\",{\"property\":\"og:image:width\",\"content\":\"1024\"}],[\"$\",\"meta\",\"11\",{\"property\":\"og:image:height\",\"content\":\"1024\"}],[\"$\",\"meta\",\"12\",{\"name\":\"twitter:card\",\"content\":\"summary_large_image\"}],[\"$\",\"meta\",\"13\",{\"name\":\"twitter:title\",\"content\":\"Life in the UK Mock Test\"}],[\"$\",\"meta\",\"14\",{\"name\":\"twitter:description\",\"content\":\"Bilingual Life in the UK Mock Test App\"}],[\"$\",\"meta\",\"15\",{\"name\":\"twitter:image\",\"content\":\
