:\"The first farmers arrived in Britain about 6,000 years ago from south-east Europe, bringing agriculture to the island.\",\"zh\":\"大約6,000年前，第一批農民從歐洲東南部來到不列顛，將農業帶到了這個島嶼。\"}},{\"id\":\"point-6\",\"questionId\":\"1-6\",\"text\":{\"en\":\"There are 15 national parks in Great Britain (10 in England, 3 in Wales, and 2 in Scotland).\",\"zh\":\"在大不列顛共有15個國家公園（英格蘭有10個，威爾斯有3個，蘇格蘭有2個）。\"}},{\"id\":\"point-11\",\"questionId\":\"1-11\",\"text\":{\"en\":\"Following the restoration of Charles II in 1660, the Church of England was restored as the official state church, and Puritans and Roman Catholics were barred from holding power.\",\"zh\":\"在1660年查理二世復辟後，英格蘭教會重新恢復為官方教會，清教徒和羅馬天主教徒均被排除在政治權力之外。\"}},{\"id\":\"point-19\",\"questionId\":\"1-19\",\"text\":{\"en\":\"The highest value note in general circulation in England is £50, though higher value notes exist in Scotland and Northern Ireland. The question is officially marked as False in the life in the UK test context.\",\"zh\":\"在英格蘭，一般流通中面值最高的紙幣是£50（儘管蘇格蘭和北愛爾蘭有發行更高面值的紙幣）。在英國生活考試的語境中，此題答案為錯誤。\"}},{\"id\":\"point-23\",\"questionId\":\"1-23\",\"text\":{\"en\":\"Crathes Castle is a 16th-century castle located near Banchory in Aberdeenshire, Scotland.\",\"zh\":\"克雷斯城堡 (Crathes Castle) 是一座位於蘇格蘭亞伯丁郡班科里附近的 16 世紀城堡。\"}},{\"id\":\"point-25\",\"questionId\":\"2-1\",\"text\":{\"en\":\"In Scotland, New Year's Eve is called Hogmanay.\",\"zh\":\"在蘇格蘭，新年前夕被稱為 Hogmanay。\"}},{\"id\":\"point-28\",\"questionId\":\"2-4\",\"text\":{\"en\":\"St George is the patron saint of England, celebrated on April 23rd.\",\"zh\":\"聖喬治是英格蘭的主保聖人，他的紀念日是4月23日。\"}},{\"id\":\"point-33\",\"questionId\":\"2-9\",\"text\":{\"en\":\"William the Conqueror commissioned the Domesday Book in 1086 to record the land and property in England.\",\"zh\":\"征服者威廉在1086年下令編纂《末日審判書》，以記錄英格蘭的土地和財產。\"}},{\"id\":\"point-39\",\"questionId\":\"2-15\",\"text\":{\"en\":\"By around AD 600, Anglo-Saxon kingdoms were established in Britain, mainly in what is now England.\",\"zh\":\"大約到公元600年，盎格魯-撒克遜王國已在不列顛建立，主要分佈在現今的英格蘭地區。\"}},{\"id\":\"point-41\",\"questionId\":\"2-17\",\"text\":{\"en\":\"Following the execution of King Charles I in 1649, England was declared a republic, known as the Commonwealth.\",\"zh\":\"1649年國王查理一世被處決後，英格蘭被宣布為共和國，稱為「聯邦」（the Commonwealth）。\"}},{\"id\":\"point-42\",\"questionId\":\"2-18\",\"text\":{\"en\":\"The Lake District is England's largest National Park, covering over 2,300 square kilometers and famous for its lakes and fells.\",\"zh\":\"湖區 (The Lake District) 是英格蘭最大的國家公園，面積超過 2,300 平方公里，以其湖泊和山峰而聞名。\"}},{\"id\":\"point-46\",\"questionId\":\"2-22\",\"text\":{\"en\":\"In Scotland, New Year's Eve is called Hogmanay, which is celebrated with various traditions like 'first-footing'.\",\"zh\":\"在蘇格蘭，除夕夜被稱為「霍格曼內」（Hogmanay），人們會透過「第一隻腳」（first-footing）等各種傳統活動來慶祝。\"}},{\"id\":\"point-57\",\"questionId\":\"3-9\",\"text\":{\"en\":\"Robert Burns, the national poet of Scotland, wrote his poetry in Scots, standard English, and a mixture of both.\",\"zh\":\"羅伯特·彭斯（Robert Burns）是蘇格蘭的民族詩人，他用蘇格蘭語、標準英語以及兩者的結合體創作詩歌。\"}},{\"id\":\"point-58\",\"questionId\":\"3-10\",\"text\":{\"en\":\"The Ashes is the famous biennial Test cricket series played between England and Australia, named after an obituary published in a British newspaper.\",\"zh\":\"「骨灰盃」是英格蘭和澳洲之間著名的兩年一度板球對抗賽，得名於一家英國報紙上發表的訃告。\"}},{\"id\":\"point-60\",\"questionId\":\"3-12\",\"text\":{\"en\":\"The Reformation was a 16th-century movement against the authority of the Pope and Catholic teachings, leading to the creation of the Church of England.\",\"zh\":\"宗教改革是16世紀反對教皇權威和天主教教義的運動，促成了英格蘭教會的創立。\"}},{\"id\":\"point-62\",\"questionId\":\"3-14\",\"text\":{\"en\":\"Before succeeding Elizabeth I as King James I of England in 1603, he ruled Scotland as King James VI.\",\"zh\":\"在 1603 年繼承伊莉莎白一世成為英格蘭國王詹姆士一世之前，他作為詹姆士六世統治蘇格蘭。\"}},{\"id\":\"point-63\",\"questionId\":\"3-15\",\"text\":{\"en\":\"Wales became formally united with England during the reign of Henry VIII under the Laws in Wales Acts.\",\"zh\":\"在亨利八世統治期間，通過《威爾斯法律法令》正式將威爾斯與英格蘭合併。\"}},{\"id\":\"point-66\",\"questionId\":\"3-18\",\"text\":{\"en\":\"The Lake District National Park is located in the north west of England and is famous for its lakes and mountains.\",\"zh\":\"湖區國家公園位於英格蘭西北部，以其湖泊和山脈而聞名。\"}},{\"id\":\"point-77\",\"questionId\":\"4-5\",\"text\":{\"en\":\"St Helena and the Falkland Islands are British Overseas Territories, but they are not part of Great Britain or the United Kingdom.\",\"zh\":\"聖海倫娜 （St Helena） 和福克蘭群島 （Falkland Islands） 是英國海外領地，但它們不屬於大不列顛 （Great Britain） 或聯合王國 （United Kingdom） 。\"}},{\"id\":\"point-84\",\"questionId\":\"4-12\",\"text\":{\"en\":\"Members of the House of Lords are not elected by a constituency. They are appointed or hereditary peers, or bishops of the Church of England.\",\"zh\":\"上議院議員並非由選區選舉產生。他們是受委任的終身貴族、世襲貴族或英格蘭教會的主教。\"}},{\"id\":\"point-85\",\"questionId\":\"4-13\",\"text\":{\"en\":\"Originally, Northern Ireland introduced individual registration in 2002. Great Britain (England, Scotland, and Wales) introduced individual electoral registration in 2014, where every voter must register individually rather than by household.\",\"zh\":\"最初，北愛爾蘭於2002年引入了個人登記制度。大不列顛（英格蘭、蘇格蘭和威爾斯）於2014年引入了個人選民登記制度，每位選民都必須單獨登記，而不是按戶登記。\"}},{\"id\":\"point-95\",\"questionId\":\"4-23\",\"text\":{\"en\":\"The modern game of golf can be traced back to 15th-century Scotland.\",\"zh\":\"現代高爾夫球運動起源於15世紀的蘇格蘭。\"}},{\"id\":\"point-97\",\"questionId\":\"5-1\",\"text\":{\"en\":\"St Helena and the Falkland Islands are two of the British overseas territories linked to the UK.\",\"zh\":\"聖赫勒拿和福克蘭群島是與英國相關聯的兩個海外領土。\"}},{\"id\":\"point-99\",\"questionId\":\"5-3\",\"text\":{\"en\":\"Bobby Moore was the captain of the England football team that won the FIFA World Cup in 1966.\",\"zh\":\"巴比·摩爾（Bobby Moore）是1966年贏得國際足總世界盃的英格蘭足球隊隊長。\"}},{\"id\":\"point-104\",\"questionId\":\"5-8\",\"text\":{\"en\":\"After the execution of Charles I, England became a republic called the Commonwealth.\",\"zh\":\"在查理一世被處決後，英格蘭成為一個共和國，被稱為英格蘭聯邦。\"}},{\"id\":\"point-105\",\"questionId\":\"5-9\",\"text\":{\"en\":\"St Patrick's Day is celebrated on 17th March and is the patron saint day of Northern Ireland.\",\"zh\":\"聖派翠克日於 3 月 17 日慶祝，是北愛爾蘭的主保聖人紀念日。\"}},{\"id\":\"point-110\",\"questionId\":\"5-14\",\"text\":{\"en\":\"St Andrew is the patron saint of Scotland, and St Andrew's Day is celebrated on 30 November.\",\"zh\":\"聖安德烈是蘇格蘭的守護聖人，每年的11月30日是聖安德烈日。\"}},{\"id\":\"point-123\",\"questionId\":\"6-3\",\"text\":{\"en\":\"In 1284, King Edward I annexed Wales to the Crown of England through the Statute of Rhuddlan.\",\"zh\":\"1284年，國王愛德華一世通過《魯德蘭法令》（Statute of Rhuddlan）將威爾斯併入英格蘭王室版圖。\"}},{\"id\":\"point-124\",\"questionId\":\"6-4\",\"text\":{\"en\":\"The Channel Islands and the Isle of Man are Crown dependencies, which are self-governing and not part of the United Kingdom.\",\"zh\":\"海峽群島（Channel Islands）和曼島是皇家屬地，實行自治，不屬於聯合王國的一部分。\"}},{\"id\":\"point-127\",\"questionId\":\"6-7\",\"text\":{\"en\":\"Golf is believed to have originated in Scotland in the 15th century.\",\"zh\":\"高爾夫球被認為起源於 15 世紀的蘇格蘭。\"}},{\"id\":\"point-132\",\"questionId\":\"6-12\",\"text\":{\"en\":\"In England, Wales, and Northern Ireland, a jury has 12 members. In Scotland, it has 15 members.\",\"zh\":\"在英格蘭、威爾斯和北愛爾蘭，陪審團有12名成員。在蘇格蘭則有15名成員。\"}},{\"id\":\"point-146\",\"questionId\":\"7-2\",\"text\":{\"en\":\"Loch Lomond and the Trossachs National Park is located in Scotland, featuring beautiful lakes and mountains.\",\"zh\":\"洛蒙德湖和特羅薩克斯國家公園位於蘇格蘭，以美麗的湖泊和山脈為特色。\"}},{\"id\":\"point-151\",\"questionId\":\"7-7\",\"text\":{\"en\":\"Scotland and Northern Ireland have their own banknotes. They are valid forms of payment anywhere in the UK.\",\"zh\":\"正確。蘇格蘭有自己發行的紙鈔，且在全英國皆為有效貨幣。\"}},{\"id\":\"point-154\",\"questionId\":\"7-10\",\"text\":{\"en\":\"Wales does not have an established church. Only England and Scotland have established churches.\",\"zh\":\"威爾斯沒有官方的國教。只有英格蘭和蘇格蘭有國教。\"}},{\"id\":\"point-161\",\"questionId\":\"7-17\",\"text\":{\"en\":\"In 1588, the English defeated the Spanish Armada, a large fleet of ships sent by Spain to conquer England.\",\"zh\":\"1588年，英國擊敗了由西班牙派來征服英國的龐大艦隊——西班牙無敵艦隊。\"}},{\"id\":\"point-165\",\"questionId\":\"7-21\",\"text\":{\"en\":\"The daffodil is the national flower associated with Wales.\",\"zh\":\"水仙花。水仙花是威爾斯的國花。\"}},{\"id\":\"point-166\",\"questionId\":\"7-22\",\"text\":{\"en\":\"William Caxton introduced the printing press to England in 1476, printing the first book in English.\",\"zh\":\"威廉·卡克斯頓於 1476 年將印刷機引入英格蘭，印刷了第一本英文書籍。\"}},{\"id\":\"point-167\",\"questionId\":\"7-23\",\"text\":{\"en\":\"The first Union Flag was created in 1606 during the reign of King James I, combining the flags of England and Scotland.\",\"zh\":\"第一面聯邦國旗創建於1606年詹姆士一世統治期間，將英格蘭和蘇格蘭的國旗結合在一起。\"}},{\"id\":\"point-170\",\"questionId\":\"8-2\",\"text\":{\"en\":\"St David's Day is the patron saint day of Wales and is celebrated annually on 1 March.\",\"zh\":\"聖大衛日是威爾斯的主保聖人紀念日，於每年的3月1日慶祝。\"}},{\"id\":\"point-178\",\"questionId\":\"8-10\",\"text\":{\"en\":\"The Northern Ireland Assembly has 90 members (known as MLAs).\",\"zh\":\"北愛爾蘭議會有 90 名成員（被稱為北愛爾蘭議會議員 MLAs）。\"}},{\"id\":\"point-180\",\"questionId\":\"8-12\",\"text\":{\"en\":\"The eldest son of the monarch, currently the Prince of Wales, is the heir to the British throne.\",\"zh\":\"君主的長子（目前是威爾斯親王）是英國王位的繼承人。\"}},{\"id\":\"point-181\",\"questionId\":\"8-13\",\"text\":{\"en\":\"The shamrock is the national flower and a well-known symbol of Northern Ireland.\",\"zh\":\"三葉草是北愛爾蘭的國花，也是其著名的象徵。\"}},{\"id\":\"point-184\",\"questionId\":\"8-16\",\"text\":{\"en\":\"The Norman Conquest of 1066, led by William the Conqueror, was the last successful foreign invasion of England.\",\"zh\":\"1066年由征服者威廉領導的諾曼征服是英格蘭歷史上最後一次成功的外部入侵。\"}},{\"id\":\"point-193\",\"questionId\":\"9-1\",\"text\":{\"en\":\"Devolved administrations in Scotland, Wales, and Northern Ireland control local matters like health and education. Matters affecting the whole UK, such as defence and social security, are reserved for Westminster.\",\"zh\":\"蘇格蘭、威爾斯和北愛爾蘭的權力下放政府控制著醫療和教育等地方事務。而影響整個英國的事務，如國防和社會保障，則保留給西敏寺（英國議會）。\"}},{\"id\":\"point-194\",\"questionId\":\"9-2\",\"text\":{\"en\":\"The Hundred Years War was a long-running conflict between England and France that lasted 116 years.\",\"zh\":\"百年戰爭是英格蘭和法國之間長達116年的衝突。\"}},{\"id\":\"point-196\",\"questionId\":\"9-4\",\"text\":{\"en\":\"Belfast is the capital and largest city of Northern Ireland.\",\"zh\":\"貝爾法斯特是北愛爾蘭的首都和最大的城市。\"}},{\"id\":\"point-199\",\"questionId\":\"9-7\",\"text\":{\"en\":\"The Lake District is the largest national park in England, known for its lakes and mountains.\",\"zh\":\"正確。湖區是英格蘭面積最大的國家公園。\"}},{\"id\":\"point-201\",\"questionId\":\"9-9\",\"text\":{\"en\":\"In 1588, Spain sent the Spanish Armada—a large fleet of ships—to invade England, but it was defeated by the English navy and storms.\",\"zh\":\"1588 年，西班牙派遣了西班牙無敵艦隊 (一隻龐大的船隊) 入侵英格蘭，但被英格蘭海軍和風暴所擊敗。\"}},{\"id\":\"point-205\",\"questionId\":\"9-13\",\"text\":{\"en\":\"The devolved Scottish Parliament is located in Edinburgh, the capital city of Scotland.\",\"zh\":\"權力下放的蘇格蘭議會部位於蘇格蘭首府愛丁堡。\"}},{\"id\":\"point-211\",\"questionId\":\"9-19\",\"text\":{\"en\":\"The Battle of the Boyne (fought in 1690) is commemorated as a bank holiday in Northern Ireland on 12th July.\",\"zh\":\"博因河戰役（1690年爆發）在北愛爾蘭被列為公眾假期，於每年的7月12日進行紀念。\"}},{\"id\":\"point-223\",\"questionId\":\"10-7\",\"text\":{\"en\":\"Banknotes printed in Scotland and Northern Ireland are valid currency throughout the UK, though businesses are not legally required to accept them.\",\"zh\":\"蘇格蘭和北愛爾蘭印製的紙幣在整個英國都是有效貨幣，儘管法律並未強制要求商家必須接受它們。\"}},{\"id\":\"point-235\",\"questionId\":\"10-19\",\"text\":{\"en\":\"The Domesday Book detailed the land and population of England after the Norman Conquest.\",\"zh\":\"《末日審判書》（The Domesday Book）詳細記載了諾曼征服後英格蘭土地和人口的狀況。\"}},{\"id\":\"point-238\",\"questionId\":\"10-22\",\"text\":{\"en\":\"Great Britain consists of England, Scotland, and Wales. It does not include Northern Ireland.\",\"zh\":\"大不列顛 （Great Britain） 由英格蘭、蘇格蘭和威爾斯組成，不包括北愛爾蘭。\"}},{\"id\":\"point-242\",\"questionId\":\"11-2\",\"text\":{\"en\":\"Emperor Hadrian ordered the building of Hadrian's Wall in the north of England to protect the Roman province from the Picts.\",\"zh\":\"羅馬皇帝哈德良（Emperor Hadrian）下令在英格蘭北部建造哈德良長城，以抵禦皮克特人（蘇格蘭人的祖先）入侵羅馬省份。\"}},{\"id\":\"point-243\",\"questionId\":\"11-3\",\"text\":{\"en\":\"A criminal jury in Scotland consists of 15 members, unlike the 12-member juries used in England, Wales, and Northern Ireland.\",\"zh\":\"蘇格蘭的刑事陪審團由15名成員組成，與英格蘭、威爾斯和北愛爾蘭所使用的12人陪審團不同。\"}},{\"id\":\"point-246\",\"questionId\":\"11-6\",\"text\":{\"en\":\"The monarch is the head of the Church of England, which is an established church.\",\"zh\":\"君主是英格蘭教會的領袖，該教會是國定教會。\"}},{\"id\":\"point-254\",\"questionId\":\"11-14\",\"text\":{\"en\":\"The Act of Union in 1707 united Scotland with England and Wales to create Great Britain, but Scotland kept its own legal and educational systems, as well as its Presbyterian Church (the Church of Scotland).\",\"zh\":\"1707年的《聯合法令》將蘇格蘭與英格蘭及威爾斯合併為大不列顛，但蘇格蘭保留了其獨立的法律和教育體系，以及其長老會（蘇格蘭教會）。\"}},{\"id\":\"point-258\",\"questionId\":\"11-18\",\"text\":{\"en\":\"Great Britain consists of England, Wales, and Scotland. It does not include Northern Ireland.\",\"zh\":\"正確。大不列顛包含英格蘭、蘇格蘭和威爾斯，不包括北愛爾蘭。\"}},{\"id\":\"point-260\",\"questionId\":\"11-20\",\"text\":{\"en\":\"The Falkland Islands are a British overseas territory but they are not constitutionally part of the United Kingdom.\",\"zh\":\"福克蘭群島是英國海外領土，但它們在憲法上不屬於聯合王國（英國本土）的一部分。\"}},{\"id\":\"point-263\",\"questionId\":\"11-23\",\"text\":{\"en\":\"There is no established Church in Northern Ireland or Wales. The Church of England is the established church in England.\",\"zh\":\"北愛爾蘭和威爾斯沒有國定教會。英格蘭教會是英格蘭的國定教會。\"}},{\"id\":\"point-271\",\"questionId\":\"12-7\",\"text\":{\"en\":\"Elizabeth I was a Protestant and re-established the Church of England as the official state church after the Catholic reign of her sister Mary I.\",\"zh\":\"伊莉莎白一世是新教徒，在她姊姊瑪麗一世的天主教統治之後，她重新確立了英格蘭教會（聖公會）為官方國教。\"}},{\"id\":\"point-273\",\"questionId\":\"12-9\",\"text\":{\"en\":\"Complaints against the police can be made at any police station, or in writing to the Chief Constable of the police force concerned, or to an independent body (such as the Independent Office for Police Conduct in England and Wales).\",\"zh\":\"對警方的投訴可以在任何警署提出，也可以寫信給相關警隊的總警司，或者向獨立機構 （例如英格蘭和威爾斯的警察行為獨立辦公室） 投訴。\"}},{\"id\":\"point-275\",\"questionId\":\"12-11\",\"text\":{\"en\":\"Cardiff is the capital city of Wales.\",\"zh\":\"卡地夫是威爾斯的首都。\"}},{\"id\":\"point-276\",\"questionId\":\"12-12\",\"text\":{\"en\":\"The Six Nations Championship is a rugby union competition between England, France, Ireland, Italy, Scotland and Wales.\",\"zh\":\"六國錦標賽是一項由英格蘭、法國、愛爾蘭、義大利、蘇格蘭和威爾斯參加的橄欖球聯合會比賽。\"}},{\"id\":\"point-280\",\"questionId\":\"12-16\",\"text\":{\"en\":\"To serve on a jury in the UK, you must be aged between 18 and 70 (in England, Wales, and Northern Ireland) or up to 75 (in Scotland).\",\"zh\":\"在英國擔任陪審員，您必須年滿 18 歲至 70 歲之間 (英格蘭、威爾斯和北愛爾蘭) 或 75 歲以下 (蘇格蘭)。\"}},{\"id\":\"point-282\",\"questionId\":\"12-18\",\"text\":{\"en\":\"Snowdonia is a mountainous national park located in Wales.\",\"zh\":\"斯諾登尼亞是位於威爾斯的一個國家公園。\"}},{\"id\":\"point-283\",\"questionId\":\"12-19\",\"text\":{\"en\":\"The Norman Conquest in 1066, led by William the Conqueror, Duke of Normandy, was the last successful foreign invasion of England.\",\"zh\":\"1066年由諾曼第公爵征服者威廉領導的諾曼征服，是英格蘭歷史上最後一次成功的外來入侵。\"}},{\"id\":\"point-288\",\"questionId\":\"12-24\",\"text\":{\"en\":\"Henry VIII established the Church of England so he could divorce his first wife, Catherine of Aragon, which the Pope had refused to allow.\",\"zh\":\"為了與他的第一任妻子阿拉貢的凱瑟琳離婚。教宗拒絕批准離婚，因此亨利八世脫離羅馬天主教會，建立了英格蘭教會。\"}},{\"id\":\"point-290\",\"questionId\":\"13-2\",\"text\":{\"en\":\"The Huguenots were French Protestants who fled persecution in France between 1680 and 1720, with many settling in England.\",\"zh\":\"雨格諾派是法國的新教徒，他們在 1680 年至 1720 年間逃離法國的迫害，許多人選擇定居於英格蘭。\"}},{\"id\":\"point-292\",\"questionId\":\"13-4\",\"text\":{\"en\":\"The Norman Conquest of 1066, led by William the Conqueror, was the last successful foreign invasion of England.\",\"zh\":\"1066年由征服者威廉領導的諾曼第征服，是最後一次成功入侵英格蘭的戰役。\"}},{\"id\":\"point-296\",\"questionId\":\"13-8\",\"text\":{\"en\":\"The Eden Project is located in Cornwall, in the south-west of England.\",\"zh\":\"伊甸園計劃 （Eden Project） 位於英格蘭西南部的康瓦爾 （Cornwall） 。\"}},{\"id\":\"point-303\",\"questionId\":\"13-15\",\"text\":{\"en\":\"The Church of Scotland is a Presbyterian church and has no established status or head.\",\"zh\":\"蘇格蘭教會 （Church of Scotland） 是長老會 （Presbyterian） 教會，沒有國定地位或元首。\"}},{\"id\":\"point-305\",\"questionId\":\"13-17\",\"text\":{\"en\":\"The Union Jack (or Union Flag) is the national flag of the United Kingdom, combining the crosses of England, Scotland, and Ireland.\",\"zh\":\"米字旗 (Union Jack，或稱聯合傑克) 是聯合王國的國旗，它融合了英格蘭、蘇格蘭和愛爾蘭的十字旗。\"}},{\"id\":\"point-306\",\"questionId\":\"13-18\",\"text\":{\"en\":\"The Spanish Armada was a fleet of ships sent by King Philip II of Spain in 1588 to invade England.\",\"zh\":\"西班牙無敵艦隊（Spanish Armada）是西班牙國王腓力二世於 1588 年派遣企圖入侵英格蘭的船隊。\"}},{\"id\":\"point-309\",\"questionId\":\"13-21\",\"text\":{\"en\":\"Minor criminal cases in England, Wales and Northern Ireland are dealt with in a Magistrates' Court.\",\"zh\":\"在英格蘭、威爾斯和北愛爾蘭，輕微刑事案件由裁判司署（Magistrates' Court）處理。\"}},{\"id\":\"point-313\",\"questionId\":\"14-1\",\"text\":{\"en\":\"The thistle is the traditional national emblem and flower of Scotland.\",\"zh\":\"薊花是蘇格蘭傳統的國家象徵和國花。\"}},{\"id\":\"point-315\",\"questionId\":\"14-3\",\"text\":{\"en\":\"William Caxton was the first person in England to print books using a printing press.\",\"zh\":\"威廉·卡克斯頓（William Caxton）是英格蘭第一個使用印刷機印書的人。\"}},{\"id\":\"point-320\",\"questionId\":\"14-8\",\"text\":{\"en\":\"The Channel Islands and the Isle of Man are Crown dependencies but are not part of the United Kingdom.\",\"zh\":\"海峽群島 and 曼島是皇家屬地，但並非聯合王國（英國）的一部分。\"}},{\"id\":\"point-326\",\"questionId\":\"14-14\",\"text\":{\"en\":\"The Black Death was a bubonic plague pandemic that struck Britain in 1348 and killed about a third of the population.\",\"zh\":\"黑死病是1348年席捲英國的腺鼠疫大流行，導致約三分之一的人口死亡。\"}},{\"id\":\"point-329\",\"questionId\":\"14-17\",\"text\":{\"en\":\"The 1944 Education Act, also known as the Butler Act, introduced free secondary education for all in England and Wales.\",\"zh\":\"1944年的《教育法》（也稱為巴特勒法案）在英格蘭和威爾斯為所有人引入了免費的中學教育。\"}},{\"id\":\"point-330\",\"questionId\":\"14-18\",\"text\":{\"en\":\"St Andrew is the patron saint of Scotland. His feast day is celebrated on 30 November.\",\"zh\":\"聖安得烈（St Andrew）是蘇格蘭的守護聖人。他的節日是在11月30日。\"}},{\"id\":\"point-333\",\"questionId\":\"14-21\",\"text\":{\"en\":\"The Ulster Fry is a traditional food in Northern Ireland.\",\"zh\":\"阿爾斯特炸丸子（Ulster Fry）是北愛爾蘭的傳統美食。\"}},{\"id\":\"point-334\",\"questionId\":\"14-22\",\"text\":{\"en\":\"Magistrates' Courts deal with minor criminal offences, and the vast majority of criminal cases in England, Wales, and Northern Ireland are handled there.\",\"zh\":\"地方法院（Magistrates' Court）處理輕微刑事犯罪，英格蘭、威爾斯和北愛爾蘭絕大多數的刑事案件都在地方法院審理。\"}},{\"id\":\"point-341\",\"questionId\":\"15-5\",\"text\":{\"en\":\"As the eldest son of Queen Elizabeth II and heir apparent, Prince Charles was given the traditional title of the Prince of Wales.\",\"zh\":\"作為伊麗莎白二世女王的長子和法定繼承人，查爾斯王子被授予傳統的威爾斯親王（Prince of Wales）頭銜。\"}},{\"id\":\"point-342\",\"questionId\":\"15-6\",\"text\":{\"en\":\"Wales is not represented on the Union Flag (Union Jack) because Wales was already united with England when the first flag was created in 1606.\",\"zh\":\"威爾斯沒有在聯邦國旗上體現，因為在1606年設計第一面國旗時，威爾斯已經與英格蘭合併。\"}},{\"id\":\"point-347\",\"questionId\":\"15-11\",\"text\":{\"en\":\"The Archbishop of Canterbury is the spiritual leader of the Church of England (and the global Anglican Communion).\",\"zh\":\"坎特伯雷大主教是英格蘭教會 (以及全球聖公會) 的精神領袖。\"}},{\"id\":\"point-348\",\"questionId\":\"15-12\",\"text\":{\"en\":\"The Tower of London was built by William the Conqueror after his invasion of England in 1066.\",\"zh\":\"倫敦塔是由征服者威廉 （William the Conqueror） 在 1066 年入侵英格蘭後建造的。\"}},{\"id\":\"point-349\",\"questionId\":\"15-13\",\"text\":{\"en\":\"St Patrick's Day is the patron saint day of Ireland and is a public holiday in Northern Ireland, celebrated on 17 March.\",\"zh\":\"聖派翠克節是北愛爾蘭的公眾假期，於3月17日慶祝。\"}},{\"id\":\"point-351\",\"questionId\":\"15-15\",\"text\":{\"en\":\"In 1588, Spain sent a large fleet of ships, known as the Spanish Armada, to conquer England and restore Catholicism, but it was defeated.\",\"zh\":\"在 1588 年，西班牙派遣了一支被稱為「西班牙無敵艦隊」的大型船隊企圖征服英格蘭並恢復天主教，但最終被擊敗。\"}},{\"id\":\"point-354\",\"questionId\":\"15-18\",\"text\":{\"en\":\"To serve on a jury, you must be aged between 18 and 75 (in England, Wales, and Northern Ireland) and registered to vote.\",\"zh\":\"要擔任陪審員，您必須年滿18至75歲（在英格蘭、威爾斯和北愛爾蘭），且已註冊為選民。\"}},{\"id\":\"point-362\",\"questionId\":\"16-2\",\"text\":{\"en\":\"Edinburgh is the capital of Scotland and has been its capital since the 15th century.\",\"zh\":\"愛丁堡是蘇格蘭的首府，自15世紀以來一直是其政治中心。\"}},{\"id\":\"point-366\",\"questionId\":\"16-6\",\"text\":{\"en\":\"William Shakespeare was born in Stratford-upon-Avon, England, in April 1564.\",\"zh\":\"威廉 · 莎士比亞 （William Shakespeare） 於 1564 年 4 月出生於英格蘭的雅芳河畔斯特拉特福 （Stratford-upon-Avon） 。\"}},{\"id\":\"point-374\",\"questionId\":\"16-14\",\"text\":{\"en\":\"St Andrew's Day, the patron saint day of Scotland, is celebrated on 30 November.\",\"zh\":\"聖安德魯斯日（St Andrew's Day）是蘇格蘭的守護神節日，於每年的 11 月 30 日慶祝。\"}},{\"id\":\"point-376\",\"questionId\":\"16-16\",\"text\":{\"en\":\"The UK government has suspended the Northern Ireland Assembly on several occasions when the power-sharing agreement broke down.\",\"zh\":\"在權力分享協議破裂時，英國政府曾多次暫停北愛爾蘭議會的運作。\"}},{\"id\":\"point-377\",\"questionId\":\"16-17\",\"text\":{\"en\":\"St George's Day is celebrated on 23rd April and is the patron saint day of England.\",\"zh\":\"聖喬治日於 4 月 23 日慶祝，是英格蘭的主保聖人紀念日。\"}},{\"id\":\"point-379\",\"questionId\":\"16-19\",\"text\":{\"en\":\"Swansea is the second-largest city in Wales, located on the southwest coast.\",\"zh\":\"斯旺西是威爾斯的第二大城市，位於西南部海岸。\"}},{\"id\":\"point-389\",\"questionId\":\"17-5\",\"text\":{\"en\":\"Unlike the rest of the UK previously, Northern Ireland used 'individual registration' where everyone must complete their own form to vote.\",\"zh\":\"與英國其他地區過去的情況不同，北愛爾蘭採用了「個人登記」制度，每個人都必須自己填寫表格才能投票。\"}},{\"id\":\"point-398\",\"questionId\":\"17-14\",\"text\":{\"en\":\"Great Britain consists only of England, Scotland, and Wales. Northern Ireland is part of the United Kingdom of Great Britain and Northern Ireland, but not part of Great Britain itself.\",\"zh\":\"大不列顛僅由英格蘭、蘇格蘭和威爾斯組成。北愛爾蘭是「大不列顛與北愛爾蘭聯合王國」的一部分，但本身不屬於大不列顛。\"}},{\"id\":\"point-419\",\"questionId\":\"18-11\",\"text\":{\"en\":\"In England, Wales, and Northern Ireland, the names or photographs of young people under 18 who are found guilty of a crime cannot be published in newspapers or used by the media.\",\"zh\":\"在英格蘭、威爾斯和北愛爾蘭，媒體或報紙不得公布被判有罪的 18 歲以下青少年的姓名或照片。\"}},{\"id\":\"point-424\",\"questionId\":\"18-16\",\"text\":{\"en\":\"St David is the patron saint of Wales, and St David's Day is celebrated on 1 March.\",\"zh\":\"聖大衛。他是威爾斯的守護神，聖大衛日為3月1日。\"}},{\"id\":\"point-429\",\"questionId\":\"18-21\",\"text\":{\"en\":\"The Northern Ireland Assembly uses the Single Transferable Vote system, which is a form of proportional representation.\",\"zh\":\"北愛爾蘭議會使用單一可轉移票制 (Single Transferable Vote)，這是一種比例代表制形式。\"}},{\"id\":\"point-430\",\"questionId\":\"18-22\",\"text\":{\"en\":\"Saint Patrick is the patron saint of Northern Ireland. His feast day is celebrated on the 17th of March.\",\"zh\":\"聖派翠克 （St Patrick） 是北愛爾蘭的主保聖人。他的節日在每年的 3 月 17 日慶祝。\"}}]}}]\n"])</script><script>self.__next_f.push([1,"d:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next
