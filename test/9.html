LifeInUK/_next/static/chunks/14mrh2-p_w84d.js\",\"/LifeInUK/_next/static/chunks/1mgn7-b_f-rf5.js\"],\"default\"]\n"])</script><script>self.__next_f.push([1,"6:[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-6 w-full flex-1 flex flex-col\",\"children\":[\"$\",\"$L11\",null,{\"mockTest\":{\"setId\":9,\"title\":{\"en\":\"Mock Exam Set 9\",\"zh\":\"模擬考試 第9套\"},\"questions\":[{\"id\":\"9-1\",\"question\":{\"en\":\"Which two issues can the devolved administrations pass laws on?\",\"zh\":\"權力下放的政府可以就哪兩個議題通過法律？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Defence\",\"zh\":\"國防\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Social security\",\"zh\":\"社會保障\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Health\",\"zh\":\"醫療衛生\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Education\",\"zh\":\"教育\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Devolved administrations in Scotland, Wales, and Northern Ireland control local matters like health and education. Matters affecting the whole UK, such as defence and social security, are reserved for Westminster.\",\"zh\":\"蘇格蘭、威爾斯和北愛爾蘭的權力下放政府控制著醫療和教育等地方事務。而影響整個英國的事務，如國防和社會保障，則保留給西敏寺（英國議會）。\"}},{\"id\":\"9-2\",\"question\":{\"en\":\"What is the name of the long war that English kings fought with France in the middle ages?\",\"zh\":\"中世紀英國國王與法國進行的長期戰爭稱為什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Crimean War\",\"zh\":\"克里米亞戰爭\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The First World War\",\"zh\":\"第一次世界大戰\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Hundred Years War\",\"zh\":\"百年戰爭\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"The Boer War\",\"zh\":\"波耳戰爭\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Hundred Years War was a long-running conflict between England and France that lasted 116 years.\",\"zh\":\"百年戰爭是英格蘭和法國之間長達116年的衝突。\"}},{\"id\":\"9-3\",\"question\":{\"en\":\"How did Charles II manage to escape to Europe after his defeat in the Civil War?\",\"zh\":\"在內戰戰敗後，查理二世是如何成功逃往歐洲的？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Hiding in a farmer's house\",\"zh\":\"躲在農夫的家裡\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Riding a horse\",\"zh\":\"騎馬\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Hiding in an oak tree\",\"zh\":\"躲在一棵橡樹中\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Swimming\",\"zh\":\"游泳\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Following his defeat at the Battle of Worcester in 1651, Charles II escaped capture by hiding in a royal oak tree before fleeing to Europe.\",\"zh\":\"在 1651 年的伍斯特戰役中戰敗後，查理二世通過躲藏在一棵皇家橡樹中逃脫了抓捕，隨後逃往歐洲。\"}},{\"id\":\"9-4\",\"question\":{\"en\":\"What is the capital city of Northern Ireland?\",\"zh\":\"北愛爾蘭的首都是哪裡？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Cork\",\"zh\":\"科克\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Edinburgh\",\"zh\":\"愛丁堡\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Belfast\",\"zh\":\"貝爾法斯特 (Belfast)\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Dublin\",\"zh\":\"都柏林\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Belfast is the capital and largest city of Northern Ireland.\",\"zh\":\"貝爾法斯特是北愛爾蘭的首都和最大的城市。\"}},{\"id\":\"9-5\",\"question\":{\"en\":\"The War of the Roses was fought by the supporters of which TWO families in order to decide who should be King of England?\",\"zh\":\"玫瑰戰爭（War of the Roses）是由哪兩個家族的支持者進行的，以決定誰應該成為英格蘭國王？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The House of Windsor\",\"zh\":\"溫莎王朝\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The House of York\",\"zh\":\"約克家族\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"The House of Lancaster\",\"zh\":\"蘭開斯特家族\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"The House of Tudor\",\"zh\":\"都鐸王朝\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Wars of the Roses (1455–1487) were a series of civil wars fought for the English throne between supporters of the House of Lancaster (red rose) and the House of York (white rose).\",\"zh\":\"玫瑰戰爭（1455-1487年）是蘭開斯特家族（紅玫瑰）與約克家族（白玫瑰）的支持者之間為了爭奪英格蘭王位而進行的一系列內戰。\"}},{\"id\":\"9-6\",\"question\":{\"en\":\"Ian McEwan, Hilary Mantel and Julian Barnes have all won which literary prize?\",\"zh\":\"伊恩·麥克伊旺（Ian McEwan）、希拉蕊·曼特爾（Hilary Mantel）和朱利安·巴恩斯（Julian Barnes）都曾獲得過哪一個文學獎項？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Nobel Prize in Literature\",\"zh\":\"諾貝爾文學獎\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The Man Booker Prize\",\"zh\":\"布克獎\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"The Mercury Prize\",\"zh\":\"水星音樂獎\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The Turner Prize\",\"zh\":\"特納獎\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Ian McEwan, Hilary Mantel, and Julian Barnes are prominent contemporary British novelists who have all won the prestigious Man Booker Prize (now Booker Prize) for Fiction.\",\"zh\":\"伊恩·麥克伊旺、希拉蕊·曼特爾和朱利安·巴恩斯都是著名的英國當代小說家，均曾榮獲享譽盛名的布克獎（Man Booker Prize）。\"}},{\"id\":\"9-7\",\"question\":{\"en\":\"Lake District is the largest national park of England.\",\"zh\":\"湖區 (Lake District) 是英格蘭最大的國家公園。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Lake District is the largest national park in England, known for its lakes and mountains.\",\"zh\":\"正確。湖區是英格蘭面積最大的國家公園。\"}},{\"id\":\"9-8\",\"question\":{\"en\":\"If a husband forces his wife to have sex he can be charged with rape.\",\"zh\":\"如果丈夫強迫妻子進行性行為，他可能會被指控強姦。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"In the UK, rape within marriage is a criminal offence, and a husband can be charged with raping his wife.\",\"zh\":\"在英國，婚內強姦屬於刑事犯罪，丈夫可能因強迫妻子進行性行為而被指控強姦罪。\"}},{\"id\":\"9-9\",\"question\":{\"en\":\"Which country sent a fleet of ships to England in 1588?\",\"zh\":\"哪個國家在 1588 年向英格蘭派遣了一支船隊？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"France\",\"zh\":\"法國\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Germany\",\"zh\":\"德國\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Spain\",\"zh\":\"西班牙\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Italy\",\"zh\":\"義大利\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"In 1588, Spain sent the Spanish Armada—a large fleet of ships—to invade England, but it was defeated by the English navy and storms.\",\"zh\":\"1588 年，西班牙派遣了西班牙無敵艦隊 (一隻龐大的船隊) 入侵英格蘭，但被英格蘭海軍和風暴所擊敗。\"}},{\"id\":\"9-10\",\"question\":{\"en\":\"Which stories are associated with Geoffrey Chaucer?\",\"zh\":\"哪些故事與傑弗里·喬叟 (Geoffrey Chaucer) 有關？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Cambridge Tales\",\"zh\":\"劍橋故事集\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The Eastbourne Tales\",\"zh\":\"伊斯特本故事集\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Canterbury Tales\",\"zh\":\"坎特伯雷故事集 (The Canterbury Tales)\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"The London Tales\",\"zh\":\"倫敦故事集\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Geoffrey Chaucer wrote 'The Canterbury Tales', a famous collection of stories from the Middle Ages.\",\"zh\":\"傑弗里·喬叟創作了著名的中世紀故事集《坎特伯雷故事集》。\"}},{\"id\":\"9-11\",\"question\":{\"en\":\"Which two languages were used across England during the Middle Ages?\",\"zh\":\"中世紀期間英國普遍使用哪兩種語言？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Welsh\",\"zh\":\"威爾斯語\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Gaelic\",\"zh\":\"蓋爾語\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Norman French\",\"zh\":\"諾曼法語\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Anglo-Saxon\",\"zh\":\"盎格魯-撒克遜語\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"During the Middle Ages in England, nobles spoke Norman French while peasants spoke Anglo-Saxon.\",\"zh\":\"中世紀的英格蘭，貴族說諾曼法語，而農民說盎格魯-撒克遜語。\"}},{\"id\":\"9-12\",\"question\":{\"en\":\"What is the minimum age required to drive a motorcycle?\",\"zh\":\"駕駛摩托車的最低年齡要求是多少？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"16 years old\",\"zh\":\"16歲\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"17 years old\",\"zh\":\"17歲\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"18 years old\",\"zh\":\"18歲\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"21 years old\",\"zh\":\"21歲\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"In the UK, the minimum age to drive a car or motorcycle is 17 (16 for a moped).\",\"zh\":\"在英國，駕駛摩托車和汽車的最低年齡為17歲（輕便摩托車為16歲）。\"}},{\"id\":\"9-13\",\"question\":{\"en\":\"In which city is the Scottish Parliament based?\",\"zh\":\"蘇格蘭議會總部設在哪個城市？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Cardiff\",\"zh\":\"卡地夫\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Sheffield\",\"zh\":\"雪菲爾\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Edinburgh\",\"zh\":\"愛丁堡\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Glasgow\",\"zh\":\"格拉斯哥\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The devolved Scottish Parliament is located in Edinburgh, the capital city of Scotland.\",\"zh\":\"權力下放的蘇格蘭議會部位於蘇格蘭首府愛丁堡。\"}},{\"id\":\"9-14\",\"question\":{\"en\":\"MPs can only be contacted at their office in the House of Commons.\",\"zh\":\"國會議員 (MPs) 只能在其下議院的辦公室取得聯繫。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"You can contact MPs by writing to them at their office in the House of Commons, but they also hold local surgeries in their constituencies, and you can email or phone them.\",\"zh\":\"您可以寫信給下議院辦公室的國會議員，但他們也會在其選區舉行選民接待日，您也可以通過電子郵件或電話與他們聯繫。\"}},{\"id\":\"9-15\",\"question\":{\"en\":\"What is the name of the process by which many Scottish landlords destroyed individual small farms (known as 'crofts') to make space for large flocks of sheep and cattle?\",\"zh\":\"許多蘇格蘭地主摧毀被稱為「小農莊」（crofts）的個人小農場，以騰出空間放牧大量綿羊和牛群，這一過程的名稱是什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Black Death\",\"zh\":\"黑死病\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The Corn Removal\",\"zh\":\"穀物移除\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Highland Clearances\",\"zh\":\"高地清洗\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"The Enlightenment\",\"zh\":\"啟蒙運動\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"During the Highland Clearances in the late 18th and early 19th centuries, Scottish landlords evicted small crofters from their land to make room for large-scale sheep farming.\",\"zh\":\"在18世紀末至19世紀初的高地清洗期間，蘇格蘭地主將小農戶驅逐出他們的土地，以便為大規模的綿羊放牧騰出空間。\"}},{\"id\":\"9-16\",\"question\":{\"en\":\"In England, Wales and Northern Ireland Youth Court cases are normally heard by (choose TWO answers)?\",\"zh\":\"在英格蘭、威爾斯和北愛爾蘭，青年法院的案件通常由誰審理（請選擇兩個答案）？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Up to 3 specially trained magistrates\",\"zh\":\"最多3名受過專門訓練的治安推事\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"A District Judge\",\"zh\":\"一名地方法官\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"A sheriff\",\"zh\":\"一名郡長 (sheriff)\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Up to 5 specially trained magistrates\",\"zh\":\"最多5名受過專門訓練的治安推事\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Youth Court cases are normally heard by up to 3 specially trained magistrates or a District Judge.\",\"zh\":\"青年法院的案件通常由最多3名受過專門訓練的治安推事或1名地方法官審理。\"}},{\"id\":\"9-17\",\"question\":{\"en\":\"What is the name of the UK currency?\",\"zh\":\"英國貨幣的名稱是什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Euro\",\"zh\":\"歐元（Euro）\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Pound Sterling\",\"zh\":\"英鎊（Pound Sterling）\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Peso\",\"zh\":\"披索（Peso）\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Dollar\",\"zh\":\"元/美金（Dollar）\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The official currency of the United Kingdom is the Pound Sterling (£).\",\"zh\":\"聯合王國的官方貨幣是英鎊（Pound Sterling，符號為 £）。\"}},{\"id\":\"9-18\",\"question\":{\"en\":\"During the rebellion of the clans in Scotland, Bonnie Prince Charlie was supported by clansmen from which Scottish region?\",\"zh\":\"在蘇格蘭部落起義期間，美男子查理王子 (Bonnie Prince Charlie) 得到了蘇格蘭哪個地區部落成員的支持？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Glasgow\",\"zh\":\"格拉斯哥\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Galloway\",\"zh\":\"加洛韋\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Highlands\",\"zh\":\"高地地區 (Highlands)\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Edinburgh\",\"zh\":\"愛丁堡\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Bonnie Prince Charlie (Charles Edward Stuart) was supported by clansmen from the Highlands during the Jacobite uprising of 1745.\",\"zh\":\"在 1745 年的詹姆士黨起義期間，美男子查理王子 (Charles Edward Stuart) 得到了來自蘇格蘭高地 (Highlands) 部落成員的支持。\"}},{\"id\":\"9-19\",\"question\":{\"en\":\"The Battle of Boyne is celebrated with a bank holiday in which country?\",\"zh\":\"博因河戰役（The Battle of Boyne）在哪個國家是以公眾假期來慶祝的？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Scotland\",\"zh\":\"蘇格蘭\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"England\",\"zh\":\"英格蘭\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Northern Ireland\",\"zh\":\"北愛爾蘭\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Wales\",\"zh\":\"威爾斯\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Battle of the Boyne (fought in 1690) is commemorated as a bank holiday in Northern Ireland on 12th July.\",\"zh\":\"博因河戰役（1690年爆發）在北愛爾蘭被列為公眾假期，於每年的7月12日進行紀念。\"}},{\"id\":\"9-20\",\"question\":{\"en\":\"How many times has the UK hosted the Olympic games?\",\"zh\":\"英國舉辦過幾次奧林匹克運動會？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"5\",\"zh\":\"5\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"3\",\"zh\":\"3\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"4\",\"zh\":\"4\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"8\",\"zh\":\"8\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The UK has hosted the Olympic games three times (in 1908, 1948 and 2012).\",\"zh\":\"英國曾三次舉辦奧林匹克運動會（分別在1908年、1948年和2012年）。\"}},{\"id\":\"9-21\",\"question\":{\"en\":\"Which TWO of the following are freedoms offered to citizens and permanent residents of the UK?\",\"zh\":\"以下哪兩項是為英國公民和永久居民提供的自由？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Free heating for all\",\"zh\":\"全民免費供暖\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Freedom of Speech\",\"zh\":\"言論自由\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Half day off work on Friday\",\"zh\":\"星期五半天放假\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"A right to take part in the election of a government\",\"zh\":\"參與選舉政府的權利\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Fundamental freedoms in the UK include the freedom of speech and the right to participate in free and fair elections.\",\"zh\":\"英國的基本自由包括言論自由以及參與自由和公正選舉的權利。\"}},{\"id\":\"9-22\",\"question\":{\"en\":\"Which of these is an accurate estimate of the number of casualties suffered by Britain in the First World War?\",\"zh\":\"以下哪一項是英國在第一次世界大戰中傷亡人數的準確估計？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"10 million\",\"zh\":\"1000萬\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"2 million\",\"zh\":\"200萬\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"8 million\",\"zh\":\"800萬\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"500,000\",\"zh\":\"50萬\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Britain suffered over 2 million casualties (dead and wounded) during the First World War (1914–1918).\",\"zh\":\"英國在第一次世界大戰（1914–1918年）期間遭受了超過200萬人的傷亡（包括死亡和受傷）。\"}},{\"id\":\"9-23\",\"question\":{\"en\":\"Which of the following lines are from the National Anthem (choose two options)?\",\"zh\":\"以下哪些歌詞出自英國國歌（選擇兩個選項）？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"We shall never surrender\",\"zh\":\"我們絕不投降\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"God save our gracious Queen!\",\"zh\":\"上帝保佑我們慈祥的女王！\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Send her victorious\",\"zh\":\"願她勝利\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"The darling buds of May\",\"zh\":\"五月可愛的花蕾\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The lines \\\"God save our gracious Queen!\\\" and \\\"Send her victorious\\\" are key parts of the traditional UK National Anthem.\",\"zh\":\"「上帝保佑我們慈祥的女王！」和「願她勝利」是英國傳統國歌的主要歌詞。\"}},{\"id\":\"9-24\",\"question\":{\"en\":\"Who was the leader of the suffragettes, the group that campaigned for women's rights to vote?\",\"zh\":\"爭取婦女投票權的組織「婦女參政運動者」(suffragettes) 的領導人是誰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Queen Victoria\",\"zh\":\"維多利亞女王\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Oliver Cromwell\",\"zh\":\"奧立佛·克倫威爾\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Florence Nightingale\",\"zh\":\"弗羅倫斯·南丁格爾\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Emmeline Pankhurst\",\"zh\":\"埃米琳·潘克斯特\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Emmeline Pankhurst was the primary leader of the suffragette movement, which campaigned for women's right to vote.\",\"zh\":\"埃米琳·潘克斯特。她是婦女參政運動的主要領導人。\"}}]}}]}]\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"12:I[27201,[\"/LifeInUK/_next/static/chunks/2giwr0i316ej9.js\",\"/LifeInUK/_next/static/chunks/14mrh2-p_w84d.js\"],\"IconMark\"]\n9:null\ne:[[\"$\",\"title\",\"0\",{\"children\":\"Life in the UK Mock Test\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Bilingual Life in the UK Mock Test App\"}],[\"$\",\"
