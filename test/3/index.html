atic/chunks/1ifpjmwqpd4_p.js\"],\"default\"]\n"])</script><script>self.__next_f.push([1,"6:[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-6 w-full flex-1 flex flex-col\",\"children\":[\"$\",\"$L11\",null,{\"mockTest\":{\"setId\":3,\"title\":{\"en\":\"Mock Exam Set 3\",\"zh\":\"模擬考試 第3套\"},\"questions\":[{\"id\":\"3-1\",\"question\":{\"en\":\"What is a Yorkshire pudding?\",\"zh\":\"約克郡布丁是什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Batter cooked in the oven\",\"zh\":\"在烤箱中烹製的麵糊\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Meat and potato in a pastry\",\"zh\":\"酥皮中的肉和土豆\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Apple and pears with custard\",\"zh\":\"帶有卡士達醬的蘋果和梨\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"A caramel-flavoured dessert\",\"zh\":\"焦糖風味的甜點\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"A Yorkshire pudding is made of flour, eggs, and milk baked in the oven to puff up, traditionally eaten with roast meat.\",\"zh\":\"約克郡布丁是用麵粉、雞蛋和牛奶調成的麵糊在烤箱中烘烤膨脹而成，傳統上與烤肉搭配食用。\"}},{\"id\":\"3-2\",\"question\":{\"en\":\"Causing trouble whilst drinking in public can result in which TWO of the following from the police?\",\"zh\":\"在公共場合飲酒並引起事端可能會導致警方採取以下哪兩種措施？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"An award\",\"zh\":\"獎勵\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Praise\",\"zh\":\"表揚\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"A fine\",\"zh\":\"罰款\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Arrest\",\"zh\":\"逮捕\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Being drunk and disorderly in public is a criminal offence. The police can issue a fine or arrest you.\",\"zh\":\"在公共場合醉酒並擾亂秩序是刑事犯罪。警方可以處以罰款或予以逮捕。\"}},{\"id\":\"3-3\",\"question\":{\"en\":\"When did women get the right to vote at the same age as men?\",\"zh\":\"女性何時獲得了與男性同等年齡的投票權？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"1918\",\"zh\":\"1918\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"1928\",\"zh\":\"1928\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"1938\",\"zh\":\"1938\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"1948\",\"zh\":\"1948\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Women were given the right to vote at the same age as men (21) in 1928.\",\"zh\":\"1928年。女性在1928年獲得了與男性一樣（21歲）的投票權。\"}},{\"id\":\"3-4\",\"question\":{\"en\":\"What is the day when jokes are published in newspapers and telecasted on TV?\",\"zh\":\"報紙發表笑話且電視播放惡搞節目的日子是哪一天？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"April Fool's Day\",\"zh\":\"愚人節 (April Fool's Day)\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Boxing Day\",\"zh\":\"節禮日 (Boxing Day)\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Halloween\",\"zh\":\"萬聖夜 (Halloween)\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Valentine's Day\",\"zh\":\"情人節 (Valentine's Day)\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"On April Fool's Day (1st April), people play jokes on each other, and newspapers and TV programs often publish or broadcast spoof stories.\",\"zh\":\"在愚人節 (4 月 1 日)，人們會互相開玩笑，報紙和電視節目也經常發布或播放惡搞的新聞故事。\"}},{\"id\":\"3-5\",\"question\":{\"en\":\"In a Crown Court, who decides what the penalty will be, in the case of a guilty verdict?\",\"zh\":\"在皇家刑事法院，如果判決有罪，誰來決定刑罰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"A solicitor\",\"zh\":\"事務律師\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The jury\",\"zh\":\"陪審團\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The judge\",\"zh\":\"法官\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"A police officer\",\"zh\":\"警員\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"In a Crown Court, the jury decides whether the defendant is guilty or not, and the judge decides on the penalty.\",\"zh\":\"在皇家刑事法院，陪審團決定被告是否有罪，而法官決定刑罰。\"}},{\"id\":\"3-6\",\"question\":{\"en\":\"Where is the official home of the Prime Minister?\",\"zh\":\"首相的官方官邸在哪裡？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"18 Oxford Street\",\"zh\":\"牛津街 18 號\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Buckingham Palace\",\"zh\":\"白金漢宮\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Windsor Castle\",\"zh\":\"溫莎城堡\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"10 Downing Street\",\"zh\":\"唐寧街 10 號\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"10 Downing Street in London is the official residence and office of the British Prime Minister.\",\"zh\":\"位於倫敦的唐寧街 10 號 （10 Downing Street） 是英國首相的官方官邸和辦公室。\"}},{\"id\":\"3-7\",\"question\":{\"en\":\"The Bill of Rights of 1689 gave women the right to vote.\",\"zh\":\"1689年的《權利法案》賦予了女性投票權。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The Bill of Rights 1689 established parliamentary sovereignty and limited the power of the monarch, but did not grant women the right to vote. Women achieved equal voting rights in 1928.\",\"zh\":\"1689年的《權利法案》確立了議會主權並限制了君主的權力，但並未賦予女性投票權。女性在1928年才獲得平等的投票權。\"}},{\"id\":\"3-8\",\"question\":{\"en\":\"When were the first coins in Britain made?\",\"zh\":\"不列顛最早的硬幣是在什麼時期製造的？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Stone Age\",\"zh\":\"石器時代\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The Bronze Age\",\"zh\":\"青銅時代\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Iron Age\",\"zh\":\"鐵器時代\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"The Middle Ages\",\"zh\":\"中世紀\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The first coins to be minted in Britain were made during the Iron Age.\",\"zh\":\"英國最早鑄造的硬幣是在鐵器時代（Iron Age）製造的。\"}},{\"id\":\"3-9\",\"question\":{\"en\":\"Which of the following is correct?\",\"zh\":\"以下哪項說法是正確的？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Robert Burns wrote only in Scots language.\",\"zh\":\"羅伯特·彭斯僅用蘇格蘭語寫作。\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Robert Burns wrote in Scots, English and a combination of both\",\"zh\":\"羅伯特·彭斯使用蘇格蘭語、英語以及兩者的結合體進行寫作\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Robert Burns, the national poet of Scotland, wrote his poetry in Scots, standard English, and a mixture of both.\",\"zh\":\"羅伯特·彭斯（Robert Burns）是蘇格蘭的民族詩人，他用蘇格蘭語、標準英語以及兩者的結合體創作詩歌。\"}},{\"id\":\"3-10\",\"question\":{\"en\":\"What is the name of the most famous cricket competition played between England and Australia?\",\"zh\":\"英格蘭與澳洲之間進行的最著名的板球比賽名稱是什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Ashes\",\"zh\":\"骨灰盃\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"The Six Nations Championship\",\"zh\":\"六國錦標賽\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Grand National\",\"zh\":\"英國國家障礙大賽\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The Australian Open\",\"zh\":\"澳洲網球公開賽\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Ashes is the famous biennial Test cricket series played between England and Australia, named after an obituary published in a British newspaper.\",\"zh\":\"「骨灰盃」是英格蘭和澳洲之間著名的兩年一度板球對抗賽，得名於一家英國報紙上發表的訃告。\"}},{\"id\":\"3-11\",\"question\":{\"en\":\"What happens at a polling station or polling place?\",\"zh\":\"在投票站（polling station 或 polling place）會進行什麼活動？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"People take their driving test\",\"zh\":\"人們參加駕駛考試\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The census is collected\",\"zh\":\"收集人口普查數據\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Taxes are collected\",\"zh\":\"徵收稅款\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"People vote in elections\",\"zh\":\"人們在選舉中投票\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Polling stations (or polling places in Scotland) are where citizens go to cast their votes in elections and referendums.\",\"zh\":\"投票站（在蘇格蘭稱為 polling places）是公民在選舉和公投中投票的地方。\"}},{\"id\":\"3-12\",\"question\":{\"en\":\"What is the name of the movement against the authority of the Pope and the ideas of the Catholic Church that took place during the reign of Henry VIII?\",\"zh\":\"在亨利八世統治時期發生的、反對教皇權威和天主教會觀念的運動名稱是什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Reformation\",\"zh\":\"宗教改革\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"The Enlightenment\",\"zh\":\"啟蒙運動\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Glorious Revolution\",\"zh\":\"光榮革命\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The Renaissance\",\"zh\":\"文藝復興\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Reformation was a 16th-century movement against the authority of the Pope and Catholic teachings, leading to the creation of the Church of England.\",\"zh\":\"宗教改革是16世紀反對教皇權威和天主教教義的運動，促成了英格蘭教會的創立。\"}},{\"id\":\"3-13\",\"question\":{\"en\":\"St Helena is a British overseas territory and it is part of the United Kingdom.\",\"zh\":\"聖赫勒拿（St Helena）是英國海外領土，屬於聯合王國的一部分。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"This statement is false. St Helena is a British overseas territory, but it is not constitutionally part of the United Kingdom.\",\"zh\":\"此陳述是錯誤的。聖赫勒拿是英國海外領土，但在憲法上不屬於聯合王國的一部分。\"}},{\"id\":\"3-14\",\"question\":{\"en\":\"James I was King of which country before becoming King of England?\",\"zh\":\"詹姆士一世在成為英格蘭國王之前是哪個國家的國王？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Wales\",\"zh\":\"威爾斯\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Ireland\",\"zh\":\"愛爾蘭\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"France\",\"zh\":\"法國\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Scotland\",\"zh\":\"蘇格蘭\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Before succeeding Elizabeth I as King James I of England in 1603, he ruled Scotland as King James VI.\",\"zh\":\"在 1603 年繼承伊莉莎白一世成為英格蘭國王詹姆士一世之前，他作為詹姆士六世統治蘇格蘭。\"}},{\"id\":\"3-15\",\"question\":{\"en\":\"During the reign of Henry VIII, which country of the union became formally united with England?\",\"zh\":\"在亨利八世統治期間，聯盟中的哪個國家正式與英格蘭合併？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Ireland\",\"zh\":\"愛爾蘭\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Wales\",\"zh\":\"威爾斯\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Northern Ireland\",\"zh\":\"北愛爾蘭\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Scotland\",\"zh\":\"蘇格蘭\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Wales became formally united with England during the reign of Henry VIII under the Laws in Wales Acts.\",\"zh\":\"在亨利八世統治期間，通過《威爾斯法律法令》正式將威爾斯與英格蘭合併。\"}},{\"id\":\"3-16\",\"question\":{\"en\":\"In which country of the British Empire did the Boer War (1899-1902) take place?\",\"zh\":\"1899 年至 1902 年的波耳戰爭發生在大英帝國的哪個地方？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Netherlands\",\"zh\":\"荷蘭\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Falkland Islands\",\"zh\":\"福克蘭群島\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Gibraltar\",\"zh\":\"直布羅陀\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"South Africa\",\"zh\":\"南非\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The Boer War of 1899-1902 took place in South Africa between the British Empire and the two Boer republics.\",\"zh\":\"1899 年至 1902 年的波耳戰爭 （Boer War） 發生在南非，是英國與兩個波耳共和國之間的戰爭。\"}},{\"id\":\"3-17\",\"question\":{\"en\":\"The Man Booker Prize is awarded in which of the following categories?\",\"zh\":\"布克獎 (The Man Booker Prize) 頒發給以下哪個類別？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Films\",\"zh\":\"電影\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Sport\",\"zh\":\"體育\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Literature\",\"zh\":\"文學\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Music\",\"zh\":\"音樂\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Man Booker Prize is a prestigious award given annually for the best original novel written in the English language.\",\"zh\":\"布克獎是一項享有盛譽的年度獎項，頒發給以英語撰寫的最佳原創小說。\"}},{\"id\":\"3-18\",\"question\":{\"en\":\"Where is the Lake District National Park located?\",\"zh\":\"湖區國家公園 (Lake District National Park) 位於哪裡？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Scotland\",\"zh\":\"蘇格蘭\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Wales\",\"zh\":\"威爾斯\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"England\",\"zh\":\"英格蘭\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Northern Ireland\",\"zh\":\"北愛爾蘭\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Lake District National Park is located in the north west of England and is famous for its lakes and mountains.\",\"zh\":\"湖區國家公園位於英格蘭西北部，以其湖泊和山脈而聞名。\"}},{\"id\":\"3-19\",\"question\":{\"en\":\"What sport is played in the UEFA Champions League?\",\"zh\":\"歐洲冠軍聯賽（UEFA Champions League）進行的是哪項運動？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Cricket\",\"zh\":\"板球\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Rugby\",\"zh\":\"橄欖球\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Tennis\",\"zh\":\"網球\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Football\",\"zh\":\"足球\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The UEFA Champions League is an annual club football competition organized by the Union of European Football Associations.\",\"zh\":\"歐洲冠軍聯賽（UEFA Champions League）是由歐洲足球總會舉辦的年度俱樂部足球比賽。\"}},{\"id\":\"3-20\",\"question\":{\"en\":\"Which British novelist created the fictional detective, Sherlock Holmes?\",\"zh\":\"哪位英國小說家創造了虛構的偵探夏洛克·福爾摩斯？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Sir Arthur Conan Doyle\",\"zh\":\"亞瑟·柯南·道爾爵士\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Robert Louis Stevenson\",\"zh\":\"羅伯特·路易斯·史蒂文森\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Evelyn Waugh\",\"zh\":\"伊夫林·沃\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Graham Greene\",\"zh\":\"葛拉漢·葛林\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Sherlock Holmes was created by Sir Arthur Conan Doyle (1859–1930), a Scottish writer and physician.\",\"zh\":\"福爾摩斯是由蘇格蘭作家兼醫生亞瑟·柯南·道爾爵士（1859–1930年）所創造的虛構偵探。\"}},{\"id\":\"3-21\",\"question\":{\"en\":\"Is the statement below TRUE or FALSE? Military training for young people is provided by The National Citizen Service.\",\"zh\":\"以下說法是正確還是錯誤？國家公民服務（NCS）為年輕人提供軍事訓練。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The National Citizen Service (NCS) provides personal and social development programs for young people, not military training.\",\"zh\":\"國家公民服務（NCS）為年輕人提供個人和社交能力發展項目，而不是軍事訓練。\"}},{\"id\":\"3-22\",\"question\":{\"en\":\"What did Emmeline Pankhurst fight for?\",\"zh\":\"艾米琳·潘克斯特（Emmeline Pankhurst）爭取的是什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The right to liberty and security\",\"zh\":\"自由與安全的權利\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The right for women to vote\",\"zh\":\"女性的投票權\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Freedom of expression\",\"zh\":\"言論自由\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The right to a fair trial\",\"zh\":\"獲得公正審判的權利\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Emmeline Pankhurst was a leader of the British suffragette movement, fighting for women's right to vote.\",\"zh\":\"艾米琳·潘克斯特（Emmeline Pankhurst）是英國女性參政運動的領袖，致力於爭取女性的投票權。\"}},{\"id\":\"3-23\",\"question\":{\"en\":\"Where did people of the Bronze Age bury their dead?\",\"zh\":\"青銅時代的人們把死者葬在哪裡？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Earth barrows\",\"zh\":\"泥土塚\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Round barrows\",\"zh\":\"圓形土塚\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Burial mounds\",\"zh\":\"墓塚\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Round burrows\",\"zh\":\"圓形地穴\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"People of the Bronze Age (around 4,000 years ago) buried their dead in round barrows, which were circular burial mounds.\",\"zh\":\"青銅時代（約4,000年前）的人們將死者葬在圓形土塚（round barrows）中，這是一種圓形的陵墓。\"}},{\"id\":\"3-24\",\"question\":{\"en\":\"Which two responsibilities will you have as a British citizen?\",\"zh\":\"作為英國公民，您將承擔哪兩項責任？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"To buy food locally\",\"zh\":\"在當地購買食物\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"To volunteer in a community project at least once a year\",\"zh\":\"每年至少參與一次社區志願服務\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"To look after yourself and your family\",\"zh\":\"照顧自己和家人\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"To respect the rights of others, including their right to their own opinions\",\"zh\":\"尊重他人的權利，包括他們表達自己意見的權利\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Looking after yourself and your family, and respecting the rights of others are two fundamental responsibilities of British citizens.\",\"zh\":\"照顧自己和家人，以及尊重他人的權利，是英國公民的兩項基本責任。\"}}]}}]}]\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"12:I[27201,[\"/LifeInUK/_next/static/chunks/2sqx0bedbmej9.js\",\"/LifeInUK/_next/static/chunks/14mrh2-p_w84d.js\"],\"IconMark\"]\n9:null\ne:[[\"$\",\"title\",\"0\",{\"children\":\"Life in the UK Mock Test\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Bilingual Life in the UK Mock Test App\"}],[\"$\",\"link\",\"2\",{\"rel\":\"manifest\",\"href\":\"/LifeInUK/manifest.webmanifest\",\"crossOrigin\":\"$undefined\"}],[\"$\",\"meta\",\"3\",{\"name\":\"mobile-web-app-capable\",\"content\":\"yes\"}],[\"$\",\"meta\",\"4\",{\"name\":\"apple-mobile-web-app-title\",\"content\":\"LifeInUK\"}],[\"$\",\"meta\",\"5\",{\"name\":\"apple-mobile-web-app-status-bar-style\",\"content\":\"default\"}],[\"$\",\"link\",\"6\",{\"rel\":\"apple-touch-icon\",\"href\":\"/LifeInUK/icons/apple-touch-icon.png\"}],[\"$\",\"$L12\",\"7\",{}]]\n"])</script></body></html>
