e advice of the Prime Minister.\",\"zh\":\"君主在首相的建議下任命終身貴族。\"}},{\"id\":\"5-3\",\"question\":{\"en\":\"Who was the captain of the English football team that won the World Cup in 1966?\",\"zh\":\"1966年贏得世界盃的英格蘭足球隊隊長是誰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Sir Roger Bannister\",\"zh\":\"羅傑·班尼斯特爵士\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Sir Jackie Stewart\",\"zh\":\"傑奇·史都華爵士\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Sir Ian Botham\",\"zh\":\"伊恩·博瑟姆爵士\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Bobby Moore\",\"zh\":\"巴比·摩爾\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Bobby Moore was the captain of the England football team that won the FIFA World Cup in 1966.\",\"zh\":\"巴比·摩爾（Bobby Moore）是1966年贏得國際足總世界盃的英格蘭足球隊隊長。\"}},{\"id\":\"5-4\",\"question\":{\"en\":\"How many members does the Welsh Assembly have?\",\"zh\":\"威爾斯大會（Welsh Assembly）有多少名成員？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"150\",\"zh\":\"150\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"120\",\"zh\":\"120\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"90\",\"zh\":\"90\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"60\",\"zh\":\"60\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The Welsh Parliament (formerly known as the Welsh Assembly) has 60 members.\",\"zh\":\"威爾斯議會（前身為威爾斯議會大會）有 60 名成員。\"}},{\"id\":\"5-5\",\"question\":{\"en\":\"What is known as Lent?\",\"zh\":\"大齋期是指什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The 40 days before Christmas\",\"zh\":\"聖誕節前的40天\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The 40 days after Easter\",\"zh\":\"復活節後的40天\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The 40 days before Easter\",\"zh\":\"復活節前的40天\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"The 40 days after Christmas\",\"zh\":\"聖誕節後的40天\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Lent is the 40-day Christian period of reflection, fasting, and prayer leading up to Easter Sunday.\",\"zh\":\"大齋期是基督教在復活節前進行為期40天反思、禁食和祈禱的時期。\"}},{\"id\":\"5-6\",\"question\":{\"en\":\"During which period did the Beatles become popular and social laws were liberalised?\",\"zh\":\"披頭四樂團 (The Beatles) 在哪個時期變得受歡迎，並且社會法律變得更加自由？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"1960s\",\"zh\":\"1960年代\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"1970s\",\"zh\":\"1970年代\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"1980s\",\"zh\":\"1980年代\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"1950s\",\"zh\":\"1950年代\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The 1960s was a decade of significant social change, liberalisation of laws, and the rise of British pop music, including The Beatles.\",\"zh\":\"1960年代是社會發生重大變革、法律變得更加自由以及英國流行音樂（包括披頭四樂團）崛起的十年。\"}},{\"id\":\"5-7\",\"question\":{\"en\":\"The members of the House of Lords, known as peers, are elected by the people.\",\"zh\":\"稱為貴族的上議院議員是由人民選舉產生的。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Members of the House of Lords (peers) are not elected; they are appointed or hereditary.\",\"zh\":\"上議院議員（貴族）不是由選舉產生的，而是被任命的或世襲的。\"}},{\"id\":\"5-8\",\"question\":{\"en\":\"When was England ruled by a republic and not by a monarch?\",\"zh\":\"英格蘭何時是由共和國而非君主統治？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"When Elizabeth I died without any successor\",\"zh\":\"當伊莉莎白一世逝世且無繼承人時\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"When Charles I was executed\",\"zh\":\"當查理一世被處決後\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"When the Carta Magna restricted the king's power\",\"zh\":\"當大憲章限制了國王的權力時\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"When kind Harold died after the Battle of Hastings\",\"zh\":\"當哈羅德王在黑斯廷斯戰役後陣亡時\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"After the execution of Charles I, England became a republic called the Commonwealth.\",\"zh\":\"在查理一世被處決後，英格蘭成為一個共和國，被稱為英格蘭聯邦。\"}},{\"id\":\"5-9\",\"question\":{\"en\":\"When is St Patrick's day celebrated?\",\"zh\":\"聖派翠克日是在什麼時候慶祝？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"23rd April\",\"zh\":\"4 月 23 日\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"30th November\",\"zh\":\"11 月 30 日\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"1st April\",\"zh\":\"4 月 1 日\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"17th March\",\"zh\":\"3 月 17 日\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"St Patrick's Day is celebrated on 17th March and is the patron saint day of Northern Ireland.\",\"zh\":\"聖派翠克日於 3 月 17 日慶祝，是北愛爾蘭的主保聖人紀念日。\"}},{\"id\":\"5-10\",\"question\":{\"en\":\"Who was James II's eldest daughter, Mary, married to?\",\"zh\":\"詹姆士二世的長女瑪麗嫁給了誰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"She never married\",\"zh\":\"她未曾結婚\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"William of Orange\",\"zh\":\"奧蘭治的威廉\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"The French Dauphin\",\"zh\":\"法國王太子\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The Duke of York\",\"zh\":\"約克公爵\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"James II's daughter, Mary, married William of Orange, who joint-ruled with her as William III and Mary II.\",\"zh\":\"詹姆士二世的女兒瑪麗嫁給了奧蘭治的威廉，後來他與她共同統治英國，即威廉三世和瑪麗二世。\"}},{\"id\":\"5-11\",\"question\":{\"en\":\"If you wish to be a permanent resident or citizen of the UK, you should (choose TWO answers):\",\"zh\":\"如果您希望成為英國的永久居民或公民，您應該（選擇兩個答案）：\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Respect the rights of others, including their right to their own opinions\",\"zh\":\"尊重他人的權利，包括他們擁有自己意見的權利\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Buy a house in the UK\",\"zh\":\"在英國買房子\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Look after yourself and your family\",\"zh\":\"照顧好您自己和您的家人\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Marry a British citizen\",\"zh\":\"與英國公民結婚\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"UK principles require residents and citizens to respect the rights of others (including their opinions) and to look after themselves and their families.\",\"zh\":\"英國的原則要求居民和公民尊重他人的權利 (包括他們的意見)，並照顧好自己和家人。\"}},{\"id\":\"5-12\",\"question\":{\"en\":\"Which of the following statements is correct?\",\"zh\":\"以下哪項敘述是正確的？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The jet engine and radar were developed in Britain in the 1950s.\",\"zh\":\"噴射發動機和雷達是在1950年代於英國開發的。\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The jet engine and radar were developed in Britain in the 1930s\",\"zh\":\"噴射發動機和雷達是在1930年代於英國開發的。\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Both the jet engine (invented by Frank Whittle) and radar (developed by Robert Watson-Watt) were designed and developed in Britain during the 1930s.\",\"zh\":\"噴射發動機（由法蘭克·惠特爾發明）和雷達（由羅伯特·沃森-瓦特開發）都是在1930年代於英國設計並開發出來的。\"}},{\"id\":\"5-13\",\"question\":{\"en\":\"Who wrote \\\"The Daffodils\\\"\",\"zh\":\"《水仙花》（The Daffodils）是誰寫的？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"William Blake\",\"zh\":\"威廉·布萊克\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Robert Browning\",\"zh\":\"羅伯特·白朗寧\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Lord Byron\",\"zh\":\"拜倫勳爵\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"William Wordsworth\",\"zh\":\"威廉·華茲華斯\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The famous poem 'The Daffodils' (often known as 'I Wandered Lonely as a Cloud') was written by the Romantic poet William Wordsworth.\",\"zh\":\"著名詩作《水仙花》（通常被稱為《我孤獨地漫遊，像一朵雲》）是由浪漫主義詩人威廉·華茲華斯（William Wordsworth）所寫。\"}},{\"id\":\"5-14\",\"question\":{\"en\":\"Who is the patron Saint of Scotland?\",\"zh\":\"誰是蘇格蘭的守護聖人？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"St David\",\"zh\":\"聖大衛\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"St Patrick\",\"zh\":\"聖派翠克\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"St George\",\"zh\":\"聖喬治\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"St Andrew\",\"zh\":\"聖安德烈\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"St Andrew is the patron saint of Scotland, and St Andrew's Day is celebrated on 30 November.\",\"zh\":\"聖安德烈是蘇格蘭的守護聖人，每年的11月30日是聖安德烈日。\"}},{\"id\":\"5-15\",\"question\":{\"en\":\"What sort of charity is 'Friends of the Earth'?\",\"zh\":\"「地球之友」 （Friends of the Earth） 是一個什麼樣的慈善機構？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"An environmental charity\",\"zh\":\"環保慈善機構\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"A medical research charity\",\"zh\":\"醫學研究慈善機構\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"A charity working with pets\",\"zh\":\"寵物福利慈善機構\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"A charity working with older people\",\"zh\":\"老年人服務慈善機構\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Friends of the Earth is an international environmental charity.\",\"zh\":\"「地球之友」 （Friends of the Earth） 是一個國際性的環保慈善機構。\"}},{\"id\":\"5-16\",\"question\":{\"en\":\"they were directly appointed by God to rule.x\",\"zh\":\"他們是由上帝直接任命來統治的。x\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Divine Right of Kings was the view held by many English monarchs that\",\"zh\":\"君權神授是許多英國君主所持的觀點，即\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"This entry is a fragment of the statement: 'The Divine Right of Kings was the view held by many English monarchs that they were directly appointed by God to rule.'\",\"zh\":\"此條目是以下陳述的片段：「君權神授是許多英國君主所持的觀點，即他們是由上帝直接任命來統治的。」\"}},{\"id\":\"5-17\",\"question\":{\"en\":\"The system of government in the UK is a parliamentary democracy.\",\"zh\":\"英國的政府體制是議會民主制。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The UK is a parliamentary democracy.\",\"zh\":\"英國是一個議會民主制國家。\"}},{\"id\":\"5-18\",\"question\":{\"en\":\"Who did Britain fight against in the Crimean War?\",\"zh\":\"在克里米亞戰爭中，英國與誰作戰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Turkey\",\"zh\":\"土耳其（Turkey）\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Russia\",\"zh\":\"俄羅斯（Russia）\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"France\",\"zh\":\"法國（France）\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Germany\",\"zh\":\"德國（Germany）\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"In the Crimean War (1853-1856), Britain, France, and Turkey fought against Russia.\",\"zh\":\"在克里米亞戰爭（1853 至 1856 年）中，英國、法國和土耳其聯手對抗俄羅斯。\"}},{\"id\":\"5-19\",\"question\":{\"en\":\"What sort of event is the Grand National?\",\"zh\":\"英國國家障礙大賽 （Grand National） 是一項什麼樣的活動？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Rugby\",\"zh\":\"橄欖球\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Golf\",\"zh\":\"高爾夫球\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Horse Racing\",\"zh\":\"賽馬\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Tennis\",\"zh\":\"網球\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Grand National is a famous horse racing event held annually in the UK.\",\"zh\":\"英國國家障礙大賽 （Grand National） 是英國每年舉辦的著名賽馬活動。\"}},{\"id\":\"5-20\",\"question\":{\"en\":\"How many people emigrated from the UK during Victoria's reign between 1853- 1913?\",\"zh\":\"在維多利亞女王統治期間（1853年至1913年），有多少人從英國移民海外？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"500 million\",\"zh\":\"5億\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"13 million\",\"zh\":\"1300萬\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"2 million\",\"zh\":\"200萬\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"100,000\",\"zh\":\"10萬\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"During the Victorian era and early 20th century (specifically between 1853 and 1913), around 13 million people left the UK to settle overseas.\",\"zh\":\"在維多利亞女王統治時期和20世紀初（具體在1853年至1913年之間），約有1300萬人離開英國前往海外定居。\"}},{\"id\":\"5-21\",\"question\":{\"en\":\"What type of literature are the Canterbury Tales?\",\"zh\":\"《坎特伯里故事集》 （The Canterbury Tales） 屬於什麼類型的文學作品？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Poems\",\"zh\":\"詩歌\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Novels\",\"zh\":\"小說\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Jokes\",\"zh\":\"笑話\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Fables\",\"zh\":\"寓言\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Canterbury Tales is a collection of poems written by Geoffrey Chaucer in the 14th century.\",\"zh\":\"《坎特伯里故事集》 （The Canterbury Tales） 是傑弗里 · 喬叟 （Geoffrey Chaucer） 在 14 世紀撰寫的一系列詩歌。\"}},{\"id\":\"5-22\",\"question\":{\"en\":\"What is a bank holiday?\",\"zh\":\"什麼是銀行假期（Bank Holiday）？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"A public holiday when banks are open all day\",\"zh\":\"銀行全天營業的公眾假期\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"A public holiday for people working in banks\",\"zh\":\"專門給銀行員工的公眾假期\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"An additional day off that every worker in the UK is entitled to\",\"zh\":\"每位英國員工都有權享有的額外假期\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"A public holiday when banks and many other businesses are closed for the day\",\"zh\":\"銀行和許多其他商業機構都關門休息的公眾假期\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Bank holidays are official public holidays in the UK when banks and many other businesses are closed.\",\"zh\":\"銀行假期是英國的法定公眾假期，屆時銀行和許多其他商業機構都會休息。\"}},{\"id\":\"5-23\",\"question\":{\"en\":\"Which of the following charities helps the environment?\",\"zh\":\"下列哪一個慈善機構致力於保護環境？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"NSPCC\",\"zh\":\"英國國家防虐童協會（NSPCC）\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Shelter\",\"zh\":\"避難所（Shelter，幫助無家可歸者的慈善機構）\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Friends of the Earth\",\"zh\":\"地球之友（Friends of the Earth）\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Crisis\",\"zh\":\"危機（Crisis，幫助無家可歸者的慈善機構）\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Friends of the Earth is an international environmental charity dedicated to protecting the natural world.\",\"zh\":\"「地球之友」（Friends of the Earth）是一個致力於保護自然世界的國際環保慈善機構。\"}},{\"id\":\"5-24\",\"question\":{\"en\":\"What was the first war to be extensively covered by the media?\",\"zh\":\"哪一場戰爭是第一場被媒體廣泛報導的戰爭？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Boer War\",\"zh\":\"波耳戰爭\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The First World War\",\"zh\":\"第一次世界大戰\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Second World War\",\"zh\":\"第二次世界大戰\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The Crimean War\",\"zh\":\"克里米亞戰爭\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The Crimean War was the first to be extensively covered by the media, through news reports and photographs.\",\"zh\":\"克里米亞戰爭是第一場透過新聞報導和照片被媒體廣泛報導的戰爭。\"}}]}}]}]\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"12:I[27201,[\"/LifeInUK/_next/static/chunks/2t8yyem4st7i0.js\",\"/LifeInUK/_next/static/chunks/14mrh2-p_w84d.js\"],\"IconMark\"]\n9:null\ne:[[\"$\",\"title\",\"0\",{\"children\":\"Life in the UK Mock Test\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Bilingual Life in the UK Mock Test App\"}],[\"$\",\"link\",\"2\",{\"rel\":\"manifest\",\"href\":\"/LifeInUK/manifest.webmanifest\",\"crossOrigin\":\"$undefined\"}],[\"$\",\"meta\",\"3\",{\"name\":\"mobile-web-app-capable\",\"content\":\"yes\"}],[\"$\",\"meta\",\"4\",{\"name\":\"apple-mobile-web-app-title\",\"content\":\"LifeInUK\"}],[\"$\",\"meta\",\"5\",{\"name\":\"apple-mobile-web-app-status-bar-style\",\"content\":\"default\"}],[\"$\",\"link\",
