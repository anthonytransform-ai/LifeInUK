er War took place between 1899 and 1902 in South Africa, fighting between the British Empire and the Boer republics.\",\"zh\":\"波耳戰爭發生在1899年至1902年的南非，是大英帝國與波耳共和國之間的戰爭。\"}},{\"id\":\"4-3\",\"question\":{\"en\":\"How often is a General Election held?\",\"zh\":\"大選多久舉行一次？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"At least every five years\",\"zh\":\"至少每五年一次\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"At least every four years\",\"zh\":\"至少每四年一次\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Every year\",\"zh\":\"每年一次\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"At least every two years\",\"zh\":\"至少每兩年一次\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"General Elections must be held at least once every five years under British law.\",\"zh\":\"根據英國法律，大選必須至少每五年舉行一次。\"}},{\"id\":\"4-4\",\"question\":{\"en\":\"Which of these is not a Gilbert and Sullivan comic opera?\",\"zh\":\"以下哪一項不是吉爾伯特與沙利文的喜歌劇？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Pirates of Penzance\",\"zh\":\"彭贊斯的海盜\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The Mikado\",\"zh\":\"天皇\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"HMS Pinafore\",\"zh\":\"皮納福號軍艦\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"A Midsummer Night's Dream\",\"zh\":\"仲夏夜之夢\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"A Midsummer Night's Dream is a play by William Shakespeare. The others are famous comic operas written by Gilbert and Sullivan.\",\"zh\":\"《仲夏夜之夢》是威廉·莎士比亞的戲劇。其他幾項則是吉爾伯特與沙利文創作的著名喜歌劇。\"}},{\"id\":\"4-5\",\"question\":{\"en\":\"St Helena and the Falkland Islands are part of Great Britain.\",\"zh\":\"聖海倫娜和福克蘭群島是大不列顛的一部分。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"St Helena and the Falkland Islands are British Overseas Territories, but they are not part of Great Britain or the United Kingdom.\",\"zh\":\"聖海倫娜 （St Helena） 和福克蘭群島 （Falkland Islands） 是英國海外領地，但它們不屬於大不列顛 （Great Britain） 或聯合王國 （United Kingdom） 。\"}},{\"id\":\"4-6\",\"question\":{\"en\":\"Which of the following is not a British banknote?\",\"zh\":\"下列哪一項不是英鎊紙幣？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"£50\",\"zh\":\"50 英鎊\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"£25\",\"zh\":\"25 英鎊\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"£20\",\"zh\":\"20 英鎊\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"£5\",\"zh\":\"5 英鎊\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The standard British banknotes are £5, £10, £20, and £50. There is no £25 note.\",\"zh\":\"標準的英鎊紙幣有 5 英鎊、10 英鎊、20 英鎊和 50 英鎊。沒有 25 英鎊的紙幣。\"}},{\"id\":\"4-7\",\"question\":{\"en\":\"When did the English defeat the Spanish Armada?\",\"zh\":\"英格蘭何時擊敗西班牙無敵艦隊？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"1466\",\"zh\":\"1466年\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"1066\",\"zh\":\"1066年\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"1254\",\"zh\":\"1254年\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"1588\",\"zh\":\"1588年\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The Spanish Armada was defeated by the English navy in 1588 during the reign of Queen Elizabeth I.\",\"zh\":\"1588年伊麗莎白一世女王統治期間，西班牙無敵艦隊被英格蘭海軍擊敗。\"}},{\"id\":\"4-8\",\"question\":{\"en\":\"Female genital mutilation (FGM) or taking a girl or woman abroad for FGM is illegal in the UK and it is a criminal offence.\",\"zh\":\"在英國，女性生殖器切割 (FGM) 或將女孩或婦女帶到國外進行 FGM 是非法的，並且屬於刑事犯罪。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"FGM is a serious criminal offence in the UK, and it is also illegal to take someone abroad to undergo this practice.\",\"zh\":\"在英國，女性生殖器切割（FGM）是一項嚴重的刑事犯罪，將任何人帶到國外進行此行為也是非法的。\"}},{\"id\":\"4-9\",\"question\":{\"en\":\"Who did Henry VIII marry after the execution of Anne Boleyn?\",\"zh\":\"亨利八世在處決安妮·博林（Anne Boleyn）後娶了誰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Catherine Howard\",\"zh\":\"凱瑟琳·霍華德\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Jane Seymour\",\"zh\":\"珍·西摩\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Anne of Cleves\",\"zh\":\"克里維斯的安妮\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Catherine Parr\",\"zh\":\"凱瑟琳·帕爾\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"After the execution of his second wife Anne Boleyn, Henry VIII married Jane Seymour, who gave birth to his son Edward VI.\",\"zh\":\"在處決了他的第二任妻子安妮·博林之後，亨利八世迎娶了珍·西摩，後者為他誕下了兒子愛德華六世。\"}},{\"id\":\"4-10\",\"question\":{\"en\":\"Which of the following actresses has not won an Oscar?\",\"zh\":\"以下哪位女演員沒有獲得過奧斯卡金像獎？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Tilda Swinton\",\"zh\":\"蒂妲·絲雲頓 (Tilda Swinton)\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Emily Watson\",\"zh\":\"艾蜜莉·華森 (Emily Watson)\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Dame Judi Dench\",\"zh\":\"茱蒂·丹契女爵士 (Dame Judi Dench)\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Kate Winslet\",\"zh\":\"凱特·溫絲蕾 (Kate Winslet)\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Emily Watson has been nominated twice for an Oscar but has not won, whereas Tilda Swinton, Dame Judi Dench, and Kate Winslet have all won Oscars.\",\"zh\":\"艾蜜莉·華森曾兩度獲得奧斯卡金像獎提名但未獲獎，而蒂妲·絲雲頓、茱蒂·丹契女爵士以及凱特·溫絲蕾皆曾獲得過奧斯卡金像獎。\"}},{\"id\":\"4-11\",\"question\":{\"en\":\"The assassination of the Archduke Franz Ferdinand of Austria in 1914 led to which of the following wars?\",\"zh\":\"1914年奧地利斐迪南大公遇刺事件導致了以下哪場戰爭的爆發？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Crimean War\",\"zh\":\"克里米亞戰爭\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The First World War\",\"zh\":\"第一次世界大戰\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"The Civil War\",\"zh\":\"內戰\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The Second World War\",\"zh\":\"第二次世界大戰\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The assassination of Archduke Franz Ferdinand of Austria in Sarajevo on 28 June 1914 led directly to the outbreak of the First World War.\",\"zh\":\"1914年6月28日奧地利斐迪南大公在塞拉耶佛遇刺，直接導致了第一次世界大戰的爆發。\"}},{\"id\":\"4-12\",\"question\":{\"en\":\"Is the statement below TRUE or FALSE? Members of the House of Lords are elected by a constituency.\",\"zh\":\"以下說法是正確還是錯誤？上議院議員是由選區選舉產生的。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Members of the House of Lords are not elected by a constituency. They are appointed or hereditary peers, or bishops of the Church of England.\",\"zh\":\"上議院議員並非由選區選舉產生。他們是受委任的終身貴族、世襲貴族或英格蘭教會的主教。\"}},{\"id\":\"4-13\",\"question\":{\"en\":\"Scotland and Wales use a system called 'individual registration' where all those entitled to vote must complete their own registration form.\",\"zh\":\"蘇格蘭和威爾斯使用一種稱為「個人登記」的制度，所有有權投票的人都必須填寫自己的登記表。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Originally, Northern Ireland introduced individual registration in 2002. Great Britain (England, Scotland, and Wales) introduced individual electoral registration in 2014, where every voter must register individually rather than by household.\",\"zh\":\"最初，北愛爾蘭於2002年引入了個人登記制度。大不列顛（英格蘭、蘇格蘭和威爾斯）於2014年引入了個人選民登記制度，每位選民都必須單獨登記，而不是按戶登記。\"}},{\"id\":\"4-14\",\"question\":{\"en\":\"What day relates to the death of Jesus Christ?\",\"zh\":\"哪一天與耶穌基督的受難有關？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Good Friday\",\"zh\":\"耶穌受難日 (Good Friday)\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Easter Sunday\",\"zh\":\"復活節星期日\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Easter Monday\",\"zh\":\"復活節星期一\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Ash Wednesday\",\"zh\":\"聖灰星期三\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Good Friday is the day when Christians commemorate the crucifixion and death of Jesus Christ.\",\"zh\":\"耶穌受難日（Good Friday）是基督徒紀念耶穌基督被釘十字架和受難的日子。\"}},{\"id\":\"4-15\",\"question\":{\"en\":\"What are MEPs?\",\"zh\":\"MEPs 是什麼的縮寫？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Modern European parliamentarians\",\"zh\":\"現代歐洲議會議員\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Modern English parliamentarians\",\"zh\":\"現代英格蘭議會議員\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Members of the European Parliament\",\"zh\":\"歐洲議會議員\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Members of the English Parliament\",\"zh\":\"英格蘭議會議員\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"MEPs stands for Members of the European Parliament, who are elected to represent the citizens of European Union member states.\",\"zh\":\"MEPs 代表歐洲議會議員（Members of the European Parliament），他們經選舉產生，代表歐洲聯盟成員國的公民。\"}},{\"id\":\"4-16\",\"question\":{\"en\":\"Which of the following is a fundamental principle of British life?\",\"zh\":\"下列哪一項是英國生活的基本原則？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Communism\",\"zh\":\"共產主義\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Intolerance\",\"zh\":\"不寬容\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Individual liberty\",\"zh\":\"個人自由\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Inequity\",\"zh\":\"不公平\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The fundamental principles of British life include democracy, the rule of law, individual liberty, and tolerance of those with different faiths and beliefs.\",\"zh\":\"英國生活的基本原則包括民主、法治、個人自由以及對不同宗教和信仰的寬容。\"}},{\"id\":\"4-17\",\"question\":{\"en\":\"What did the Scottish John Logie Baird develop?\",\"zh\":\"蘇格蘭人約翰·洛吉·貝爾德（John Logie Baird）發明了什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Television\",\"zh\":\"電視\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Radar\",\"zh\":\"雷達\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Personal computer\",\"zh\":\"個人電腦\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Radio\",\"zh\":\"收音機\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"John Logie Baird was a Scottish engineer and inventor who developed the first working television.\",\"zh\":\"約翰·洛吉·貝爾德是蘇格蘭工程師，他發明了世界上第一台可運作的電視。\"}},{\"id\":\"4-18\",\"question\":{\"en\":\"What is the name of the holiday when banks and many other businesses are closed for the day?\",\"zh\":\"銀行和許多其他企業休假的公眾假期叫什麼名字？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Credit Holidays\",\"zh\":\"信用假期\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Branch Holidays\",\"zh\":\"分行假期\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Bank Holidays\",\"zh\":\"銀行假期 (Bank Holidays)\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Business Holidays\",\"zh\":\"商業假期\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Public holidays in the UK are called Bank Holidays, when banks and most businesses are closed.\",\"zh\":\"英國的公共假期被稱為銀行假期（Bank Holidays），屆時銀行和大多數企業都會關閉。\"}},{\"id\":\"4-19\",\"question\":{\"en\":\"Who supported King Charles I during the Civil War?\",\"zh\":\"在英國內戰期間，誰支持國王查理一世 （King Charles I） ？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Roundheads\",\"zh\":\"圓顱黨\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Suffragettes\",\"zh\":\"女權運動者\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Quakers\",\"zh\":\"貴格會教徒\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Cavaliers\",\"zh\":\"騎士黨\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The supporters of King Charles I during the English Civil War were known as Cavaliers (Royalists), while the supporters of Parliament were known as Roundheads.\",\"zh\":\"在英國內戰期間，支持國王查理一世 （King Charles I） 的人被稱為騎士黨 （Cavaliers，即保王黨），而支持議會的人則被稱為圓顱黨 （Roundheads） 。\"}},{\"id\":\"4-20\",\"question\":{\"en\":\"In 1833 the Emancipation Act abolished slavery throughout the British Empire.\",\"zh\":\"1833年的《解放法案》廢除了整個大英帝國的奴隸制。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Slavery Abolition Act (often referred to as the Emancipation Act) was passed in 1833, outlawing slavery in most parts of the British Empire.\",\"zh\":\"《廢除奴隸制法案》（常被稱為解放法案）於1833年通過，在大英帝國的大部分地區宣布奴隸制非法。\"}},{\"id\":\"4-21\",\"question\":{\"en\":\"Which two documents do you need to apply for a National Insurance number?\",\"zh\":\"申請國民保險號碼需要哪兩個文件？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"A document with your address on it, such as a tenancy agreement\",\"zh\":\"寫有您地址的文件，例如租賃協議\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Documents that prove that you have permission to work in the UK\",\"zh\":\"證明您有權在英國工作的文件\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"A contract from your employer\",\"zh\":\"雇主提供的雇傭合同\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Documents that prove your identity\",\"zh\":\"證明您身份的文件\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"To get a National Insurance number, you must provide documents proving your identity and your permission to work in the UK.\",\"zh\":\"要獲得國民保險號碼，您必須提供證明您身份及您有權在英國工作的文件。\"}},{\"id\":\"4-22\",\"question\":{\"en\":\"When did the Emancipation Act abolish slavery throughout the British Empire?\",\"zh\":\"《廢奴法案》何時在整個大英帝國廢除奴隸制？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"1835\",\"zh\":\"1835\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"1823\",\"zh\":\"1823\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"1807\",\"zh\":\"1807\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"1833\",\"zh\":\"1833\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The Emancipation Act abolished slavery throughout the British Empire in 1833.\",\"zh\":\"《廢奴法案》於1833年通過，在整個大英帝國廢除了奴隸制。\"}},{\"id\":\"4-23\",\"question\":{\"en\":\"Which sport can be traced back to the 15th century in Scotland?\",\"zh\":\"哪項運動可以追溯到15世紀的蘇格蘭？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Golf\",\"zh\":\"高爾夫球\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Tennis\",\"zh\":\"網球\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Football\",\"zh\":\"足球\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Rugby\",\"zh\":\"橄欖球\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The modern game of golf can be traced back to 15th-century Scotland.\",\"zh\":\"現代高爾夫球運動起源於15世紀的蘇格蘭。\"}},{\"id\":\"4-24\",\"question\":{\"en\":\"When did the first farmers come to Britain?\",\"zh\":\"第一批農民何時來到英國？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"10,000 years ago\",\"zh\":\"10,000年前\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"6,000 years ago\",\"zh\":\"6,000年前\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"15,000 years ago\",\"zh\":\"15,000年前\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"2,000 years ago\",\"zh\":\"2,000年前\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The first farmers came to Britain around 6,000 years ago.\",\"zh\":\"第一批農民大約在6000年前來到英國。\"}}]}}]}]\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"12:I[27201,[\"/LifeInUK/_next/static/chunks/2giwr0i316ej9.js\",\"/LifeInUK/_next/static/chunks/14mrh2-p_w84d.js\"],\"IconMark\"]\n9:null\ne:[[\"$\",\"title\",\"0\",{\"children\":\"Life in the UK Mock Test\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Bilingual Life in the UK Mock Test App\"}],[\"$\",\"link\",\"2\",{\"rel\":\"manifest\",\"href\":\"/LifeInUK/manifest.webmanifest\",\"crossOrigin\":\"$undefined\"}],[\"$\",\"meta\",\"3\",{\"name\":\"mobile-web-app-capable\",\"content\":\"yes\"}],[\"$\",\"
