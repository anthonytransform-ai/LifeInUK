p_w84d.js\",\"/LifeInUK/_next/static/chunks/1mgn7-b_f-rf5.js\"],\"default\"]\n"])</script><script>self.__next_f.push([1,"6:[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-6 w-full flex-1 flex flex-col\",\"children\":[\"$\",\"$L11\",null,{\"mockTest\":{\"setId\":18,\"title\":{\"en\":\"Mock Exam Set 18\",\"zh\":\"模擬考試 第18套\"},\"questions\":[{\"id\":\"18-1\",\"question\":{\"en\":\"Who was the first British Prime Minister?\",\"zh\":\"誰是英國第一任首相？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Winston Churchill\",\"zh\":\"溫斯頓·邱吉爾 (Winston Churchill)\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Earl of Wilmington\",\"zh\":\"威爾明頓伯爵 (Earl of Wilmington)\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Henry Pelham\",\"zh\":\"亨利·佩勒姆 (Henry Pelham)\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Sir Robert Walpole\",\"zh\":\"羅伯特·華波爵士 (Sir Robert Walpole)\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Sir Robert Walpole is widely acknowledged as the first Prime Minister of Great Britain, serving from 1721 to 1742.\",\"zh\":\"羅伯特·華波爵士被廣泛公認為大不列顛的第一任首相，於 1721 年至 1742 年在任。\"}},{\"id\":\"18-2\",\"question\":{\"en\":\"Why were women given the right to vote?\",\"zh\":\"為什麼女性獲得了投票權？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"In recognition of the contribution women made to the war effort during the First World War\",\"zh\":\"為了表彰女性在第一次世界大戰期間為戰爭努力所做出的貢獻\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"In recognition of the contribution women made to the war effort during the Second World War\",\"zh\":\"為了表彰女性在第二次世界大戰期間為戰爭努力所做出的貢獻\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"In recognition of the contribution women made to the war effort during the Crimean War\",\"zh\":\"為了表彰女性在克里米亞戰爭期間為戰爭努力所做出的貢獻\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"In recognition of the contribution women made to the war effort during the Civil War\",\"zh\":\"為了表彰女性在內戰期間為戰爭努力所做出的貢獻\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Women's immense contribution to the war effort during the First World War was a major factor in finally securing the right to vote in 1918.\",\"zh\":\"女性在第一次世界大戰期間對戰爭的巨大貢獻，是促成她們最終在1918年獲得投票權的主要因素。\"}},{\"id\":\"18-3\",\"question\":{\"en\":\"Which two universities participate in an annual rowing race that takes place on the River Thames?\",\"zh\":\"哪兩所大學參加在泰晤士河上舉行的一年一度划船比賽？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The University of Oxford\",\"zh\":\"牛津大學（The University of Oxford）\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"The University of Cambridge\",\"zh\":\"劍橋大學（The University of Cambridge）\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"The University of Manchester\",\"zh\":\"曼徹斯特大學（The University of Manchester）\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The University of Warwick\",\"zh\":\"華威大學（The University of Warwick）\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The University of Oxford and the University of Cambridge compete in the famous annual Boat Race on the River Thames.\",\"zh\":\"牛津大學（University of Oxford）和劍橋大學（University of Cambridge）在泰晤士河上進行一年一度著名的划船對抗賽（The Boat Race）。\"}},{\"id\":\"18-4\",\"question\":{\"en\":\"Anyone who is violent towards their partner -- whether they are a man or a woman, married or living together -- can be prosecuted.\",\"zh\":\"任何對伴侶施暴的人——無論是男是女，已婚或同居——都可能被起訴。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Domestic violence is a serious crime in the UK, and anyone who is violent towards their partner can be prosecuted.\",\"zh\":\"在英國，家庭暴力是嚴重的犯罪，任何人對伴侶施暴都可能被起訴。\"}},{\"id\":\"18-5\",\"question\":{\"en\":\"Which TWO of the following are amongst the shared goals of the Commonwealth?\",\"zh\":\"以下哪兩項屬於英聯邦的共同目標？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Development\",\"zh\":\"發展\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Democracy\",\"zh\":\"民主\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Discrimination\",\"zh\":\"歧視\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Dependency\",\"zh\":\"依賴\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The shared goals of the Commonwealth include democracy, development, and peace.\",\"zh\":\"英聯邦的共同目標包括促進民主、發展與和平。\"}},{\"id\":\"18-6\",\"question\":{\"en\":\"A snack made from flour, dried fruits and spices and served either hot or cold is which of the following?\",\"zh\":\"以下哪一項是由麵粉、乾果和香料製成，且冷熱皆可食用的點心？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"An English muffin\",\"zh\":\"英式瑪芬\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"A Welsh cake\",\"zh\":\"威爾斯蛋糕\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"A Scottish bun\",\"zh\":\"蘇格蘭小圓麵包\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"An Irish pie\",\"zh\":\"愛爾蘭派\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"A Welsh cake is a traditional sweet snack made from flour, dried fruits, and spices, baked on a griddle, and can be served hot or cold.\",\"zh\":\"威爾斯蛋糕（Welsh cake）是一種傳統的甜味點心，由麵粉、乾果和香料製成，在烤盤上烤製，可熱食或冷食。\"}},{\"id\":\"18-7\",\"question\":{\"en\":\"Which Anglo-Saxon poem tells of its hero's battles against monsters?\",\"zh\":\"哪一部盎格魯-撒克遜詩歌講述了其英雄與怪物戰鬥的故事？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Deor\",\"zh\":\"迪奧爾\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Waldere\",\"zh\":\"瓦爾德雷\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Fight at Finnsburh\",\"zh\":\"芬斯堡之戰\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Beowulf\",\"zh\":\"貝奧武夫\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Beowulf is an Old English epic poem, consisting of 3,182 alliterative lines, telling the story of its hero Beowulf who battles the monster Grendel, Grendel's mother, and a dragon.\",\"zh\":\"《貝奧武夫》（Beowulf）是一部古英語史詩，由3,182行頭韻詩句組成，講述了英雄貝奧武夫與怪物格蘭戴爾、格蘭戴爾的母親以及一條巨龍戰鬥的故事。\"}},{\"id\":\"18-8\",\"question\":{\"en\":\"Which film produced in the UK was one of the most commercially successful films of all time and one of the highest-grossing film franchises?\",\"zh\":\"哪部在英國製作的電影是史上商業最成功的電影之一，也是票房最高的系列電影之一？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Harry Potter\",\"zh\":\"哈利波特\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Spider-man\",\"zh\":\"蜘蛛人\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Lord of the Rings\",\"zh\":\"魔戒\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Indiana Jones\",\"zh\":\"印第安納瓊斯\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Harry Potter film franchise is one of the most successful film franchises of all time and was produced in the UK.\",\"zh\":\"《哈利波特》系列是在英國製作的史上最成功及票房最高的電影系列之一。\"}},{\"id\":\"18-9\",\"question\":{\"en\":\"Where is the UK geographically located?\",\"zh\":\"英國在地理上位於哪裡？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"South west of Europe\",\"zh\":\"歐洲西南部\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"North east of Europe\",\"zh\":\"歐洲東北部\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"North west of Europe\",\"zh\":\"歐洲西北部\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"South east of Europe\",\"zh\":\"歐洲東南部\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The United Kingdom is located in the north-west of the European continent.\",\"zh\":\"聯合王國位於歐洲大陸的西北部。\"}},{\"id\":\"18-10\",\"question\":{\"en\":\"When were men and women given the right to vote at the age of 21?\",\"zh\":\"男女何時被賦予在21歲投票的權利？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"1918\",\"zh\":\"1918年\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"1903\",\"zh\":\"1903年\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"1928\",\"zh\":\"1928年\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"1923\",\"zh\":\"1923年\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Equal Franchise Act of 1928 gave women the vote at the age of 21, the same age as men.\",\"zh\":\"1928年的《平等選舉權法》賦予女性在21歲投票的權利，與男性相同。\"}},{\"id\":\"18-11\",\"question\":{\"en\":\"The names or photographs of  young people found guilty of a crime can be published in newspapers or used by the media.\",\"zh\":\"被判有罪的青少年的姓名或照片可以被報紙公布或被媒體使用。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"In England, Wales, and Northern Ireland, the names or photographs of young people under 18 who are found guilty of a crime cannot be published in newspapers or used by the media.\",\"zh\":\"在英格蘭、威爾斯和北愛爾蘭，媒體或報紙不得公布被判有罪的 18 歲以下青少年的姓名或照片。\"}},{\"id\":\"18-12\",\"question\":{\"en\":\"Who was born in Stratford-upon-Avon?\",\"zh\":\"誰出生在埃文河畔斯特拉特福 (Stratford-upon-Avon)？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Jane Austen\",\"zh\":\"珍·奧斯汀\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Charles Dickens\",\"zh\":\"查爾斯·狄更斯\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"William Shakespeare\",\"zh\":\"威廉·莎士比亞 (William Shakespeare)\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Thomas Hardy\",\"zh\":\"湯瑪斯·哈代\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"William Shakespeare, widely regarded as the greatest writer in the English language, was born in Stratford-upon-Avon.\",\"zh\":\"威廉·莎士比亞被廣泛認為是英語文學中最偉大的作家，他出生於埃文河畔斯特拉特福。\"}},{\"id\":\"18-13\",\"question\":{\"en\":\"Where were Elizabeth I's parents?\",\"zh\":\"伊麗莎白一世的父母是誰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Henry VIII and Catherine of Aragon\",\"zh\":\"亨利八世和阿拉貢的凱瑟琳\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Henry VII and Elizabeth of York\",\"zh\":\"亨利七世和約克的伊麗莎白\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Henry VIII and Anne Boleyn\",\"zh\":\"亨利八世和安妮·博林\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Henry VIII and Jane Seymour\",\"zh\":\"亨利八世和珍·西摩\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Elizabeth I was the daughter of King Henry VIII and his second wife, Anne Boleyn.\",\"zh\":\"伊麗莎白一世是國王亨利八世與其第二任妻子安妮·博林的女兒。\"}},{\"id\":\"18-14\",\"question\":{\"en\":\"The last battle between Britain and France was the battle of Waterloo.\",\"zh\":\"英國和法國之間的最後一場戰役是滑鐵盧戰役。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Battle of Waterloo in 1815 was the final defeat of Napoleon and the last major battle fought between Britain and France.\",\"zh\":\"1815年的滑鐵盧戰役是拿破崙的最終失敗，也是英國和法國之間最後一場重大戰役。\"}},{\"id\":\"18-15\",\"question\":{\"en\":\"William of Orange was asked by Protestants to invade England and proclaim himself king. But, when William reached England, there was no resistance and he took over the throne. This event was later Known as:\",\"zh\":\"新教徒邀請奧蘭治的威廉 （William of Orange） 入侵英格蘭並宣告自己為國王。但當威廉抵達英格蘭時，並未遇到任何抵抗，他便繼承了王位。這一事件後來被稱為：\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The 'Glorious Revolution'\",\"zh\":\"「光榮革命」\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"The Restoration\",\"zh\":\"王政復辟\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The 'Great Depression'\",\"zh\":\"「大蕭條」\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The 'Blitz'\",\"zh\":\"「大轟炸」\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"This event is called the 'Glorious Revolution' because there was no fighting and it established the parliament's power over the monarch.\",\"zh\":\"這一事件被稱為「光榮革命」 （Glorious Revolution） ，因為整個過程沒有發生戰鬥，並且確立了議會高於君主的權力。\"}},{\"id\":\"18-16\",\"question\":{\"en\":\"Who is the patron Saint of Wales?\",\"zh\":\"威爾斯的守護神是誰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"St David\",\"zh\":\"聖大衛\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"St George\",\"zh\":\"聖喬治\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"St Patrick\",\"zh\":\"聖派翠克\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"St Andrew\",\"zh\":\"聖安德魯\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"St David is the patron saint of Wales, and St David's Day is celebrated on 1 March.\",\"zh\":\"聖大衛。他是威爾斯的守護神，聖大衛日為3月1日。\"}},{\"id\":\"18-17\",\"question\":{\"en\":\"How are civil servants appointed and what political party do they belong to?\",\"zh\":\"公務員是如何任命的？他們屬於哪個政黨？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"They are chosen on merit and form part of the Liberal Democrats party\",\"zh\":\"他們憑才能入選，並且是自由民主黨的一部分\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"They are chosen randomly and form part of the Conservative party\",\"zh\":\"他們隨機挑選，並且是保守黨的一部分\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"They are chosen randomly and are politically neutral\",\"zh\":\"他們隨機挑選，且保持政治中立\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"They are chosen on merit and are politically neutral\",\"zh\":\"他們憑才能入選，且保持政治中立\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Civil servants are appointed on merit based on fair and open competition, and they must remain politically neutral to serve the government of the day.\",\"zh\":\"公務員是基於公平和公開的競爭並憑藉才能受委任的，他們必須保持政治中立，以服務當屆政府。\"}},{\"id\":\"18-18\",\"question\":{\"en\":\"What is the name of the period when new ideas about politics, philosophy and science were developed?\",\"zh\":\"發展出關於政治、哲學和科學新思想的那個時期被稱作什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Enlightenment\",\"zh\":\"啟蒙運動\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"The Glorious Revolution\",\"zh\":\"光榮革命\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Swinging Sixties\",\"zh\":\"搖擺六十年代\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The Reformation\",\"zh\":\"宗教改革\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Enlightenment was an intellectual and philosophical movement that dominated the world of ideas in Europe during the 18th century.\",\"zh\":\"啟盟運動 （The Enlightenment） 是 18 世紀主導歐洲思想界的一場知識與哲學運動，在此期間發展了關於政治、哲學和科學的新思想。\"}},{\"id\":\"18-19\",\"question\":{\"en\":\"Is St Helena part of the UK?\",\"zh\":\"聖赫勒拿（St Helena）是聯合王國（UK）的一部分嗎？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Yes\",\"zh\":\"是\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"No\",\"zh\":\"否\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"St Helena is a British Overseas Territory, but it is not part of the United Kingdom itself.\",\"zh\":\"聖赫勒拿（St Helena）是英國海外領土，但它本身不屬於聯合王國（UK）的一部分。\"}},{\"id\":\"18-20\",\"question\":{\"en\":\"Who was Emmeline Pankhurst?\",\"zh\":\"艾米琳·潘克斯特（Emmeline Pankhurst）是誰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"A suffragette\",\"zh\":\"一位爭取女性參政權的激進婦女（Suffragette）\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"A nurse\",\"zh\":\"一位護士\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"A doctor\",\"zh\":\"一位醫生\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"A scientist\",\"zh\":\"一位科學家\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Emmeline Pankhurst was a famous British political activist who led the suffragette movement to help women win the right to vote.\",\"zh\":\"艾米琳·潘克斯特（Emmeline Pankhurst）是著名的英國政治活動家，她領導了女性參政運動以幫助女性獲得投票權。\"}},{\"id\":\"18-21\",\"question\":{\"en\":\"How are the members of the Northern Ireland Parliament elected?\",\"zh\":\"北愛爾蘭議會議員是如何選出的？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"By a system of proportional representation\",\"zh\":\"通過比例代表制系統\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Using a system of ranked voting\",\"zh\":\"使用排序投票制系統\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Using the first past the post system\",\"zh\":\"使用簡單多數票決制系統 (第一過杆制)\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Using a runoff system\",\"zh\":\"使用兩輪選舉制系統\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Northern Ireland Assembly uses the Single Transferable Vote system, which is a form of proportional representation.\",\"zh\":\"北愛爾蘭議會使用單一可轉移票制 (Single Transferable Vote)，這是一種比例代表制形式。\"}},{\"id\":\"18-22\",\"question\":{\"en\":\"Who is the patron Saint of Northern Ireland?\",\"zh\":\"誰是北愛爾蘭的主保聖人？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"St George\",\"zh\":\"聖喬治\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"St Patrick\",\"zh\":\"聖派翠克\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"St Andrew\",\"zh\":\"聖安德魯\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"St David\",\"zh\":\"聖大衛\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Saint Patrick is the patron saint of Northern Ireland. His feast day is celebrated on the 17th of March.\",\"zh\":\"聖派翠克 （St Patrick） 是北愛爾蘭的主保聖人。他的節日在每年的 3 月 17 日慶祝。\"}},{\"id\":\"18-23\",\"question\":{\"en\":\"Who chairs debates in the House of Commons?\",\"zh\":\"誰主持下議院的辯論？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Foreign Secretary\",\"zh\":\"外交大臣\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The Speaker\",\"zh\":\"議長\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"The Prime Minister\",\"zh\":\"首相\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The leader of the opposition\",\"zh\":\"反對黨領袖\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Speaker is the MP chosen to chair debates in the House of Commons, keeping order and remaining politically neutral.\",\"zh\":\"議長（The Speaker）是獲選主持下議院辯論的議員，負責維持秩序並保持政治中立。\"}},{\"id\":\"18-24\",\"question\":{\"en\":\"What is the name of the tour guides that tell visitors stories about the Tower of London's history?\",\"zh\":\"在倫敦塔向遊客講述歷史故事的導遊稱為什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Knights\",\"zh\":\"騎士\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Chartists\",\"zh\":\"憲章派\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Suffragettes\",\"zh\":\"婦女參政運動者\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Beefeaters\",\"zh\":\"倫敦塔衛兵 (Beefeaters)\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The Yeomen Warders, popularly known as Beefeaters, serve as tour guides at the Tower of London.\",\"zh\":\"倫敦塔衛兵 (Beefeaters)。他們正式名稱為「御用侍從衛士」，負責在倫敦塔為遊客導覽。\"}}]}}]}]\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"12:I[27201,[\"/LifeInUK/_next/static/chunks/2giwr0i316ej9.js\",\"/LifeInUK/_next/static/chunks/14mrh2-p_w84d.js\"],\"IconMark\"]\n9:null\ne:[[\"$\",\"title\",\"0\",{\"children\":\"Life in the UK Mock Test\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Bilingual Life in the UK Mock Test App\"}],[\"$\",\"link\",\"2\",{\"rel\":\"manifest\",\"href\":\"/LifeInUK/manifest.json\",\"crossOrigin\":\"$undefined\"}],[\"$\",\"meta\",\"3\",{\"name\":\"mobile-web-app-capable\",\"content\":\"yes\"}],[\"$\",\"meta\",\"4\",{\"name\":\"apple-mobile-web-app-title\",\"content\":\"LifeInUK\"}],[\"$\",\"meta\",\"5\",{\"name\":\"apple-mobile-web-app-status-bar-style\",\"content\":\"default\"}],[\"$\",\"link\",\"6\",{\"rel\":\"apple-touch-icon\",\"href\":\"/LifeInUK/icons/apple-touch-icon.png\"}],[\"$\",\"$L12\",\"7\",{}]]\n"])</script></body></html>
