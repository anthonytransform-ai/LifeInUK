astle)\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Housesteads\",\"zh\":\"豪斯泰德 (Housesteads)\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Grimsby\",\"zh\":\"格里姆斯比 (Grimsby)\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Vindolanda and Housesteads are two forts that were part of Hadrian's Wall.\",\"zh\":\"文多蘭達（Vindolanda）和豪斯泰德（Housesteads）是哈德良長城上的兩座堡壘。\"}},{\"id\":\"16-2\",\"question\":{\"en\":\"What is the capital city of Scotland?\",\"zh\":\"蘇格蘭的首府城市是哪裡？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Glasgow\",\"zh\":\"格拉斯哥\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"St Andrews\",\"zh\":\"聖安德魯斯\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Edinburgh\",\"zh\":\"愛丁堡\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Aberdeen\",\"zh\":\"阿伯丁\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Edinburgh is the capital of Scotland and has been its capital since the 15th century.\",\"zh\":\"愛丁堡是蘇格蘭的首府，自15世紀以來一直是其政治中心。\"}},{\"id\":\"16-3\",\"question\":{\"en\":\"Who wrote Sherlock Holmes?\",\"zh\":\"誰寫了《福爾摩斯》？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Evelyn Waugh\",\"zh\":\"伊夫林·沃\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Sir Kingsley Amis\",\"zh\":\"金斯利·艾米斯爵士\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Graham Greene\",\"zh\":\"格雷厄姆·格林\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Sir Arthur Conan Doyle\",\"zh\":\"亞瑟·柯南·道爾爵士\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Sir Arthur Conan Doyle was a Scottish writer who created the famous fictional detective Sherlock Holmes.\",\"zh\":\"亞瑟·柯南·道爾爵士。他是蘇格蘭作家，創造了著名的虛構偵探福爾摩斯。\"}},{\"id\":\"16-4\",\"question\":{\"en\":\"Who wrote musicals such as Cats, The Phantom of the Opera, and Evita?\",\"zh\":\"誰創作了如《貓》（Cats）、《歌劇魅影》（The Phantom of the Opera）和《艾薇塔》（Evita）等音樂劇？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Gilbert and Sullivan\",\"zh\":\"吉爾伯特與沙利文\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Sir Edward Elgar\",\"zh\":\"愛德華·埃爾加爵士\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Andrew Lloyd Webber\",\"zh\":\"安德魯·洛伊·韋伯\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Julian Lloyd Webber\",\"zh\":\"朱利安·洛伊·韋伯\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Andrew Lloyd Webber is a highly successful British composer who wrote famous musicals like Cats, Evita, and The Phantom of the Opera.\",\"zh\":\"安德魯·洛伊·韋伯（Andrew Lloyd Webber）是位非常成功的英國作曲家，曾創作了《貓》、《艾薇塔》和《歌劇魅影》等著名音樂劇。\"}},{\"id\":\"16-5\",\"question\":{\"en\":\"Who was the first Archbishop of Canterbury?\",\"zh\":\"誰是第一任坎特伯雷大主教？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"St Patrick\",\"zh\":\"聖派翠克\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"St Augustine\",\"zh\":\"聖奧古斯丁\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"St Andrew\",\"zh\":\"聖安德烈\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"St Columba\",\"zh\":\"聖哥倫巴\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"St Augustine became the first Archbishop of Canterbury.\",\"zh\":\"聖奧古斯丁成為第一任坎特伯雷大主教。\"}},{\"id\":\"16-6\",\"question\":{\"en\":\"Where was William Shakespeare born?\",\"zh\":\"威廉 · 莎士比亞出生在哪裡？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Manchester\",\"zh\":\"曼徹斯特\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Oldham\",\"zh\":\"奧爾德姆\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Stratford-upon-Avon\",\"zh\":\"雅芳河畔斯特拉特福\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Lincolnshire\",\"zh\":\"林肯郡\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"William Shakespeare was born in Stratford-upon-Avon, England, in April 1564.\",\"zh\":\"威廉 · 莎士比亞 （William Shakespeare） 於 1564 年 4 月出生於英格蘭的雅芳河畔斯特拉特福 （Stratford-upon-Avon） 。\"}},{\"id\":\"16-7\",\"question\":{\"en\":\"Which two of the following religious communities celebrate Diwali?\",\"zh\":\"下列哪兩個宗教群體慶祝排燈節（Diwali）？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Buddhists\",\"zh\":\"佛教徒\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Hindus\",\"zh\":\"印度教徒\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Jews\",\"zh\":\"猶太教徒\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Sikhs\",\"zh\":\"錫克教徒\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Diwali is the Festival of Lights, celebrated by both Hindus and Sikhs.\",\"zh\":\"排燈節是印度教徒和錫克教徒共同慶祝的光明節。\"}},{\"id\":\"16-8\",\"question\":{\"en\":\"Which two of the following are Civil War Battles?\",\"zh\":\"以下哪兩場是內戰時期的戰役？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Battle of Waterloo\",\"zh\":\"滑鐵盧戰役\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The Battle of Marston Moor\",\"zh\":\"馬斯頓荒原戰役\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"The Battle of Naseby\",\"zh\":\"內斯比戰役\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"The Battle of Agincourt\",\"zh\":\"阿金庫爾戰役\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Battle of Marston Moor (1644) and the Battle of Naseby (1645) were major conflicts of the English Civil War, both won by the Parliamentarians.\",\"zh\":\"馬斯頓荒原戰役（1644年）和內斯比戰役（1645年）是英格蘭內戰期間的主要衝突，均由議會派獲勝。\"}},{\"id\":\"16-9\",\"question\":{\"en\":\"By law, which TWO types of media have to give a balanced coverage of all political parties and equal time to rival viewpoints before an election?\",\"zh\":\"法律規定，在選舉前哪兩種媒體必須對所有政黨進行平衡報導，並為競爭對手提供同等時間闡述觀點？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Television\",\"zh\":\"電視\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Internet\",\"zh\":\"網路\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Newspapers\",\"zh\":\"報紙\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Radio\",\"zh\":\"廣播\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"By law, television and radio coverage must be balanced and impartial, unlike newspapers which can support specific parties.\",\"zh\":\"法律規定，電視和廣播的報導必須保持平衡與公正，這與可以支持特定政黨的報紙不同。\"}},{\"id\":\"16-10\",\"question\":{\"en\":\"Since which year has the UK had a fully democratic voting system.\",\"zh\":\"自哪一年起，英國擁有了完全民主的投票制度？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"1969\",\"zh\":\"1969\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"1918\",\"zh\":\"1918\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"1928\",\"zh\":\"1928\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"1889\",\"zh\":\"1889\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The UK has had a fully democratic voting system since 1928, when the Equal Franchise Act gave women the vote on the same terms as men (at age 21).\",\"zh\":\"英國自1928年起實行完全民主的投票制度，當時的《平等特許權法》賦予女性與男性相同的投票權（21歲）。\"}},{\"id\":\"16-11\",\"question\":{\"en\":\"What song is sung by people in the UK and other countries when they are celebrating the New Year?\",\"zh\":\"英國和其他國家的人們在慶祝新年時會唱什麼歌？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Auld Lang Syne\",\"zh\":\"友誼萬歲 (Auld Lang Syne)\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"The British Anthem\",\"zh\":\"英國國歌\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Jingle Bells\",\"zh\":\"鈴兒響叮噹 (Jingle Bells)\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"White Christmas\",\"zh\":\"白色聖誕\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Auld Lang Syne is a traditional song frequently sung at New Year.\",\"zh\":\"《友誼萬歲》（Auld Lang Syne）是新年時常唱的歌曲。\"}},{\"id\":\"16-12\",\"question\":{\"en\":\"Queen Elizabeth II is the head of state for which TWO of the following?\",\"zh\":\"伊莉莎白二世女王是以下哪兩個的國家元元首？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The European Union\",\"zh\":\"歐盟\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The United Kingdom\",\"zh\":\"英國\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Many Commonwealth countries\",\"zh\":\"許多大英國協國家\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Iceland\",\"zh\":\"冰島\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Queen Elizabeth II was the head of state of the United Kingdom and also of many individual Commonwealth nations (like Canada, Australia, and New Zealand).\",\"zh\":\"女王伊莉莎白二世是英國的國家元首，同時也是許多獨立大英國協國家（如加拿大、澳洲和紐西蘭）的國家元首。\"}},{\"id\":\"16-13\",\"question\":{\"en\":\"What do you need to do to apply for a National Insurance Number?\",\"zh\":\"申請國民保險號碼需要做什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Contact the NHS\",\"zh\":\"聯繫國民保健署 (NHS)\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Contact the Department for Work and Pensions (DWP)\",\"zh\":\"聯繫就業及退休保障部 (DWP)\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Contact your local MP\",\"zh\":\"聯繫您當地的國會議員 (MP)\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Ask you employer to get it for you\",\"zh\":\"要求您的雇主幫您申請\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"To apply for a National Insurance number, you must contact the Department for Work and Pensions (DWP) or apply online through the official government portal.\",\"zh\":\"要申請國民保險號碼，您必須聯繫就業及退休保障部（DWP）或透過官方政府網站進行線上申請。\"}},{\"id\":\"16-14\",\"question\":{\"en\":\"When is St Andrew's day celebrated?\",\"zh\":\"聖安德魯斯日（St Andrew's Day）於何時慶祝？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"17th April\",\"zh\":\"4 月 17 日\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"31st December\",\"zh\":\"12 月 31 日\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"1st March\",\"zh\":\"3 月 1 日\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"30th November\",\"zh\":\"11 月 30 日\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"St Andrew's Day, the patron saint day of Scotland, is celebrated on 30 November.\",\"zh\":\"聖安德魯斯日（St Andrew's Day）是蘇格蘭的守護神節日，於每年的 11 月 30 日慶祝。\"}},{\"id\":\"16-15\",\"question\":{\"en\":\"A poll card includes which TWO pieces of information?\",\"zh\":\"投票卡（poll card）包含以下哪兩項資訊？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The date of the election\",\"zh\":\"選舉日期\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Where the polling station or polling place is located\",\"zh\":\"投票站的位置\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"How much tax you should pay\",\"zh\":\"您應該繳納多少稅款\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Who you should vote for\",\"zh\":\"您應該投票給誰\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"A poll card is sent to registered voters before an election. It includes details such as your voter number, the election date, and the address of your polling station.\",\"zh\":\"投票卡在選舉前寄給已登記的選民。它包含您的選民編號、選舉日期以及您的投票站地址等詳細資訊。\"}},{\"id\":\"16-16\",\"question\":{\"en\":\"The UK government has never suspended the Northern Ireland Assembly.\",\"zh\":\"英國政府從未暫停過北愛爾蘭議會（Northern Ireland Assembly）的運作。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The UK government has suspended the Northern Ireland Assembly on several occasions when the power-sharing agreement broke down.\",\"zh\":\"在權力分享協議破裂時，英國政府曾多次暫停北愛爾蘭議會的運作。\"}},{\"id\":\"16-17\",\"question\":{\"en\":\"When is St George's day?\",\"zh\":\"聖喬治日 (St George's day) 是在什麼時候？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"17th March\",\"zh\":\"3 月 17 日\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"30th November\",\"zh\":\"11 月 30 日\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"1st March\",\"zh\":\"3 月 1 日\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"23rd April\",\"zh\":\"4 月 23 日\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"St George's Day is celebrated on 23rd April and is the patron saint day of England.\",\"zh\":\"聖喬治日於 4 月 23 日慶祝，是英格蘭的主保聖人紀念日。\"}},{\"id\":\"16-18\",\"question\":{\"en\":\"MPs can only be contacted by post.\",\"zh\":\"國會議員 (MPs) 只能透過郵寄方式聯繫。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"MPs can be contacted by letter, telephone, email, or in person at their local constituency surgeries.\",\"zh\":\"可以透過信件、電話、電子郵件聯繫國會議員，或者親自前往他們在當地選區的辦事處面談。\"}},{\"id\":\"16-19\",\"question\":{\"en\":\"Where is Swansea located?\",\"zh\":\"斯旺西（Swansea）位於哪裡？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"England\",\"zh\":\"英格蘭\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Northern Ireland\",\"zh\":\"北愛爾蘭\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Scotland\",\"zh\":\"蘇格蘭\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Wales\",\"zh\":\"威爾斯\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Swansea is the second-largest city in Wales, located on the southwest coast.\",\"zh\":\"斯旺西是威爾斯的第二大城市，位於西南部海岸。\"}},{\"id\":\"16-20\",\"question\":{\"en\":\"Who was elected as British Prime Minister in 1945?\",\"zh\":\"誰在1945年當選為英國首相？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Clement Attlee\",\"zh\":\"克萊曼·艾德禮\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Winston Churchill\",\"zh\":\"溫斯頓·邱吉爾\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Harold Wilson\",\"zh\":\"哈羅德·威爾遜\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Harold Macmillan\",\"zh\":\"哈羅德·麥克米倫\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Clement Attlee was elected as British Prime Minister in 1945.\",\"zh\":\"克萊曼·艾德禮（Clement Attlee）在1945年當選為英國首相。\"}},{\"id\":\"16-21\",\"question\":{\"en\":\"Who was William Wilberforce?\",\"zh\":\"威廉·威伯福斯 (William Wilberforce) 是誰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"A poet\",\"zh\":\"一位詩人\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"A sportsman\",\"zh\":\"一位運動員\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"A politician\",\"zh\":\"一位政治家\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"A musician\",\"zh\":\"一位音樂家\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"William Wilberforce was a British politician and philanthropist who led the movement to abolish the slave trade in the British Empire.\",\"zh\":\"威廉·威伯福斯是一位英國政治家和慈善家，他領導了廢除大英帝國奴隸貿易的運動。\"}},{\"id\":\"16-22\",\"question\":{\"en\":\"During the Enlightenment, Adam Smith developed ideas about:\",\"zh\":\"在啟蒙運動時期，亞當·斯密發展了關於什麼的思想？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Physics\",\"zh\":\"物理學\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Economics\",\"zh\":\"經濟學\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Science\",\"zh\":\"科學\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Engineering\",\"zh\":\"工程學\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"During the Enlightenment, Scottish philosopher Adam Smith wrote 'The Wealth of Nations', developing key ideas about economics and free markets.\",\"zh\":\"在啟蒙運動時期，蘇格蘭哲學家亞當·斯密撰寫了《國富論》，發展了關於經濟學和自由市場的關鍵思想。\"}},{\"id\":\"16-23\",\"question\":{\"en\":\"What was achieved with the Carta Magna?\",\"zh\":\"大憲章 (Magna Carta) 實現了什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"It restricted the King's power\",\"zh\":\"它限制了國王的權力\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"It increased the King's power\",\"zh\":\"它增加了國王的權力\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"It restricted the rights of the farmers\",\"zh\":\"它限制了農民的權利\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"It increased women's power\",\"zh\":\"它增加了婦女的權力\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Magna Carta (Great Charter) of 1215 restricted the King's power and established that even the monarch is subject to the law.\",\"zh\":\"1215年的《大憲章》限制了國王的權力，並確立了即使是君主也必須遵守法律的原則。\"}},{\"id\":\"16-24\",\"question\":{\"en\":\"Which two political parties formed a coalition in 2010?\",\"zh\":\"哪兩個政黨在2010年組成了聯合政府？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Conservative Party\",\"zh\":\"保守黨\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"The Green Party\",\"zh\":\"綠黨\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Labour Party\",\"zh\":\"工黨\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The Liberal Democrats Party\",\"zh\":\"自由民主黨\"},\"isCorrect\":true}],\"explan
