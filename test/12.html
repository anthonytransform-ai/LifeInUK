en\":\"21\",\"zh\":\"21\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"You must be 18 to go into betting shops or gambling clubs in the UK.\",\"zh\":\"在英國，您必須年滿18歲才能進入投注站或賭博俱樂部。\"}},{\"id\":\"12-4\",\"question\":{\"en\":\"The Bill of Rights of 1689 confirmed the right to vote for all adult men.\",\"zh\":\"1689年的《權利法案》確認了所有成年男性的選舉權。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"This statement is false. The Bill of Rights of 1689 limited the monarch's power and confirmed the rights of Parliament, but did not grant universal suffrage.\",\"zh\":\"此陳述是錯誤的。1689年的《權利法案》限制了君主的權力並確認了議會的權利，但並未授予普選權。\"}},{\"id\":\"12-5\",\"question\":{\"en\":\"What is the Cenotaph?\",\"zh\":\"和平紀念碑（Cenotaph）是什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"A flower\",\"zh\":\"一種花\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"A Christian church\",\"zh\":\"一間基督教堂\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"A war memorial\",\"zh\":\"一座戰爭紀念碑\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"A theatre\",\"zh\":\"一間劇院\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Cenotaph, located in Whitehall, London, is the site of the annual Remembrance Day service and is a war memorial.\",\"zh\":\"位於倫敦白廳的和平紀念碑是一座戰爭紀念碑，也是每年國殤紀念日儀式的舉辦地。\"}},{\"id\":\"12-6\",\"question\":{\"en\":\"There are 15 national parks in England, Wales and Scotland. What are national parks?\",\"zh\":\"在英格蘭、威爾斯和蘇格蘭共有 15 個國家公園。什麼是國家公園？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Giant greenhouses\",\"zh\":\"巨大的溫室\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Land formations of columns made from volcanic lava\",\"zh\":\"由火山熔岩形成的柱狀陸地地貌\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Areas of protected countryside\",\"zh\":\"受保護的鄉村地區\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Medieval buildings\",\"zh\":\"中世紀建築\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"National parks are areas of protected countryside where people can visit and enjoy outdoor recreation while preserving the natural environment.\",\"zh\":\"國家公園 （National parks） 是受保護的鄉村地區，人們可以在那裡進行戶外娛樂活動，同時保護自然環境。\"}},{\"id\":\"12-7\",\"question\":{\"en\":\"What religion did Elizabeth I follow?\",\"zh\":\"伊莉莎白一世信奉什麼宗教？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"She was a Protestant\",\"zh\":\"她是新教徒\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"She was a Catholic\",\"zh\":\"她是天主教徒\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Elizabeth I was a Protestant and re-established the Church of England as the official state church after the Catholic reign of her sister Mary I.\",\"zh\":\"伊莉莎白一世是新教徒，在她姊姊瑪麗一世的天主教統治之後，她重新確立了英格蘭教會（聖公會）為官方國教。\"}},{\"id\":\"12-8\",\"question\":{\"en\":\"What kind of genre was the film Wallace and Gromit created by Nick Park?\",\"zh\":\"尼克·帕克（Nick Park）創作的電影《酷狗寶貝》（Wallace and Gromit）屬於什麼類型？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"A soap opera\",\"zh\":\"肥皂劇\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"A silent movie\",\"zh\":\"無聲電影\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"An animated film\",\"zh\":\"動畫片\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"An action film\",\"zh\":\"動作片\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Wallace and Gromit is a well-known animated film series created by Nick Park.\",\"zh\":\"《酷狗寶貝》是一部由尼克·帕克創作的知名停格動畫電影。\"}},{\"id\":\"12-9\",\"question\":{\"en\":\"Complaints against the police can only be made by writing to the Police Complaints Commissioner.\",\"zh\":\"對警方的投訴只能透過寫信給警察投訴專員來提出。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Complaints against the police can be made at any police station, or in writing to the Chief Constable of the police force concerned, or to an independent body (such as the Independent Office for Police Conduct in England and Wales).\",\"zh\":\"對警方的投訴可以在任何警署提出，也可以寫信給相關警隊的總警司，或者向獨立機構 （例如英格蘭和威爾斯的警察行為獨立辦公室） 投訴。\"}},{\"id\":\"12-10\",\"question\":{\"en\":\"Is the statement below TRUE or FALSE? Adult citizens of other EU states may vote in General Elections.\",\"zh\":\"以下說法是正確還是錯誤？其他歐盟成員國的成年公民可以在大選中投票。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Citizens of other EU states cannot vote in General Elections in the UK, unless they are citizens of Commonwealth countries or Ireland.\",\"zh\":\"其他歐盟成員國的公民不能在英國大選中投票，除非他們是英聯邦國家或愛爾蘭的公民。\"}},{\"id\":\"12-11\",\"question\":{\"en\":\"Cardiff is the capital city of which country?\",\"zh\":\"卡地夫 (Cardiff) 是哪個國家的首都？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Scotland\",\"zh\":\"蘇格蘭\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Northern Ireland\",\"zh\":\"北愛爾蘭\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Ireland\",\"zh\":\"愛爾蘭\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Wales\",\"zh\":\"威爾斯\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Cardiff is the capital city of Wales.\",\"zh\":\"卡地夫是威爾斯的首都。\"}},{\"id\":\"12-12\",\"question\":{\"en\":\"Which of the following is a rugby competition?\",\"zh\":\"下列哪一項是橄欖球比賽？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Scottish Grand National\",\"zh\":\"蘇格蘭國家障礙大賽\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The Wimbledon Championships\",\"zh\":\"溫布頓網球錦標賽\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Ashes\",\"zh\":\"灰燼盃\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The Six Nations Championship\",\"zh\":\"六國錦標賽\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The Six Nations Championship is a rugby union competition between England, France, Ireland, Italy, Scotland and Wales.\",\"zh\":\"六國錦標賽是一項由英格蘭、法國、愛爾蘭、義大利、蘇格蘭和威爾斯參加的橄欖球聯合會比賽。\"}},{\"id\":\"12-13\",\"question\":{\"en\":\"Which two houses fought in the War of the Roses?\",\"zh\":\"哪兩個家族在玫瑰戰爭中交戰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The House of Chester\",\"zh\":\"切斯特家族\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The House of York\",\"zh\":\"約克家族\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"The House of Lancaster\",\"zh\":\"蘭卡斯特家族\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"The House of Newcastle\",\"zh\":\"新堡家族\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Wars of the Roses (1455-1485) were fought between the House of Lancaster (red rose) and the House of York (white rose).\",\"zh\":\"玫瑰戰爭（1455-1485年）是在蘭卡斯特家族（紅玫瑰）和約克家族（白玫瑰）之間進行的。\"}},{\"id\":\"12-14\",\"question\":{\"en\":\"Who became Prime Minister and was an inspirational leader to the British people during WWII?\",\"zh\":\"在第二次世界大戰期間，誰成為首相並成為英國人民的鼓舞人心的領袖？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Winston Churchill\",\"zh\":\"溫斯頓·邱吉爾\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Clement Attlee\",\"zh\":\"克萊門特·艾德禮\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Margaret Thatcher\",\"zh\":\"瑪格麗特·柴契爾\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Sir Robert Walpole\",\"zh\":\"羅伯特·沃波爾爵士\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Winston Churchill became Prime Minister in 1940 and led Britain through the Second World War with his inspiring speeches and leadership.\",\"zh\":\"溫斯頓·邱吉爾（Winston Churchill）於1940年成為首相，並以其鼓舞人心的演講和領導力帶領英國度過第二次世界大戰。\"}},{\"id\":\"12-15\",\"question\":{\"en\":\"When is Christmas Day?\",\"zh\":\"聖誕節是哪一天？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"24th of December\",\"zh\":\"12 月 24 日\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"25th of December\",\"zh\":\"12 月 25 日\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"26th of December\",\"zh\":\"12 月 26 日\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"27th of December\",\"zh\":\"12 月 27 日\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Christmas Day is celebrated on the 25th of December to commemorate the birth of Jesus Christ.\",\"zh\":\"聖誕節在每年的 12 月 25 日慶祝，以紀念耶穌基督的誕生。\"}},{\"id\":\"12-16\",\"question\":{\"en\":\"You have to be at least 21 years old to serve on a jury.\",\"zh\":\"您必須年滿 21 歲才能擔任陪審員。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"To serve on a jury in the UK, you must be aged between 18 and 70 (in England, Wales, and Northern Ireland) or up to 75 (in Scotland).\",\"zh\":\"在英國擔任陪審員，您必須年滿 18 歲至 70 歲之間 (英格蘭、威爾斯和北愛爾蘭) 或 75 歲以下 (蘇格蘭)。\"}},{\"id\":\"12-17\",\"question\":{\"en\":\"Which of the following plays was written by William Shakespeare?\",\"zh\":\"以下哪部劇作是由威廉·莎士比亞撰寫的？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Pride and Prejudice\",\"zh\":\"傲慢與偏見\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"A Midsummer Night's dream\",\"zh\":\"仲夏夜之夢\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Sense and Sensibility\",\"zh\":\"理性與感性\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Great Expectations\",\"zh\":\"遠大前程\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"William Shakespeare wrote 'A Midsummer Night's Dream'. The other options ('Pride and Prejudice' and 'Sense and Sensibility' were written by Jane Austen; 'Great Expectations' was written by Charles Dickens).\",\"zh\":\"威廉·莎士比亞撰寫了《仲夏夜之夢》。其他選項中，《傲慢與偏見》和《理性與感性》是由珍·奧斯汀撰寫；《遠大前程》是由查爾斯·狄更斯撰寫。\"}},{\"id\":\"12-18\",\"question\":{\"en\":\"Where is Snowdonia located?\",\"zh\":\"斯諾登尼亞 (Snowdonia) 位於哪裡？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Scotland\",\"zh\":\"蘇格蘭\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Wales\",\"zh\":\"威爾斯\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"England\",\"zh\":\"英格蘭\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Northern Ireland\",\"zh\":\"北愛爾蘭\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Snowdonia is a mountainous national park located in Wales.\",\"zh\":\"斯諾登尼亞是位於威爾斯的一個國家公園。\"}},{\"id\":\"12-19\",\"question\":{\"en\":\"When was the last successful foreign invasion of England?\",\"zh\":\"英格蘭最後一次成功的外來入侵發生在哪一年？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"1415\",\"zh\":\"1415\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"1314\",\"zh\":\"1314\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"1066\",\"zh\":\"1066\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"1200\",\"zh\":\"1200\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Norman Conquest in 1066, led by William the Conqueror, Duke of Normandy, was the last successful foreign invasion of England.\",\"zh\":\"1066年由諾曼第公爵征服者威廉領導的諾曼征服，是英格蘭歷史上最後一次成功的外來入侵。\"}},{\"id\":\"12-20\",\"question\":{\"en\":\"Is the statement below TRUE or FALSE? The UK is a parliamentary democracy.\",\"zh\":\"以下說法是正確還是錯誤？英國是一個議會民主制國家。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The UK is a parliamentary democracy, with Parliament as the supreme legislative authority.\",\"zh\":\"英國是議會民主制國家，議會是最高立法機關。\"}},{\"id\":\"12-21\",\"question\":{\"en\":\"When was the Domesday Book written?\",\"zh\":\"《末日審判書》（Domesday Book）是在什麼事件之後撰寫的？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"After the Viking invasion\",\"zh\":\"維京人入侵之後\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"After the Norman conquest\",\"zh\":\"諾曼征服之後\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"After the last Roman invasion\",\"zh\":\"最後一次羅馬入侵之後\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"After the Anglo-Saxon invasion\",\"zh\":\"盎格魯-撒克遜人入侵之後\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Domesday Book was compiled in 1086 on the orders of King William the Conqueror, "zh\":\"為了控制宗教人士\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"To establish a unique religion in England\",\"zh\":\"為了在英格蘭建立一個獨特的宗教\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"To divorce his first wife, Catherine of Aragon\",\"zh\":\"為了與他的第一任妻子阿拉貢的凱瑟琳離婚\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Henry VIII established the Church of England so he could divorce his first wife, Catherine of Aragon, which the Pope had refused to allow.\",\"zh\":\"為了與他的第一任妻子阿拉貢的凱瑟琳離婚。教宗拒絕批准離婚，因此亨利八世脫離羅馬天主教會，建立了英格蘭教會。\"}}]}}]}]\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"12:I[27201,[\"/LifeInUK/_next/static/chunks/2giwr0i316ej9.js\",\"/LifeInUK/_next/static/chunks/14mrh2-p_w84d.js\"],\"IconMark\"]\n9:null\ne:[[\"$\",\"title\",\"0\",{\"children\":\"Life in the UK Mock Test\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Bilingual Life in the UK Mock Test App\"}],[\"$\",\"link\",\"2\",{\"rel\":\"manifest\",\"href\":\"/LifeInUK/manifest.webmanifest\",\"crossOrigin\":\"$undefined\"}],[\"$\",\"meta\",\"3\",{\"name\":\"mobile-web-app-capable\",\"content\":\"yes\"}],[\"$\",\"meta\",\"4\",{\"name\":\"apple-mobile-web-app-title\",\"content\":\"LifeInUK\"}],[\"$\",\"meta\",\"5\",{\"name\":\"apple-mobile-web-app-status-bar-style\",\"content\":\"default\"}],[\"$\",\"link\",\"6\",{\"rel\":\"apple-touch-icon\",\"href\":\"/LifeInUK/icons/apple-touch-icon.png\"}],[\"$\",\"$L12\",\"7\",{}]]\n"])</script></body></html>
