/chunks/2giwr0i316ej9.js\",\"/LifeInUK/_next/static/chunks/14mrh2-p_w84d.js\",\"/LifeInUK/_next/static/chunks/1mgn7-b_f-rf5.js\"],\"default\"]\n"])</script><script>self.__next_f.push([1,"6:[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-6 w-full flex-1 flex flex-col\",\"children\":[\"$\",\"$L11\",null,{\"mockTest\":{\"setId\":13,\"title\":{\"en\":\"Mock Exam Set 13\",\"zh\":\"模擬考試 第13套\"},\"questions\":[{\"id\":\"13-1\",\"question\":{\"en\":\"The Northern Ireland Assembly cannot make decisions on which two of the following issues?\",\"zh\":\"北愛爾蘭議會（Northern Ireland Assembly）不能對以下哪兩項事務做出決定？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Immigration\",\"zh\":\"移民\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Education\",\"zh\":\"教育\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Agriculture\",\"zh\":\"農業\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Defence\",\"zh\":\"國防\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Certain matters such as immigration, defence, and foreign policy are reserved powers controlled by the UK Parliament, not devolved assemblies.\",\"zh\":\"移民、國防和外交政策等某些事務屬於保留權力，由英國國會控制，而不屬於地方分權議會的權責範圍。\"}},{\"id\":\"13-2\",\"question\":{\"en\":\"Between 1680 and 1720 many refugees called Huguenots came to England, which country did they come from?\",\"zh\":\"在 1680 年至 1720 年間，許多被稱為雨格諾派 (Huguenots) 的難民來到英格蘭，他們來自哪個國家？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Pakistan\",\"zh\":\"巴基斯坦\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Germany\",\"zh\":\"德國\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"India\",\"zh\":\"印度\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"France\",\"zh\":\"法國\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The Huguenots were French Protestants who fled persecution in France between 1680 and 1720, with many settling in England.\",\"zh\":\"雨格諾派是法國的新教徒，他們在 1680 年至 1720 年間逃離法國的迫害，許多人選擇定居於英格蘭。\"}},{\"id\":\"13-3\",\"question\":{\"en\":\"Lewis Hamilton is a leading figure in which sport?\",\"zh\":\"劉易斯·咸美頓（Lewis Hamilton）是哪項運動的代表人物？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Squash\",\"zh\":\"壁球\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Tennis\",\"zh\":\"網球\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Motor racing\",\"zh\":\"賽車\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Horse racing\",\"zh\":\"賽馬\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Lewis Hamilton is a British racing driver who has won multiple Formula One World Championship titles.\",\"zh\":\"劉易斯·咸美頓（Lewis Hamilton）是英國賽車手，曾多次獲得一級方程式賽車（F1）世界冠軍頭銜。\"}},{\"id\":\"13-4\",\"question\":{\"en\":\"Which was the last successful foreign invasion of England that took place in 1066?\",\"zh\":\"1066年發生的最後一次成功入侵英格蘭的外國戰役是哪一場？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Viking invasion\",\"zh\":\"維京人入侵\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The Anglo-Saxon Conquest\",\"zh\":\"盎格魯-撒克遜人征服\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Roman invasion\",\"zh\":\"羅馬人入侵\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The Norman Conquest\",\"zh\":\"諾曼第征服\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The Norman Conquest of 1066, led by William the Conqueror, was the last successful foreign invasion of England.\",\"zh\":\"1066年由征服者威廉領導的諾曼第征服，是最後一次成功入侵英格蘭的戰役。\"}},{\"id\":\"13-5\",\"question\":{\"en\":\"George Frederick Handel, the German-born composer who became a British citizen, wrote which of the following?\",\"zh\":\"出生於德國並成為英國公民的作曲家喬治·弗里德里希·韓德爾創作了以下哪部作品？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Peter Grimes\",\"zh\":\"彼得·格賴姆斯\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The Planets\",\"zh\":\"行星組曲\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Music for the Royal Fireworks\",\"zh\":\"皇家煙火音樂\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Balthazar's Feast\",\"zh\":\"巴爾薩澤的宴會\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"German-born composer George Frideric Handel became a British citizen and wrote 'Music for the Royal Fireworks' and 'Water Music' for the royal family.\",\"zh\":\"出生於德國的作曲家喬治·弗里德里希·韓德爾成為英國公民，並為王室創作了《皇家煙火音樂》和《水上音樂》。\"}},{\"id\":\"13-6\",\"question\":{\"en\":\"When did Julius Caesar lead the Roman invasion of Britain?\",\"zh\":\"尤利烏斯·凱撒何時率領羅馬人入侵不列顛？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"65 BC\",\"zh\":\"公元前65年\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"AD 55\",\"zh\":\"公元55年\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"AD 75\",\"zh\":\"公元75年\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"55 BC\",\"zh\":\"公元前55年\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Julius Caesar led Roman expeditions to Britain in 55 BC and 54 BC. The actual Roman conquest of Britain began later, in AD 43, under Emperor Claudius.\",\"zh\":\"尤利烏斯·凱撒於公元前55年和公元前54年率領羅馬軍隊遠征不列顛。羅馬對不列顛的實際征服則始於後來的公元43年，由皇帝克勞狄斯率領。\"}},{\"id\":\"13-7\",\"question\":{\"en\":\"Which of the following is not a valid UK coin?\",\"zh\":\"以下哪一項不是有效的英國硬幣？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"1p\",\"zh\":\"1p\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"5p\",\"zh\":\"5p\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"25p\",\"zh\":\"25p\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"£1\",\"zh\":\"£1\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The standard UK coins in circulation are 1p, 2p, 5p, 10p, 20p, 50p, £1, and £2. There is no 25p coin.\",\"zh\":\"英國流通的標準硬幣有 1p、2p、5p、10p、20p、50p、£1 和 £2。沒有 25p 硬幣。\"}},{\"id\":\"13-8\",\"question\":{\"en\":\"Where is the Eden Project located?\",\"zh\":\"伊甸園計劃 （Eden Project） 位於哪裡？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Dorset\",\"zh\":\"多塞特\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Cornwall\",\"zh\":\"康瓦爾\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Devon\",\"zh\":\"德文\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Somerset\",\"zh\":\"索美塞特\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Eden Project is located in Cornwall, in the south-west of England.\",\"zh\":\"伊甸園計劃 （Eden Project） 位於英格蘭西南部的康瓦爾 （Cornwall） 。\"}},{\"id\":\"13-9\",\"question\":{\"en\":\"Who was the father of Queen Elizabeth I?\",\"zh\":\"伊莉莎白一世女王 （Queen Elizabeth I） 的父親是誰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Edward I\",\"zh\":\"愛德華一世\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Henry V\",\"zh\":\"亨利五世\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Henry VII\",\"zh\":\"亨利七世\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Henry VIII\",\"zh\":\"亨利八世\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Queen Elizabeth I was the daughter of King Henry VIII and his second wife, Anne Boleyn.\",\"zh\":\"伊莉莎白一世女王 （Queen Elizabeth I） 是亨利八世國王 （King Henry VIII） 與其第二任妻子安妮 · 博林 （Anne Boleyn） 的女兒。\"}},{\"id\":\"13-10\",\"question\":{\"en\":\"In which battle did Admiral Nelson die?\",\"zh\":\"納爾遜海軍上將是在哪場戰役中犧牲的？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Battle of Hastings\",\"zh\":\"哈斯丁戰役\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The Battle of Waterloo\",\"zh\":\"滑鐵盧戰役\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Battle of Trafalgar\",\"zh\":\"特拉法加海戰\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"The Battle of Bannockburn\",\"zh\":\"班諾克本戰役\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Admiral Nelson died at the Battle of Trafalgar in 1805, where the Royal Navy defeated the combined French and Spanish fleets.\",\"zh\":\"納爾遜海軍上將 （Admiral Nelson） 於 1805 年的特拉法加海戰 （Battle of Trafalgar） 中犧牲，在該戰役中皇家海軍擊敗了法國和西班牙的聯合艦隊。\"}},{\"id\":\"13-11\",\"question\":{\"en\":\"Who was the first female Prime Minister of the UK?\",\"zh\":\"誰是英國第一位女首相？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Mary Stuart\",\"zh\":\"瑪麗·斯圖亞特\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Theresa May\",\"zh\":\"德蕾莎·梅伊\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Margaret Thatcher\",\"zh\":\"瑪格麗特·柴契爾\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Florence Nightingale\",\"zh\":\"佛羅倫斯·南丁格爾\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Margaret Thatcher became the UK's first female Prime Minister in 1979 and served until 1990.\",\"zh\":\"瑪格麗特·柴契爾（Margaret Thatcher）於1979年成為英國首位女首相，並任職至1990年。\"}},{\"id\":\"13-12\",\"question\":{\"en\":\"Which two of the following are key roles of school governors?\",\"zh\":\"以下哪兩項是學校校董 (school governors) 的主要職責？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Monitoring student's behaviour\",\"zh\":\"監控學生的行為\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Monitoring and evaluating school performance\",\"zh\":\"監控並評估學校的表現\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Setting the strategic direction of the school\",\"zh\":\"設定學校的戰略方向\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Giving awards to the best students of the school\",\"zh\":\"頒發獎項給學校最優秀的學生\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"School governors are responsible for setting the strategic direction of the school and monitoring its performance.\",\"zh\":\"校董會負責指導學校的長期發展及監督其表現。\"}},{\"id\":\"13-13\",\"question\":{\"en\":\"What is the name of the famous horse race held near Liverpool?\",\"zh\":\"在利物浦附近舉行的著名賽馬比賽名稱是什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Grand National\",\"zh\":\"國家大賽\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Steeplechase\",\"zh\":\"障礙賽\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Grand Chase\",\"zh\":\"大追逐\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Grand Derby\",\"zh\":\"大德比\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Grand National is a world-famous National Hunt horse race held annually at Aintree Racecourse near Liverpool.\",\"zh\":\"國家大賽（Grand National）是每年在利物浦附近的安特里馬場（Aintree Racecourse）舉行的世界著名越野障礙賽馬活動。\"}},{\"id\":\"13-14\",\"question\":{\"en\":\"Several Church of England bishops sit in the House of Lords.\",\"zh\":\"幾位英國國教會的主教在下議院/上議院中擁有席位。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"This statement is true. The Archbishops of Canterbury and York, the Bishops of London, Durham, and Winchester, and 21 other senior diocesan bishops sit in the House of Lords as 'Lords Spiritual'.\",\"zh\":\"此陳述是正確的。坎特伯里和大主教、約克大主教、倫敦、達勒姆和溫切斯特主教，以及其他21位資深教區主教，作為「神職議員」（Lords Spiritual）在上議院中擁有席位。\"}},{\"id\":\"13-15\",\"question\":{\"en\":\"What sort of church is the Church of Scotland?\",\"zh\":\"蘇格蘭教會 （Church of Scotland） 是什麼類型的教會？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Catholic\",\"zh\":\"天主教\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Baptist\",\"zh\":\"浸信會\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Presbyterian\",\"zh\":\"長老會\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Methodist\",\"zh\":\"循道會\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Church of Scotland is a Presbyterian church and has no established status or head.\",\"zh\":\"蘇格蘭教會 （Church of Scotland） 是長老會 （Presbyterian） 教會，沒有國定地位或元首。\"}},{\"id\":\"13-16\",\"question\":{\"en\":\"Around which structure in London is the Remembrance Day service usually held?\",\"zh\":\"倫敦的國殤紀念日（Remembrance Day）儀式通常圍繞哪座建築物舉行？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The London Eye\",\"zh\":\"倫敦眼\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Nelson's Column in Trafalgar Square\",\"zh\":\"特拉法加廣場的納爾遜紀念柱\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Cenotaph in Whitehall\",\"zh\":\"白廳的和平紀念碑\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"The statue of Eros in Piccadilly Circus\",\"zh\":\"皮卡迪利圓環的愛神雕像\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The National Service of Remembrance is held at the Cenotaph in Whitehall, London, on Remembrance Sunday (the Sunday closest to 11th November).\",\"zh\":\"國家紀念儀式於紀念星期日（最接近11月11日的星期日）在倫敦白廳的和平紀念碑（Cenotaph）舉行。\"}},{\"id\":\"13-17\",\"question\":{\"en\":\"What is the Union Jack?\",\"zh\":\"什麼是米字旗 (Union Jack)？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Flag of the Commonwealth\",\"zh\":\"大英國協旗幟 (The Flag of the Commonwealth)\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The Flag of the United Kingdom\",\"zh\":\"聯合王國國旗 (The Flag of the United Kingdom)\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"The shield used by British Knights\",\"zh\":\"英國騎士所使用的盾牌\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"A trade union to protect workers rights\",\"zh\":\"保護工人權利的工會\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Union Jack (or Union Flag) is the national flag of the United Kingdom, combining the crosses of England, Scotland, and Ireland.\",\"zh\":\"米字旗 (Union Jack，或稱聯合傑克) 是聯合王國的國旗，它融合了英格蘭、蘇格蘭和愛爾蘭的十字旗。\"}},{\"id\":\"13-18\",\"question\":{\"en\":\"Where did the Spanish Armada come from?\",\"zh\":\"西班牙無敵艦隊（Spanish Armada）來自哪裡？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"France\",\"zh\":\"法國（France）\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Spain\",\"zh\":\"西班牙（Spain）\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Italy\",\"zh\":\"義大利（Italy）\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"South America\",\"zh\":\"南美洲（South America）\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Spanish Armada was a fleet of ships sent by King Philip II of Spain in 1588 to invade England.\",\"zh\":\"西班牙無敵艦隊（Spanish Armada）是西班牙國王腓力二世於 1588 年派遣企圖入侵英格蘭的船隊。\"}},{\"id\":\"13-19\",\"question\":{\"en\":\"Where is the Tate Art Gallery located?\",\"zh\":\"泰特美術館（Tate Art Gallery）位於哪裡？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Glasgow\",\"zh\":\"格拉斯哥（Glasgow）\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Cardiff\",\"zh\":\"卡地夫（Cardiff）\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"London\",\"zh\":\"倫敦（London）\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Belfast\",\"zh\":\"貝爾法斯特（Belfast）\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Tate Britain and Tate Modern art galleries are located in London. There are also Tate galleries in Liverpool and St Ives.\",\"zh\":\"泰特不列顛館（Tate Britain）和泰特現代藝術館（Tate Modern）均位於倫敦。在利物浦和聖艾夫斯也有泰特美術館。\"}},{\"id\":\"13-20\",\"question\":{\"en\":\"Proceedings in Parliament are broadcast on television and published in official reports known as:\",\"zh\":\"國會程序會在電視上播出，並發布在名為什麼的官方報告中？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Canvassing\",\"zh\":\"拉票\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Hansard\",\"zh\":\"議事錄 (Hansard)\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Cabinets\",\"zh\":\"內閣\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Domesday Book\",\"zh\":\"末日審判書\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Official reports of proceedings in Parliament are called Hansard.\",\"zh\":\"國會程序的官方報告稱為議事錄（Hansard）。\"}},{\"id\":\"13-21\",\"question\":{\"en\":\"Which court deals with minor criminal cases in England, Wales and Northern Ireland?\",\"zh\":\"在英格蘭、威爾斯和北愛爾蘭，哪個法院處理輕微的刑事案件？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"High Court\",\"zh\":\"高等法院\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Justice of the Peace Court\",\"zh\":\"治安推事法庭\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Magistrates' Court\",\"zh\":\"裁判司署\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Crown Court\",\"zh\":\"刑事法庭\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Minor criminal cases in England, Wales and Northern Ireland are dealt with in a Magistrates' Court.\",\"zh\":\"在英格蘭、威爾斯和北愛爾蘭，輕微刑事案件由裁判司署（Magistrates' Court）處理。\"}},{\"id\":\"13-22\",\"question\":{\"en\":\"What is the period of the 1960s known for?\",\"zh\":\"1960 年代這段時期以什麼而聞名？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"A downgrade in manufacturing\",\"zh\":\"製造業的衰退\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"A growth in British fashion and pop music\",\"zh\":\"英國時尚和流行音樂的成長\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"A shortage of water\",\"zh\":\"水資源短缺\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"A blockage of social laws\",\"zh\":\"社會法律的阻礙\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The 1960s was a period of significant social change and is famous for the growth of British fashion and pop music, including bands like The Beatles and The Rolling Stones.\",\"zh\":\"1960 年代是一個發生重大社會變革的時期，以英國時尚和流行音樂（包括披頭四樂團和滾石樂團等樂隊）的蓬勃發展而聞名。\"}},{\"id\":\"13-23\",\"question\":{\"en\":\"What is known as the 'Dunkirk spirit'?\",\"zh\":\"什麼被稱為「敦克爾克精神」 (Dunkirk spirit)？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"When the German air force bombed London and other British cities at night-time\",\"zh\":\"德國空軍在夜間轟炸倫敦和其他英國城市的時候\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The evacuation of Allied soldiers from France during World War II\",\"zh\":\"第二次世界大戰期間盟軍士兵從法國撤退的行動\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"When new social classes appeared after the Black Death\",\"zh\":\"黑死病之後出現新社會階層的時期\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The period when many refugees called Huguenots came from France\",\"zh\":\"許多被稱為雨格諾派的難民從法國來到英格蘭的時期\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The 'Dunkirk spirit' refers to the determination and solidarity shown by the British public during the evacuation of Allied soldiers from the beaches of Dunkirk in 1940.\",\"zh\":\"「敦克爾克精神」是指 1940 年在敦克爾克海灘撤離盟軍士兵期間，英國公眾所展現出的決心與團結精神。\"}},{\"id\":\"13-24\",\"question\":{\"en\":\"When walking your dog in a public place, you must ensure:\",\"zh\":\"在公共場所遛狗時，您必須確保：\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"That your dog does not play with other dogs\",\"zh\":\"您的狗不與其他狗玩耍\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"That your dog wears a collar showing the name and address of the owner\",\"zh\":\"您的狗佩戴標有主人姓名和地址的項圈\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"That your dog wears a high visibility jacket\",\"zh\":\"您的狗穿著高能見度外套\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"That your dog does not bark\",\"zh\":\"您的狗不吠叫\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"By law, dogs in public places must wear a collar showing the name and address of the owner.\",\"zh\":\"法律規定，在公共場所的狗必須佩戴項圈，上面標明主人的姓名和地址。\"}}]}}]}]\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"12:I[27201,[\"/LifeInUK/_next/static/chunks/2giwr0i316ej9.js\",\"/LifeInUK/_next/static/chunks/14mrh2-p_w84d.js\"],\"IconMark\"]\n9:null\ne:[[\"$\",\"title\",\"0\",{\"children\":\"Life in the UK Mock Test\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Bilingual Life in the UK Mock Test App\"}],[\"$\",\"link\",\"2\",{\"rel\":\"manifest\",\"href\":\"/manifest.json\",\"crossOrigin\":\"$undefined\"}],[\"$\",\"meta\",\"3\",{\"name\":\"mobile-web-app-capable\",\"content\":\"yes\"}],[\"$\",\"meta\",\"4\",{\"name\":\"apple-mobile-web-app-title\",\"content\":\"LifeInUK\"}],[\"$\",\"meta\",\"5\",{\"name\":\"apple-mobile-web-app-status-bar-style\",\"content\":\"default\"}],[\"$\",\"link\",\"6\",{\"rel\":\"apple-touch-icon\",\"href\":\"/icons/apple-touch-icon.png\"}],[\"$\",\"$L12\",\"7\",{}]]\n"])</script></body></html>
