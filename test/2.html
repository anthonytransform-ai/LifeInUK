ault\"]\n"])</script><script>self.__next_f.push([1,"6:[\"$\",\"div\",null,{\"className\":\"max-w-3xl mx-auto px-4 py-6 w-full flex-1 flex flex-col\",\"children\":[\"$\",\"$L11\",null,{\"mockTest\":{\"setId\":2,\"title\":{\"en\":\"Mock Exam Set 2\",\"zh\":\"模擬考試 第2套\"},\"questions\":[{\"id\":\"2-1\",\"question\":{\"en\":\"How is New Year's Eve called in Scotland?\",\"zh\":\"蘇格蘭的新年前夕（除夕）稱為什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Vaisakhi\",\"zh\":\"光明節 (Vaisakhi)\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Hannukah\",\"zh\":\"光明節 (Hannukah)\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Diwali\",\"zh\":\"排燈節 (Diwali)\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Hogmanay\",\"zh\":\"霍格曼內 (Hogmanay)\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"In Scotland, New Year's Eve is called Hogmanay.\",\"zh\":\"在蘇格蘭，新年前夕被稱為 Hogmanay。\"}},{\"id\":\"2-2\",\"question\":{\"en\":\"What was the religion of the Puritans?\",\"zh\":\"清教徒的宗教信仰是什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Hindu\",\"zh\":\"印度教\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Catholic\",\"zh\":\"天主教\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Sikh\",\"zh\":\"錫克教\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Protestant\",\"zh\":\"新教 (Protestant)\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The Puritans were Protestants who advocated strict religious discipline.\",\"zh\":\"清教徒是倡導嚴格宗教紀律的新教徒。\"}},{\"id\":\"2-3\",\"question\":{\"en\":\"How did the Government promote policies of free trade during the Victorian Age?\",\"zh\":\"在維多利亞時代，政府如何推動自由貿易政策？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Abolishing a number of taxes on imported goods\",\"zh\":\"廢除一系列進口商品稅\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Abolishing the exportation of local produce\",\"zh\":\"廢除本地農產品的出口\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Preventing the importation of cheap raw materials\",\"zh\":\"阻止廉價原材料的進口\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Preventing the importation of cheap grain\",\"zh\":\"阻止廉價穀物的進口\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"During the Victorian Age, the government promoted free trade by abolishing taxes on many imported goods, most notably the Corn Laws.\",\"zh\":\"在維多利亞時代，政府透過廢除許多進口商品（最著名的是穀物法）的稅收來推動自由貿易。\"}},{\"id\":\"2-4\",\"question\":{\"en\":\"Who is the patron Saint of England?\",\"zh\":\"誰是英格蘭的主保聖人 (patron Saint)？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"St George\",\"zh\":\"聖喬治 (St George)\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"St Patrick\",\"zh\":\"聖派翠克\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"St David\",\"zh\":\"聖大衛\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"St Andrew\",\"zh\":\"聖安德烈\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"St George is the patron saint of England, celebrated on April 23rd.\",\"zh\":\"聖喬治是英格蘭的主保聖人，他的紀念日是4月23日。\"}},{\"id\":\"2-5\",\"question\":{\"en\":\"Police complaints can only be made by writing to the Chief Constable of the police force involved.\",\"zh\":\"對警察的投訴只能通過寫信給相關警隊的警務處長來提出。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Police complaints can be made in several ways, including writing, visiting a police station, or contacting an independent watchdog, not just writing to the Chief Constable.\",\"zh\":\"對警察的投訴可以通過多種方式提出，包括寫信、親自前往警署或聯繫獨立監管機構，而不僅僅是寫信給警務處長。\"}},{\"id\":\"2-6\",\"question\":{\"en\":\"In the UK, you have to be 21 years old to be able to vote in a general election.\",\"zh\":\"在英國，您必須年滿 21 歲才能在大選中投票。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The voting age in the UK for general elections is 18.\",\"zh\":\"英國大選的法定投票年齡為 18 歲。\"}},{\"id\":\"2-7\",\"question\":{\"en\":\"What was the name of the activist group who fought for the women's right to vote?\",\"zh\":\"爭取女性投票權的激進活動團體名稱是什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Chartists\",\"zh\":\"憲章運動者\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Beefeaters\",\"zh\":\"御用侍從衛士\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Suffragettes\",\"zh\":\"婦女參政論者\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Quakers\",\"zh\":\"貴格會教徒\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Suffragettes, led by figures like Emmeline Pankhurst, used militant tactics to campaign for women's suffrage in the early 20th century.\",\"zh\":\"由艾米琳·潘克斯特等人領導的婦女參政論者（Suffragettes），在20世紀初使用激進戰術來爭取女性的投票權。\"}},{\"id\":\"2-8\",\"question\":{\"en\":\"Where did the Boer War take place?\",\"zh\":\"波耳戰爭（Boer War）發生在哪裡？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Turkey\",\"zh\":\"土耳其\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"England\",\"zh\":\"英格蘭\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"France\",\"zh\":\"法國\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"South Africa\",\"zh\":\"南非\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The Boer Wars (1880–1881 and 1899–1902) were fought in South Africa between the British Empire and the two Boer republics.\",\"zh\":\"波耳戰爭（1880-1881年和1899-1902年）是在南非由大英帝國與兩個波耳共和國之間進行的戰爭。\"}},{\"id\":\"2-9\",\"question\":{\"en\":\"What English King introduced the Domesday Book?\",\"zh\":\"哪位英國國王引入了《末日審判書》(Domesday Book)？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"King Henry V\",\"zh\":\"亨利五世\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"King Henry IV\",\"zh\":\"亨利四世\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"William the Conqueror\",\"zh\":\"征服者威廉 (William the Conqueror)\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Harold, the Saxon king of England\",\"zh\":\"哈羅德，英格蘭的撒克遜國王\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"William the Conqueror commissioned the Domesday Book in 1086 to record the land and property in England.\",\"zh\":\"征服者威廉在1086年下令編纂《末日審判書》，以記錄英格蘭的土地和財產。\"}},{\"id\":\"2-10\",\"question\":{\"en\":\"What UK landmark was voted as Britain's favourite view in 2007?\",\"zh\":\"哪個英國地標在2007年被選為英國人最喜愛的景觀？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Big Ben\",\"zh\":\"大笨鐘\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Lake District\",\"zh\":\"湖區\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Snowdonia\",\"zh\":\"斯諾登尼亞\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The London Eye\",\"zh\":\"倫敦眼\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Wastwater, a lake in the Lake District National Park, was voted Britain's favourite view in a television poll in 2007.\",\"zh\":\"位於湖區國家公園的瓦斯特湖（Wastwater）在2007年的一項電視民調中被選為英國人最喜愛的景觀。\"}},{\"id\":\"2-11\",\"question\":{\"en\":\"Towns, cities and rural areas in the UK are governed by government appointed officials.\",\"zh\":\"英國的城鎮、城市和農村地區是由政府任命的官員所治理的。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Towns, cities, and rural areas in the UK are governed by democratically elected local councils, not by government-appointed officials.\",\"zh\":\"英國的城鎮、城市和農村地區是由民主選舉產生的民選地方議會治理，而非由政府任命的官員管理。\"}},{\"id\":\"2-12\",\"question\":{\"en\":\"What is the most famous tennis tournament played in the UK?\",\"zh\":\"英國最著名的網球錦標賽是哪一個？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Queen's Club Championships\",\"zh\":\"女王俱樂部錦標賽 (The Queen's Club Championships)\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Wimbledon\",\"zh\":\"溫布頓網球錦標賽 (Wimbledon)\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Roland Garros\",\"zh\":\"羅蘭·加洛斯球場 (Roland Garros)\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The Aegon Championships\",\"zh\":\"艾根錦標賽 (The Aegon Championships)\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Wimbledon is the oldest and most prestigious tennis tournament in the world, and it is the only Grand Slam event played on grass.\",\"zh\":\"溫布頓網球錦標賽是世界上最古老且最享有盛譽的網球賽事，也是唯一在草地上進行的大滿貫賽事。\"}},{\"id\":\"2-13\",\"question\":{\"en\":\"Is the BBC controlled by the government?\",\"zh\":\"英國廣播公司（BBC）是由政府控制的嗎？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Yes\",\"zh\":\"是\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"No\",\"zh\":\"否\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The BBC is a public service broadcaster that is independent of government control and operates under a Royal Charter.\",\"zh\":\"英國廣播公司（BBC）是公共服務廣播機構，獨立於政府控制，並根據皇家特許狀（Royal Charter）運作。\"}},{\"id\":\"2-14\",\"question\":{\"en\":\"Which annual flower show in London exhibits garden designs from around the world?\",\"zh\":\"倫敦哪一個年度花展展示了來自世界各地的園藝設計？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Kensington\",\"zh\":\"肯辛頓\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"South Bank\",\"zh\":\"南岸\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Chelsea\",\"zh\":\"切爾西\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Covent Garden\",\"zh\":\"柯芬園\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Chelsea Flower Show is the world's most famous flower and landscape garden show, held annually in Chelsea, London.\",\"zh\":\"切爾西花展（Chelsea Flower Show）是世界上最著名的花卉及景觀園藝展，每年在倫敦切爾西舉行。\"}},{\"id\":\"2-15\",\"question\":{\"en\":\"Is the statement below TRUE or FALSE? By around AD 600, Anglo-Saxon kingdoms were established in Britain.\",\"zh\":\"以下說法是正確還是錯誤？大約到公元600年，盎格魯-撒克遜王國已在不列顛建立。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"By around AD 600, Anglo-Saxon kingdoms were established in Britain, mainly in what is now England.\",\"zh\":\"大約到公元600年，盎格魯-撒克遜王國已在不列顛建立，主要分佈在現今的英格蘭地區。\"}},{\"id\":\"2-16\",\"question\":{\"en\":\"What is the name of the War Memorial located in Whitehall?\",\"zh\":\"位於白廳（Whitehall）的戰爭紀念碑名稱是什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Dumfries\",\"zh\":\"達姆弗里斯（Dumfries）\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Cenotaph\",\"zh\":\"和平紀念碑（Cenotaph）\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Royal Crescent\",\"zh\":\"皇家新月（Royal Crescent）\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The White Tower\",\"zh\":\"白塔（The White Tower）\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Cenotaph, located in Whitehall, London, is the national war memorial where the annual Remembrance Day service is held.\",\"zh\":\"和平紀念碑（Cenotaph）位於倫敦白廳（Whitehall），是英國的國家戰爭紀念碑，每年在此舉行國殤星期日紀念儀式。\"}},{\"id\":\"2-17\",\"question\":{\"en\":\"In 1649, England was declared a republic. What was it called?\",\"zh\":\"1649年，英格蘭被宣布為共和國。它被稱作什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Cromwell's Republic\",\"zh\":\"克倫威爾共和國\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The People's Republic\",\"zh\":\"人民共和國\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Commonwealth\",\"zh\":\"聯邦\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Great Britain\",\"zh\":\"大不列顛\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Following the execution of King Charles I in 1649, England was declared a republic, known as the Commonwealth.\",\"zh\":\"1649年國王查理一世被處決後，英格蘭被宣布為共和國，稱為「聯邦」（the Commonwealth）。\"}},{\"id\":\"2-18\",\"question\":{\"en\":\"Which is the largest National Park in England?\",\"zh\":\"英格蘭最大的國家公園是哪一個？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Snowdonia\",\"zh\":\"斯諾多尼亞 (Snowdonia)\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Loch Lomond and the Trossachs National Park\",\"zh\":\"羅夢湖與朝塞斯山國家公園 (Loch Lomond and the Trossachs National Park)\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Giant's Causeway\",\"zh\":\"巨人堤道 (The Giant's Causeway)\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The Lake District\",\"zh\":\"湖區 (The Lake District)\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The Lake District is England's largest National Park, covering over 2,300 square kilometers and famous for its lakes and fells.\",\"zh\":\"湖區 (The Lake District) 是英格蘭最大的國家公園，面積超過 2,300 平方公里，以其湖泊和山峰而聞名。\"}},{\"id\":\"2-19\",\"question\":{\"en\":\"Against which country did Britain fight at the Battle of Waterloo?\",\"zh\":\"在滑鐵盧戰役 (Battle of Waterloo) 中，英國與哪個國家作戰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Germany\",\"zh\":\"德國\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Italy\",\"zh\":\"義大利\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"France\",\"zh\":\"法國\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Spain\",\"zh\":\"西班牙\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"In 1815, the Duke of Wellington defeated Napoleon Bonaparte of France at the Battle of Waterloo.\",\"zh\":\"1815 年，威靈頓公爵在滑鐵盧戰役中擊敗了法國的拿破崙·波拿巴。\"}},{\"id\":\"2-20\",\"question\":{\"en\":\"Who were the first people to live in Britain in what we call the Stone Age?\",\"zh\":\"在我們所說的石器時代，第一批居住在英國的人是誰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Farmers\",\"zh\":\"農民\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Peasants\",\"zh\":\"佃農/農奴\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Hunter-gatherers\",\"zh\":\"狩獵採集者\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Pirates\",\"zh\":\"海盜\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The earliest inhabitants of Britain during the Stone Age were hunter-gatherers, who depended on wild plants and animals for survival.\",\"zh\":\"在石器時代，英國最早的居民是依靠採集野生植物和狩獵動物為生的狩獵採集者。\"}},{\"id\":\"2-21\",\"question\":{\"en\":\"The Chancellor of the Exchequer is responsible for which area of government policy?\",\"zh\":\"財政大臣（Chancellor of the Exchequer）負責哪一個政府政策領域？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Health\",\"zh\":\"衛生\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Immigration\",\"zh\":\"移民\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Economy\",\"zh\":\"經濟\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Education\",\"zh\":\"教育\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Chancellor of the Exchequer is the government's chief finance minister, responsible for the economy and setting the budget.\",\"zh\":\"財政大臣（Chancellor of the Exchequer）是政府的首席財政部長，負責經濟和制定預算。\"}},{\"id\":\"2-22\",\"question\":{\"en\":\"What is New Year's Eve called in Scotland?\",\"zh\":\"在蘇格蘭，除夕夜（New Year's Eve）被稱為什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Hagmanay\",\"zh\":\"Hagmanay\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Hogmanay\",\"zh\":\"Hogmanay\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Hugmanay\",\"zh\":\"Hugmanay\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Hopmanay\",\"zh\":\"Hopmanay\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"In Scotland, New Year's Eve is called Hogmanay, which is celebrated with various traditions like 'first-footing'.\",\"zh\":\"在蘇格蘭，除夕夜被稱為「霍格曼內」（Hogmanay），人們會透過「第一隻腳」（first-footing）等各種傳統活動來慶祝。\"}},{\"id\":\"2-23\",\"question\":{\"en\":\"Anyone can make a complaint about the police by writing to the Chief Constable of the police force involved.\",\"zh\":\"任何人都可以通過寫信給相關警隊的警務處長（Chief Constable）來對警察提出投訴。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Complaints against the police can be made by writing to the Chief Constable of the police force, or through the Independent Office for Police Conduct.\",\"zh\":\"對警察的投訴可以通過寫信給該警隊的警務處長（Chief Constable），或通過警察行為獨立辦公室進行。\"}},{\"id\":\"2-24\",\"question\":{\"en\":\"As a British citizen, you should:\",\"zh\":\"作為英國公民，你應當：\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Respect and obey the law\",\"zh\":\"尊重並遵守法律\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"Vote in all elections\",\"zh\":\"在所有選舉中投票\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Take part in religious activities\",\"zh\":\"參與宗教活動\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Look after the area in which you live and the environment\",\"zh\":\"愛護您居住的地方和環境\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Responsibilities of UK citizens include respecting and obeying the law, and looking after the local area and environment.\",\"zh\":\"英國公民的責任包括尊重並遵守法律，以及愛護當地區域和環境。\"}}]}}]}]\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"12:I[27201,[\"/LifeInUK/_next/static/chunks/2giwr0i316ej9.js\",\"/LifeInUK/_next/static/chunks/14mrh2-p_w84d.js\"],\"IconMark\"]\n9:null\ne:[[\"$\",\"title\",\"0\",{\"children\":\"Life in the UK Mock Test\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Bilingual Life in the UK Mock Test App\"}],[\"$\",\"link\",\"2\",{\"rel\":\"manifest\",\"href\":\"/LifeInUK/manifest.webmanifest\",\"crossOrigin\":\"$undefined\"}],[\"$\",\"meta\",\"3\",{\"name\":\"mobile-web-app-capable\",\"content\":\"yes\"}],[\"$\",\"meta\",\"4\",{\"name\":\"apple-mobile-web-app-title\",\"content\":\"LifeInUK\"}],[\"$\",\"meta\",\"5\",{\"name\":\"apple-mobile-web-app-status-bar-style\",\"content\":\"default\"}],[\"$\",\"link\",\"6\",{\"rel\":\"apple-touch-icon\",\"href\":\"/LifeInUK/icons/apple-touch-icon.png\"}],[\"$\",\"$L12\",\"7\",{}]]\n"])</script></body></html>
