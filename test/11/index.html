"Sir Frank Whittle, a British Royal Air Force officer, invented the jet engine in the 1930s.\",\"zh\":\"英國皇家空軍軍官法蘭克·惠特爾爵士（Sir Frank Whittle）在1930年代發明了噴射引擎。\"}},{\"id\":\"11-2\",\"question\":{\"en\":\"Who built a wall in the north of England to keep out the Picts (ancestors of the Scottish people)?\",\"zh\":\"誰在英格蘭北部建造了城牆以抵禦皮克特人（蘇格蘭人的祖先）？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Boudicca\",\"zh\":\"波迪卡（Boudicca）\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Emperor Hadrian\",\"zh\":\"哈德良皇帝（Emperor Hadrian）\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Emperor Claudius\",\"zh\":\"克勞狄斯皇帝（Emperor Claudius）\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Julius Caesar\",\"zh\":\"朱利葉斯·凱撒（Julius Caesar）\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Emperor Hadrian ordered the building of Hadrian's Wall in the north of England to protect the Roman province from the Picts.\",\"zh\":\"羅馬皇帝哈德良（Emperor Hadrian）下令在英格蘭北部建造哈德良長城，以抵禦皮克特人（蘇格蘭人的祖先）入侵羅馬省份。\"}},{\"id\":\"11-3\",\"question\":{\"en\":\"How many members form a jury in Scotland?\",\"zh\":\"在蘇格蘭，陪審團由多少名成員組成？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"12\",\"zh\":\"12\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"14\",\"zh\":\"14\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"15\",\"zh\":\"15\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"20\",\"zh\":\"20\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"A criminal jury in Scotland consists of 15 members, unlike the 12-member juries used in England, Wales, and Northern Ireland.\",\"zh\":\"蘇格蘭的刑事陪審團由15名成員組成，與英格蘭、威爾斯和北愛爾蘭所使用的12人陪審團不同。\"}},{\"id\":\"11-4\",\"question\":{\"en\":\"Henry VIII has 6 wives. What was the name of his first wife?\",\"zh\":\"亨利八世有六任妻子。他第一任妻子的名字是什麼？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Anne of Cleves\",\"zh\":\"克萊芙的安妮\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Anne Boleyn\",\"zh\":\"安妮·博林\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Catherine Howard\",\"zh\":\"凱瑟琳·霍華德\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Catherine of Aragon\",\"zh\":\"阿拉貢的凱瑟琳\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Henry VIII's first wife was Catherine of Aragon, a Spanish princess who had previously been married to Henry's elder brother, Arthur.\",\"zh\":\"亨利八世的第一任妻子是阿拉貢的凱瑟琳，她是一位西班牙公主，此前曾嫁給亨利八世的哥哥亞瑟。\"}},{\"id\":\"11-5\",\"question\":{\"en\":\"Which of the following actions is known as 'canvassing'?\",\"zh\":\"以下哪項行為被稱為「拉票」 （canvassing） ？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Donating blood to help people\",\"zh\":\"捐血助人\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Volunteering for an environmental charity\",\"zh\":\"在環保慈善機構做志工\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Caring for animals at a local rescue shelter\",\"zh\":\"在當地的動物收容所照顧動物\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Persuading people to vote for a political party\",\"zh\":\"說服人們投票給某個政黨\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Canvassing involves volunteers or party members visiting households to persuade people to vote for their political party.\",\"zh\":\"「拉票」 （Canvassing） 是指志工或政黨成員拜訪住戶，以說服人們投票給其政黨。\"}},{\"id\":\"11-6\",\"question\":{\"en\":\"Who is the head of the Church of England?\",\"zh\":\"誰是英格蘭教會的領袖？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Prime Minister\",\"zh\":\"首相\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The Archbishop of Canterbury\",\"zh\":\"坎特伯里大主教\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Pope\",\"zh\":\"教宗\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"The monarch\",\"zh\":\"君主\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The monarch is the head of the Church of England, which is an established church.\",\"zh\":\"君主是英格蘭教會的領袖，該教會是國定教會。\"}},{\"id\":\"11-7\",\"question\":{\"en\":\"How often are 'Prime Minister's Questions' held in the parliament?\",\"zh\":\"國會的「首相答問環節」多久舉行一次？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Every day\",\"zh\":\"每天\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Every week\",\"zh\":\"每週\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"Every two weeks\",\"zh\":\"每兩週\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Once a month\",\"zh\":\"每個月一次\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Prime Minister's Questions (PMQs) is a weekly event in the House of Commons where the Prime Minister answers questions from MPs.\",\"zh\":\"首相答問環節 （Prime Minister's Questions） 是下議院每週進行一次的活動，由首相回答國會議員的提問。\"}},{\"id\":\"11-8\",\"question\":{\"en\":\"What was Margaret Thatcher famous for?\",\"zh\":\"瑪格麗特·柴契爾（Margaret Thatcher）以什麼聞名？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"She fought for the right to vote for women\",\"zh\":\"她爭取女性的投票權\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"She was the first woman Prime Minister of the UK\",\"zh\":\"她是英國第一位女性首相\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"She set up the women's Franchise League\",\"zh\":\"她創立了婦女選舉權聯盟\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"She was the founder of modern nursing\",\"zh\":\"她是現代護理學的奠基人\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Margaret Thatcher, the leader of the Conservative Party, became the UK's first female Prime Minister in 1979.\",\"zh\":\"保守黨黨魁瑪格麗特·柴契爾（Margaret Thatcher）於 1979 年成為英國第一位女性首相。\"}},{\"id\":\"11-9\",\"question\":{\"en\":\"How old do you have to be to buy alcohol in the UK?\",\"zh\":\"在英國您必須年滿多少歲才能購買酒精飲料？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"21\",\"zh\":\"21歲\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"16\",\"zh\":\"16歲\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"18\",\"zh\":\"18歲\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"20\",\"zh\":\"20歲\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The legal age for purchasing alcohol in the UK is 18.\",\"zh\":\"在英國購買酒精飲料的法定年齡為18歲。\"}},{\"id\":\"11-10\",\"question\":{\"en\":\"Where did Florence Nightingale establish the Nightingale School for Nurses in 1860?\",\"zh\":\"佛羅倫斯·南丁格爾於1860年在何處創立了南丁格爾護士學校？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"St James's University Hospital, Leeds\",\"zh\":\"里茲聖詹姆斯大學醫院\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Prince Philip Hospital, Llanelli\",\"zh\":\"拉內利菲利普親王醫院\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Addenbrooke's Hospital, Cambridge\",\"zh\":\"劍橋阿登布魯克醫院\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"St Thomas' Hospital, London\",\"zh\":\"倫敦聖托馬斯醫院\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Florence Nightingale established the Nightingale School for Nurses at St Thomas' Hospital in London in 1860.\",\"zh\":\"佛羅倫斯·南丁格爾於1860年在倫敦的聖托馬斯醫院創立了南丁格爾護士學校。\"}},{\"id\":\"11-11\",\"question\":{\"en\":\"Women over the age of 30 were given the right to vote as a result of their contribution towards the war effort. Which war was that?\",\"zh\":\"由於對戰爭做出的貢獻，30歲以上的女性被賦予了投票權。那是哪場戰爭？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Second World War\",\"zh\":\"第二次世界大戰\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The Crimean War\",\"zh\":\"克里米亞戰爭\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The First World War\",\"zh\":\"第一次世界大戰\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"The Civil War\",\"zh\":\"內戰\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The contribution of women to the war effort in the First World War led to the Representation of the People Act 1918, which gave the vote to women over 30 who met certain property qualifications.\",\"zh\":\"女性在第一次世界大戰中對戰爭做出的貢獻，促成了1918年《人民代表法》的通過，該法案賦予符合特定財產條件的30歲以上女性投票權。\"}},{\"id\":\"11-12\",\"question\":{\"en\":\"Who fought in the English Civil war of 1642?\",\"zh\":\"誰參與了1642年的英格蘭內戰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The House of York and the House of Lancaster\",\"zh\":\"約克家族與蘭開斯特家族\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"The Anglo-Saxons and the Vikings\",\"zh\":\"盎格魯-撒克遜人與維京人\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"The Cavaliers and the Roundheads\",\"zh\":\"騎士黨與圓顱黨\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"The House of Fraser and the House of Stuart\",\"zh\":\"弗雷澤家族與斯圖亞特家族\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The English Civil War was fought between the Cavaliers (supporting the King) and the Roundheads (supporting Parliament).\",\"zh\":\"英格蘭內戰是在支持國王的騎士黨（Cavaliers）與支持議會的圓顱黨（Roundheads）之間進行的。\"}},{\"id\":\"11-13\",\"question\":{\"en\":\"Where is the National Horseracing Museum located?\",\"zh\":\"國家賽馬博物館位於哪裡？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Edinburgh, Scotland\",\"zh\":\"蘇格蘭愛丁堡 (Edinburgh, Scotland)\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Newmarket, Suffolk\",\"zh\":\"薩福克郡新市場 (Newmarket, Suffolk)\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"St Andrews, Scotland\",\"zh\":\"蘇格蘭聖安德魯斯 (St Andrews, Scotland)\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Aintree near Liverpool\",\"zh\":\"利物浦附近的安特里 (Aintree near Liverpool)\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The National Horseracing Museum is located in Newmarket, Suffolk, which is widely considered the birthplace and global center of thoroughbred horse racing.\",\"zh\":\"國家賽馬博物館位於薩福克郡的新市場 (Newmarket, Suffolk)，該地被廣泛認為是純種馬賽馬的發源地和全球中心。\"}},{\"id\":\"11-14\",\"question\":{\"en\":\"After the Act of Union, Scotland was no longer an independent country. In what TWO ways was it still separate from the rest of Great Britain?\",\"zh\":\"《聯合法令》通過後，蘇格蘭不再是一個獨立的國家。在以下哪兩個方面，它仍然與大不列顛的其他地區保持獨立？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"It kept its Presbyterian Church\",\"zh\":\"保留了其長老會\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"It kept its own army.\",\"zh\":\"保留了其軍隊\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"It kept its own educational system\",\"zh\":\"保留了其教育體系\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"Hadrian's Wall was rebuilt to secure the border.\",\"zh\":\"重建了哈德良長城以維護邊境安全\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"The Act of Union in 1707 united Scotland with England and Wales to create Great Britain, but Scotland kept its own legal and educational systems, as well as its Presbyterian Church (the Church of Scotland).\",\"zh\":\"1707年的《聯合法令》將蘇格蘭與英格蘭及威爾斯合併為大不列顛，但蘇格蘭保留了其獨立的法律和教育體系，以及其長老會（蘇格蘭教會）。\"}},{\"id\":\"11-15\",\"question\":{\"en\":\"Who was the first man in the world to run 1 mile in under 4 minutes?\",\"zh\":\"世界上第一位在4分鐘內跑完1英里的人是誰？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Sir Chris Hoy\",\"zh\":\"克里斯·霍伊爵士\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Sir Roger Bannister\",\"zh\":\"羅傑·班尼斯特爵士\"},\"isCorrect\":true},{\"id\":\"C\",\"text\":{\"en\":\"David Weir\",\"zh\":\"大衛·威爾\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Mo Farah\",\"zh\":\"莫·法拉\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Sir Roger Bannister was the first person to run a mile in under four minutes in 1954.\",\"zh\":\"羅傑·班尼斯特爵士。他在1954年成為世界上第一個在4分鐘內跑完一英里的人。\"}},{\"id\":\"11-16\",\"question\":{\"en\":\"How are the local authorities funded?\",\"zh\":\"地方當局（local authorities）的資金來源為何？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Local authorities are unfunded\",\"zh\":\"地方當局沒有資金來源\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"By taxation only\",\"zh\":\"僅靠稅收\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"By central government funding and by taxation\",\"zh\":\"依靠中央政府撥款和稅收\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"By funding from central government only\",\"zh\":\"僅靠中央政府撥款\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Local authorities (councils) in the UK receive funding from central government grants, business rates, and local council tax paid by residents.\",\"zh\":\"英國的地方當局（議會）的資金來源包括中央政府撥款、商業稅以及居民繳納的地方市政稅（council tax）。\"}},{\"id\":\"11-17\",\"question\":{\"en\":\"When were the first professional football clubs formed?\",\"zh\":\"第一批職業足球俱樂部是什麼時候成立的？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"17th Century\",\"zh\":\"17世紀\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"20th Century\",\"zh\":\"20世紀\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"18th Century\",\"zh\":\"18世紀\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"19th Century\",\"zh\":\"19世紀\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The first professional football clubs were formed in the late 19th century, and the Football League was founded in 1888.\",\"zh\":\"第一批職業足球俱樂部成立於19世紀末，足球聯賽成立於1888年。\"}},{\"id\":\"11-18\",\"question\":{\"en\":\"Great Britain refers only to England, Wales and Scotland.\",\"zh\":\"大不列顛 (Great Britain) 僅指英格蘭、威爾斯和蘇格蘭。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":true},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Great Britain consists of England, Wales, and Scotland. It does not include Northern Ireland.\",\"zh\":\"正確。大不列顛包含英格蘭、蘇格蘭和威爾斯，不包括北愛爾蘭。\"}},{\"id\":\"11-19\",\"question\":{\"en\":\"died.\",\"zh\":\"去世。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Elizabeth I came to the throne when, following a short reign, her half-sister\",\"zh\":\"伊麗莎白一世登基，繼一個短暫的統治後，她的同父異母姐姐\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"This entry is a fragment of the historical statement: 'Elizabeth I came to the throne when, following a short reign, her half-sister Mary died.'\",\"zh\":\"此條目是以下歷史陳述的片段：「伊麗莎白一世在其同父異母的姐姐瑪麗在位短暫時間去世後登基。」\"}},{\"id\":\"11-20\",\"question\":{\"en\":\"The Falkland Islands are a British overseas territory and are part of the United Kingdom.\",\"zh\":\"福克蘭群島是英國海外領土，也是聯合王國（英國本土）的一部分。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"The Falkland Islands are a British overseas territory but they are not constitutionally part of the United Kingdom.\",\"zh\":\"福克蘭群島是英國海外領土，但它們在憲法上不屬於聯合王國（英國本土）的一部分。\"}},{\"id\":\"11-21\",\"question\":{\"en\":\"Which country was invaded by Germany in 1939?\",\"zh\":\"1939年德國入侵了哪個國家？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"Austria\",\"zh\":\"奧地利\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"Italy\",\"zh\":\"義大利\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Russia\",\"zh\":\"俄羅斯\"},\"isCorrect\":false},{\"id\":\"D\",\"text\":{\"en\":\"Poland\",\"zh\":\"波蘭\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"Germany invaded Poland in September 1939, which led Britain and France to declare war, starting the Second World War.\",\"zh\":\"1939年德國入侵波蘭，引發了第二次世界大戰。\"}},{\"id\":\"11-22\",\"question\":{\"en\":\"Which of the following is an example of civil law?\",\"zh\":\"以下哪一項是民事法的例子？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"To sell tobacco products to anyone under the age of 18\",\"zh\":\"向未滿 18 歲的任何人出售菸草製品\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"To buy alcohol for people who are under the age of 18\",\"zh\":\"為未滿 18 歲的人購買酒類\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"Discrimination in the workplace\",\"zh\":\"職場歧視\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"To carry a weapon of any kind, even if it is for self-defence\",\"zh\":\"攜帶任何種類的武器，即使是為了自衛\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"Civil law deals with disputes between individuals or groups, such as discrimination in the workplace, debt, and housing disputes. The others are criminal offences.\",\"zh\":\"民事法 （Civil law） 處理個人或團體之間的糾紛，例如職場歧視、債務和住房糾紛。其他選項則屬於刑事犯罪。\"}},{\"id\":\"11-23\",\"question\":{\"en\":\"Northern Ireland has its own established church.\",\"zh\":\"北愛爾蘭有自己的國定教會。\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"True\",\"zh\":\"正確\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"False\",\"zh\":\"錯誤\"},\"isCorrect\":true}],\"explanation\":{\"en\":\"There is no established Church in Northern Ireland or Wales. The Church of England is the established church in England.\",\"zh\":\"北愛爾蘭和威爾斯沒有國定教會。英格蘭教會是英格蘭的國定教會。\"}},{\"id\":\"11-24\",\"question\":{\"en\":\"What event is commemorated on 5 November every year?\",\"zh\":\"每年11月5日紀念的是什麼事件？\"},\"options\":[{\"id\":\"A\",\"text\":{\"en\":\"The Queen's birthday\",\"zh\":\"女王的生日\"},\"isCorrect\":false},{\"id\":\"B\",\"text\":{\"en\":\"England's World Cup victory of 1966.\",\"zh\":\"英格蘭1966年的世界盃勝利\"},\"isCorrect\":false},{\"id\":\"C\",\"text\":{\"en\":\"A plot to blow up the Houses of Parliament\",\"zh\":\"炸毀國會大廈的陰謀\"},\"isCorrect\":true},{\"id\":\"D\",\"text\":{\"en\":\"The end of the First World War\",\"zh\":\"第一次世界大戰的結束\"},\"isCorrect\":false}],\"explanation\":{\"en\":\"On 5th November, Bonfire Night (or Guy Fawkes Night) commemorates the failure of the Gunpowder Plot in 1605, a conspiracy to blow up the Houses of Parliament.\",\"zh\":\"11月5日的營火之夜（或稱蓋伊·福克斯之夜）是紀念1605年「火藥陰謀」的失敗，該陰謀企圖炸毀國會大廈。\"}}]}}]}]\n"])</script><script>self.__next_f.push([1,"c:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\n"])</script><script>self.__next_f.push([1,"12:I[27201,[\"/LifeInUK/_next/static/chunks/0ce4138y2rd_b.js\",\"/LifeInUK/_next/static/chunks/14mrh2-p_w84d.js\"],\"IconMark\"]\n9:null\n"])</script><script>self.__next_f.push([1,"e:[[\"$\",\"title\",\"0\",{\"children\":\"Life in the UK Mock Test\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Bilingual Life in the UK Mock Test App\"}],[\"$\",\"link\",\"2\",{\"rel\":\"manifest\",\"href\":\"/LifeInUK/manifest.webmanifest\",\"crossOrigin\":\"$undefined\"}],[\"$\",\"meta\",\"3\",{\"name\":\"mobile-web-app-capable\",\"content\":\"yes\"}],[\"$\",\"meta\",\"4\",{\"name\":\"apple-mobile-web-app-title\",\"content\":\"LifeInUK\"}],[\"$\",\"meta\",\"5\",{\"name\":\"apple-mobile-web-app-status-bar-style\",\"content\":\"default\"}],[\"$\",\"meta\",\"6\",{\"property\":\"og:title\",\"content\":\"Lif
